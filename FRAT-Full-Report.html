<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FRAT Full Report</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:white;
  color:#111;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:10px 22px 5px 22px;
}

h1{
  color:#004080;
  font-size:28px;
  letter-spacing:2px;
}

.controls{
  display:flex;
  gap:10px;
  align-items:flex-start;
}

.control-box{
  border:1px solid #004080;
  padding:5px;
  width:170px;
  font-size:12px;
}

select{
  width:100%;
  padding:5px;
  margin-top:3px;
}

.hide-btn{
  width:210px;
  height:92px;
  border:none;
  background:#004080;
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.instructions{
  padding:20px 22px 8px 22px;
  color:#004080;
  font-size:12px;
}

.main{
  display:flex;
  padding:0 22px 20px 22px;
}

.left{width:67%;}
.right{width:33%;border-left:1px solid #ccc;}

.section-title{
  background:#004080;
  color:white;
  font-weight:bold;
  font-size:17px;
  padding:5px;
  margin-top:8px;
}

.items{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px 25px;
  padding:8px 5px 12px 5px;
}

.item{
  display:grid;
  grid-template-columns:1fr 75px;
  gap:8px;
  font-size:14px;
  min-height:48px;
}

.radio-group label{
  display:block;
  font-size:14px;
}

input[type="radio"]{
  transform:scale(1.2);
  margin-right:5px;
}

.total-line{
  border-top:3px solid #004080;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:18px;
  padding:15px 12px;
  margin-top:10px;
}

.total-label{
  font-size:23px;
  color:#004080;
  font-weight:bold;
}

.risk-result{
  width:160px;
  padding:15px;
  border-radius:5px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.low{background:#2f9144;color:#000;}
.moderate{background:#ffd966;color:#000;}
.high{background:#ff1a0a;color:#000;}

.risk-number{
  display:block;
  font-size:16px;
  margin-top:5px;
  font-weight:normal;
}

.risk-comment{
  max-width:420px;
  padding:15px;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  text-align:left;
}

.low-comment{
  background:#d8f3dc;
  color:#14532d;
  border:1px solid #2f9144;
}

.moderate-comment{
  background:#fff3cd;
  color:#664d03;
  border:1px solid #ffd966;
}

.high-comment{
  background:#f8d7da;
  color:#842029;
  border:1px solid #ff1a0a;
}

.risk-assessment{
  margin-top:15px;
  padding:0 5px;
}

.risk-assessment h2{
  color:#004080;
  margin-bottom:10px;
}

.risk-table{
  border-collapse:collapse;
  width:95%;
  text-align:center;
  font-size:14px;
}

.risk-table td,
.risk-table th{
  border:1px solid #ddd;
  padding:8px;
}

.gray{background:#bfbfbf;}
.green{background:#2f9144;}
.yellow{background:#ffd966;}
.red{background:#ff1a0a;}

.details-table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

.details-table th{
  background:#e5e5e5;
  border:1px solid #ccc;
  padding:5px;
}

.details-table td{
  border:1px solid #ccc;
  padding:6px;
}

.category-cell{
  background:#f4f4f4;
  vertical-align:top;
  width:34%;
}

.factor-cell{
  text-align:right;
  width:50%;
}

.score-cell{
  text-align:center;
  width:16%;
  font-weight:bold;
}

.alt{background:#d9d9d9;}
.selected{background:#9bd0f5!important;}

.bottom-buttons{
  text-align:center;
  margin:25px;
}

.btn{
  border:none;
  color:white;
  padding:14px 28px;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin:6px;
}

.print-btn{background:#2f9144;}
.back-btn{background:#c40000;}
.database-btn{background:#004080;}
.home-btn{background:#0b2a66;}

@media print{
  .bottom-buttons{display:none;}
}

@media(max-width:900px){
  .main{flex-direction:column;}
  .left,.right{width:100%;}
  .items{grid-template-columns:1fr;}
  .header{flex-direction:column;gap:10px;}
  .controls{flex-wrap:wrap;}
}
</style>
</head>

<body>

<div class="header">
  <h1>FLIGHT RISK ASSESSMENT TOOL</h1>

  <div class="controls">
    <div class="control-box">
      Select Pilot Type
      <select id="pilotType" disabled>
        <option value="VFR">VFR</option>
        <option value="IFR">IFR</option>
      </select>
    </div>

    <div class="control-box">
      Select Experience Level
      <select id="experience" disabled>
        <option value="LESS_100">&lt;100 In Type</option>
        <option value="MORE_100">&gt;100 In Type</option>
      </select>
    </div>

    <button class="hide-btn" onclick="toggleDetails()">Hide Details</button>
  </div>
</div>

<div class="instructions">
  Instructions: This is the saved FRAT report loaded from Firebase.
</div>

<div class="main">
  <div class="left" id="formArea"></div>

  <div class="right" id="detailsArea">
    <table class="details-table">
      <thead>
        <tr>
          <th>Type</th>
          <th>Category</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody id="detailsBody"></tbody>
    </table>
  </div>
</div>

<div class="bottom-buttons">
  <button class="btn print-btn" onclick="window.print()">Print / Save PDF</button>

  <button class="btn back-btn" onclick="goBackDetails()">
    Back to FRAT Details
  </button>

  <button class="btn database-btn" onclick="window.location.href='FRAT-Database.html'">
    Back to FRAT Database
  </button>

  <button class="btn home-btn" onclick="window.location.href='index.html'">
    Home
  </button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const fratItems = [
  {
    type:"Pilot",
    items:[
      ["Less than 50 Hours in Aircraft or Avionics Type",5],
      ["Less than 15 hours in the last 90 days",5],
      ["Flight will occur after work",3],
      ["Less than 8 hours sleep prior to flight",5],
      ["Dual Instruction Received in last 90 days",0],
      ["WINGS Phase Completion in last 6 months",-3],
      ["Instrument Rating current and proficient",-3]
    ]
  },
  {
    type:"Flight Conditions",
    items:[
      ["Twilight or Night",5],
      ["Surface wind greater than 15 Knots",4],
      ["Cross wind greater than 7 Knots",4],
      ["Mountainous Terrain",3]
    ]
  }
];

const params = new URLSearchParams(window.location.search);
const reportId = params.get("id");
const formArea = document.getElementById("formArea");
const detailsBody = document.getElementById("detailsBody");

let savedData = null;

function safeId(text){
  return text.replaceAll(" ","_").replaceAll("-","_").replaceAll("/","_").replaceAll("&","_");
}

function isSelected(type, category){
  if(!savedData || !savedData.selectedFactors) return false;

  return savedData.selectedFactors.some(factor =>
    factor.type === type && factor.category === category
  );
}

function getRiskComment(level){
  if(!level){
    return {
      text:"Risk level not available.",
      className:"low-comment"
    };
  }

  if(level.includes("LOW")){
    return {
      text:"PK: Risk is acceptable. The flight may operate normally under standard operational controls.",
      className:"low-comment"
    };
  }

  if(level.includes("MODERATE")){
    return {
      text:"Caution: Moderate risk identified. Notify the Operations area before continuing.",
      className:"moderate-comment"
    };
  }

  if(level.includes("HIGH")){
    return {
      text:"NO-GO: High risk identified. The flight must not operate until the risk is reduced or mitigated.",
      className:"high-comment"
    };
  }

  return {
    text:"Risk level not available.",
    className:"low-comment"
  };
}

function buildForm(){
  formArea.innerHTML = "";

  fratItems.forEach(section => {
    const title = document.createElement("div");
    title.className = "section-title";
    title.innerText = section.type;
    formArea.appendChild(title);

    const itemsDiv = document.createElement("div");
    itemsDiv.className = "items";

    section.items.forEach((item, index) => {
      const id = safeId(section.type) + "_" + index;
      const selected = isSelected(section.type, item[0]);

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <div>${item[0]}</div>
        <div class="radio-group">
          <label>
            <input type="radio" name="${id}" disabled ${selected ? "checked" : ""}>True
          </label>
          <label>
            <input type="radio" name="${id}" disabled ${!selected ? "checked" : ""}>False
          </label>
        </div>
      `;

      itemsDiv.appendChild(div);
    });

    formArea.appendChild(itemsDiv);
  });

  const riskComment = getRiskComment(savedData.riskLevel || "");

  formArea.innerHTML += `
    <div class="total-line">
      <div class="total-label">Total Risk Value</div>

      <div id="riskResult" class="risk-result">
        ${savedData.riskLevel || "LOW RISK"}
        <span class="risk-number">${savedData.totalRiskValue || 0}</span>
      </div>

      <div class="risk-comment ${riskComment.className}">
        ${riskComment.text}
      </div>
    </div>
  `;

  applyRiskColor();
}

function buildDetails(){
  detailsBody.innerHTML = "";

  fratItems.forEach(section => {
    section.items.forEach((item, index) => {
      const selected = isSelected(section.type, item[0]);

      const tr = document.createElement("tr");

      tr.innerHTML = `
        ${index === 0 ? `<td class="category-cell" rowspan="${section.items.length}">${section.type}</td>` : ""}
        <td class="factor-cell ${index % 2 === 0 ? 'alt' : ''} ${selected ? 'selected' : ''}">${item[0]}</td>
        <td class="score-cell ${selected ? 'selected' : ''}">${item[1]}</td>
      `;

      detailsBody.appendChild(tr);
    });
  });

  const totalRow = document.createElement("tr");
  totalRow.innerHTML = `
    <td colspan="2">Grand Total</td>
    <td class="score-cell">${savedData.totalRiskValue || 0}</td>
  `;
  detailsBody.appendChild(totalRow);
}

function applyRiskColor(){
  const box = document.getElementById("riskResult");
  const level = savedData.riskLevel || "";

  box.classList.remove("low","moderate","high");

  if(level.includes("LOW")) box.classList.add("low");
  else if(level.includes("MODERATE")) box.classList.add("moderate");
  else if(level.includes("HIGH")) box.classList.add("high");
  else box.classList.add("low");
}

window.toggleDetails = function(){
  const details = document.getElementById("detailsArea");
  const btn = document.querySelector(".hide-btn");

  if(details.style.display === "none"){
    details.style.display = "block";
    btn.innerText = "Hide Details";
  }else{
    details.style.display = "none";
    btn.innerText = "Show Details";
  }
};

window.goBackDetails = function(){
  window.location.href = "FRAT-Details.html?id=" + reportId;
};

if(!reportId){
  formArea.innerHTML = "<h2>No FRAT Report ID was found in the URL.</h2>";
}else{
  const reportRef = ref(database, "fratReports/" + reportId);

  get(reportRef).then(snapshot => {
    if(snapshot.exists()){
      savedData = snapshot.val();

      document.getElementById("pilotType").value = savedData.pilotType || "VFR";
      document.getElementById("experience").value = savedData.experienceLevel || "LESS_100";

      buildForm();
      buildDetails();
    }else{
      formArea.innerHTML = "<h2>FRAT Report not found in Firebase.</h2>";
    }
  }).catch(error => {
    formArea.innerHTML = "<h2>Error loading FRAT Report: " + error.message + "</h2>";
  });
}

</script>

</body>
</html>
