<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FRAT Full Report</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:white;
  color:#111;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:10px 22px 5px 22px;
}

h1{
  color:#004080;
  font-size:28px;
  letter-spacing:2px;
}

.controls{
  display:flex;
  gap:10px;
  align-items:flex-start;
}

.control-box{
  border:1px solid #004080;
  padding:5px;
  width:170px;
  font-size:12px;
}

select{
  width:100%;
  padding:5px;
  margin-top:3px;
}

.hide-btn{
  width:210px;
  height:92px;
  border:none;
  background:#004080;
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.instructions{
  padding:20px 22px 8px 22px;
  color:#004080;
  font-size:12px;
}

.main{
  display:flex;
  padding:0 22px 20px 22px;
}

.left{width:67%;}
.right{width:33%;border-left:1px solid #ccc;}

.section-title{
  background:#004080;
  color:white;
  font-weight:bold;
  font-size:17px;
  padding:5px;
  margin-top:8px;
}

.items{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px 25px;
  padding:8px 5px 12px 5px;
}

.item{
  display:grid;
  grid-template-columns:1fr 75px;
  gap:8px;
  font-size:14px;
  min-height:48px;
}

.radio-group label{
  display:block;
  font-size:14px;
}

input[type="radio"]{
  transform:scale(1.2);
  margin-right:5px;
}

.total-line{
  border-top:3px solid #004080;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:18px;
  padding:15px 12px;
  margin-top:10px;
}

.total-label{
  font-size:23px;
  color:#004080;
  font-weight:bold;
}

.risk-result{
  width:160px;
  padding:15px;
  border-radius:5px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.low{background:#2f9144;color:#000;}
.moderate{background:#ffd966;color:#000;}
.high{background:#ff1a0a;color:#000;}

.risk-number{
  display:block;
  font-size:16px;
  margin-top:5px;
  font-weight:normal;
}

.risk-comment{
  max-width:420px;
  padding:15px;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  text-align:left;
}

.low-comment{
  background:#d8f3dc;
  color:#14532d;
  border:1px solid #2f9144;
}

.moderate-comment{
  background:#fff3cd;
  color:#664d03;
  border:1px solid #ffd966;
}

.high-comment{
  background:#f8d7da;
  color:#842029;
  border:1px solid #ff1a0a;
}

.risk-assessment{
  margin-top:15px;
  padding:0 5px;
}

.risk-assessment h2{
  color:#004080;
  margin-bottom:10px;
}

.risk-table{
  border-collapse:collapse;
  width:95%;
  text-align:center;
  font-size:14px;
}

.risk-table td,
.risk-table th{
  border:1px solid #ddd;
  padding:8px;
}

.gray{background:#bfbfbf;}
.green{background:#2f9144;}
.yellow{background:#ffd966;}
.red{background:#ff1a0a;}

.details-table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

.details-table th{
  background:#e5e5e5;
  border:1px solid #ccc;
  padding:5px;
}

.details-table td{
  border:1px solid #ccc;
  padding:6px;
}

.category-cell{
  background:#f4f4f4;
  vertical-align:top;
  width:34%;
}

.factor-cell{
  text-align:right;
  width:50%;
}

.score-cell{
  text-align:center;
  width:16%;
  font-weight:bold;
}

.alt{background:#d9d9d9;}
.selected{background:#9bd0f5!important;}

.bottom-buttons{
  text-align:center;
  margin:25px;
}

.btn{
  border:none;
  color:white;
  padding:14px 28px;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin:6px;
}

.print-btn{background:#2f9144;}
.back-btn{background:#c40000;}
.database-btn{background:#004080;}
.home-btn{background:#0b2a66;}

@media print{
  .bottom-buttons{display:none;}
}

@media(max-width:900px){
  .main{flex-direction:column;}
  .left,.right{width:100%;}
  .items{grid-template-columns:1fr;}
  .header{flex-direction:column;gap:10px;}
  .controls{flex-wrap:wrap;}
}
</style>
</head>

<body>

<div class="header">
  <h1>FLIGHT RISK ASSESSMENT TOOL</h1>

  <div class="controls">
    <div class="control-box">
      Select Pilot Type
      <select id="pilotType" disabled>
        <option value="VFR">VFR</option>
        <option value="IFR">IFR</option>
      </select>
    </div>

    <div class="control-box">
      Select Experience Level
      <select id="experience" disabled>
        <option value="LESS_100">&lt;100 In Type</option>
        <option value="MORE_100">&gt;100 In Type</option>
      </select>
    </div>

    <button class="hide-btn" onclick="toggleDetails()">Hide Details</button>
  </div>
</div>

<div class="instructions">
  Instructions: This is the saved FRAT report loaded from Firebase. This page is read-only.
</div>

<div class="main">
  <div class="left" id="formArea
