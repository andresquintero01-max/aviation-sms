<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Risk Overview</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI', Arial, sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,152,0,0.30), transparent 30%),
    radial-gradient(circle at bottom right, rgba(28,99,219,0.45), transparent 38%),
    linear-gradient(rgba(5,20,55,0.88), rgba(5,20,55,0.95)),
    url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:35px;
}

.container{
  width:100%;
  max-width:950px;
  background:rgba(255,255,255,0.96);
  border-radius:34px;
  padding:55px;
  text-align:center;
  box-shadow:0 25px 70px rgba(0,0,0,0.38);
}

.logo{
  font-size:64px;
  margin-bottom:15px;
}

h1{
  font-size:54px;
  color:#071f47;
  margin-bottom:12px;
  letter-spacing:1px;
}

.subtitle{
  font-size:20px;
  color:#475569;
  margin-bottom:45px;
  line-height:1.6;
}

.button-grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:30px;
  margin-top:20px;
}

.card-button{
  text-decoration:none;
  background:linear-gradient(135deg,#071f47,#1450b8);
  color:white;
  padding:38px 25px;
  border-radius:26px;
  box-shadow:0 14px 32px rgba(20,80,184,0.35);
  transition:0.25s;
  border:2px solid rgba(255,255,255,0.35);
}

.card-button:hover{
  transform:translateY(-7px);
  box-shadow:0 22px 42px rgba(20,80,184,0.48);
}

.card-button.report{
  background:linear-gradient(135deg,#f97316,#f59e0b);
}

.card-button.database{
  background:linear-gradient(135deg,#071f47,#2563eb);
}

.icon{
  font-size:48px;
  margin-bottom:18px;
}

.card-title{
  font-size:30px;
  font-weight:800;
  margin-bottom:10px;
}

.card-text{
  font-size:16px;
  opacity:0.95;
  line-height:1.5;
}

.nav-buttons{
  margin-top:45px;
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
}

.nav-buttons a{
  text-decoration:none;
  background:#071f47;
  color:white;
  padding:14px 28px;
  border-radius:999px;
  font-size:16px;
  font-weight:700;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  transition:0.25s;
}

.nav-buttons a:hover{
  background:#1450b8;
  transform:translateY(-3px);
}

.footer{
  margin-top:35px;
  color:#64748b;
  font-size:14px;
}

@media(max-width:750px){
  .container{
    padding:35px 24px;
  }

  h1{
    font-size:38px;
  }

  .button-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">⚠️</div>

  <h1>Risk Overview</h1>

  <p class="subtitle">
    Professional risk overview module for reviewing reports, risk status,
    corrective actions, and safety performance data.
  </p>

  <div class="button-grid">

    <a class="card-button report" href="Risk-Overview-Report.html">
      <div class="icon">📄</div>
      <div class="card-title">Report</div>
      <div class="card-text">
        Open the Risk Overview report view.
      </div>
    </a>

    <a class="card-button database" href="Risk-Overview-Database.html">
      <div class="icon">🗂️</div>
      <div class="card-title">Database</div>
      <div class="card-text">
        Open the Risk Overview database.
      </div>
    </a>

  </div>

  <div class="nav-buttons">
    <a href="index.html">🏠 Home</a>
    <a href="Safety-Assurance.html">⬅ Back</a>
  </div>

  <div class="footer">
    371Q Professional Safety Software
  </div>

</div>

</body>
</html>
