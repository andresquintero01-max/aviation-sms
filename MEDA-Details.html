<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MEDA Details</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
  padding:30px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:25px;
  box-shadow:0 18px 45px rgba(0,0,0,0.3);
}

h1{
  text-align:center;
  color:#071f47;
  font-size:44px;
  margin-bottom:10px;
}

.description{
  text-align:center;
  color:#666;
  font-size:18px;
  margin-bottom:35px;
}

.info-box{
  background:#f4f6f8;
  border-radius:18px;
  padding:25px;
  margin-bottom:25px;
  border:1px solid #ddd;
}

.info-row{
  display:flex;
  justify-content:space-between;
  gap:20px;
  border-bottom:1px solid #ddd;
  padding:12px 0;
  font-size:16px;
}

.info-row:last-child{
  border-bottom:none;
}

.label{
  font-weight:bold;
  color:#071f47;
  min-width:260px;
}

.value{
  color:#333;
  text-align:right;
}

.status-box{
  text-align:center;
  padding:22px;
  border-radius:16px;
  font-size:24px;
  font-weight:bold;
  margin-bottom:25px;
}

.open{background:#ffd966;color:#222;}
.progress{background:#1450b8;color:white;}
.pending{background:#ff9800;color:white;}
.closed{background:#2f9144;color:white;}

h2{
  color:#071f47;
  margin:28px 0 15px;
}

.text-box{
  background:#f8fbff;
  border:1px solid #d8e1ef;
  border-left:7px solid #1450b8;
  border-radius:14px;
  padding:18px;
  margin-bottom:18px;
  line-height:1.6;
  color:#333;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th{
  background:#071f47;
  color:white;
  padding:14px;
  font-size:16px;
}

td{
  border:1px solid #ddd;
  padding:12px;
  text-align:center;
  font-size:15px;
  vertical-align:top;
}

tr:nth-child(even){
  background:#f4f6f8;
}

.yes{
  color:#2f9144;
  font-weight:bold;
}

.no{
  color:#777;
  font-weight:bold;
}

.unknown{
  color:#ff9800;
  font-weight:bold;
}

.no-data{
  text-align:center;
  color:#777;
  font-size:18px;
  margin-top:25px;
}

.buttons{
  text-align:center;
  margin-top:30px;
}

.btn{
  border:none;
  color:white;
  padding:14px 28px;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin:6px;
}

.report-btn{background:#2f9144;}
.back-btn{background:#c40000;}
.meda-btn{background:#004080;}
.home-btn{background:#0b2a66;}

@media(max-width:800px){
  .info-row{
    flex-direction:column;
  }

  .value{
    text-align:left;
  }

  .label{
    min-width:auto;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>MEDA Report Details</h1>

  <div class="description">
    Full Maintenance Error Decision Aid investigation information
  </div>

  <div id="content">
    Loading MEDA Report...
  </div>

  <div class="buttons">
    <button id="viewFullReportBtn" class="btn report-btn" style="display:none;">
      View MEDA Report
    </button>

    <button class="btn back-btn" onclick="window.location.href='MEDA-Database.html'">
      Back to MEDA Database
    </button>

    <button class="btn meda-btn" onclick="window.location.href='MEDA.html'">
      Back to MEDA
    </button>

    <button class="btn home-btn" onclick="window.location.href='index.html'">
      Home
    </button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const reportId = params.get("id");
const content = document.getElementById("content");
const viewFullReportBtn = document.getElementById("viewFullReportBtn");

function statusClass(status){
  if(!status) return "open";
  if(status === "Open") return "open";
  if(status === "In Progress") return "progress";
  if(status === "Pending Effectiveness Review") return "pending";
  if(status === "Closed") return "closed";
  return "open";
}

function presentClass(value){
  if(value === "Yes") return "yes";
  if(value === "No") return "no";
  if(value === "Unknown") return "unknown";
  return "";
}

if(!reportId){

  content.innerHTML = `<div class="no-data">No MEDA Report ID was found in the URL.</div>`;

}else{

  viewFullReportBtn.style.display = "inline-block";

  viewFullReportBtn.onclick = function(){
    window.location.href = "MEDA-Full-Report.html?id=" + reportId;
  };

  const reportRef = ref(database, "medaReports/" + reportId);

  get(reportRef).then((snapshot) => {

    if(snapshot.exists()){

      const data = snapshot.val();

      let factorsHTML = "";

      if(data.contributingFactors && data.contributingFactors.length > 0){

        data.contributingFactors.forEach(factor => {

          factorsHTML += `
            <tr>
              <td>${factor.name || ""}</td>
              <td class="${presentClass(factor.present)}">${factor.present || ""}</td>
              <td>${factor.evidence || ""}</td>
              <td>${factor.recommendedAction || ""}</td>
            </tr>
          `;

        });

      }else{

        factorsHTML = `<tr><td colspan="4">No MEDA contributing factors found.</td></tr>`;

      }

      let actionsHTML = "";

      if(data.correctiveActions && data.correctiveActions.length > 0){

        data.correctiveActions.forEach(action => {

          if(action.action || action.responsible || action.dueDate){

            actionsHTML += `
              <tr>
                <td>${action.action || ""}</td>
                <td>${action.responsible || ""}</td>
                <td>${action.dueDate || ""}</td>
              </tr>
            `;

          }

        });

      }

      if(actionsHTML === ""){
        actionsHTML = `<tr><td colspan="3">No corrective actions found.</td></tr>`;
      }

      content.innerHTML = `
        <div class="info-box">

          <div class="info-row">
            <div class="label">MEDA Report ID</div>
            <div class="value">${reportId}</div>
          </div>

          <div class="info-row">
            <div class="label">Created At</div>
            <div class="value">${data.createdAt || ""}</div>
          </div>

          <div class="info-row">
            <div class="label">Report Title</div>
            <div class="value">${data.title || ""}</div>
          </div>

          <div class="info-row">
            <div class="label">Aircraft Registration</div>
            <div class="value">${data.aircraft || ""}</div>
          </div>

          <div class="info-row">
            <div class="label">Customer</div>
            <div class="value">${data.customer || ""}</div>
          </div>

          <div class="info-row">
            <div class="label">Location</div>
            <div class="value">${data.location || ""}</div>
          </div>

          <div class="info-row">
            <div class="label">Date</div>
            <div class="value">${data.date || ""}</div>
          </div>

          <div class="info-row">
            <div class="label">Work Order / Task Card / NRC</div>
            <div class="value">${data.workOrder || ""}</div>
          </div>

          <div class="info-row">
            <div class="label">Event Type</div>
            <div class="value">${data.eventType || ""}</div>
          </div>

          <div class="info-row">
            <div class="label">Detection Method</div>
            <div class="value">${data.detectionMethod || ""}</div>
          </div>

          <div class="info-row">
            <div class="label">Main Contributing Factor</div>
            <div class="value">${data.mainFactor || ""}</div>
          </div>

        </div>

        <div class="status-box ${statusClass(data.status)}">
          ${data.status || "Open"}
        </div>

        <h2>Event Description</h2>
        <div class="text-box">
          ${data.eventDescription || "No event description entered."}
        </div>

        <h2>Immediate Action Taken</h2>
        <div class="text-box">
          ${data.immediateAction || "No immediate action entered."}
        </div>

        <h2>MEDA Contributing Factors</h2>

        <table>
          <thead>
            <tr>
              <th>Factor</th>
              <th>Present?</th>
              <th>Evidence / Description</th>
              <th>Recommended Action</th>
            </tr>
          </thead>

          <tbody>
            ${factorsHTML}
          </tbody>
        </table>

        <h2>Root Cause Statement</h2>
        <div class="text-box">
          ${data.rootCause || "No root cause statement entered."}
        </div>

        <h2>System Weakness Identified</h2>
        <div class="text-box">
          ${data.systemWeakness || "No system weakness entered."}
        </div>

        <h2>Corrective / Preventive Actions</h2>

        <table>
          <thead>
            <tr>
              <th>Action</th>
              <th>Responsible Person</th>
              <th>Due Date</th>
            </tr>
          </thead>

          <tbody>
            ${actionsHTML}
          </tbody>
        </table>

        <h2>Effectiveness Review</h2>

        <div class="info-box">

          <div class="info-row">
            <div class="label">Review Method</div>
            <div class="value">${data.reviewMethod || ""}</div>
          </div>

          <div class="info-row">
            <div class="label">Effectiveness Status</div>
            <div class="value">${data.effectivenessStatus || ""}</div>
          </div>

          <div class="info-row">
            <div class="label">Review Date</div>
            <div class="value">${data.reviewDate || ""}</div>
          </div>

        </div>

        <div class="text-box">
          ${data.effectivenessNotes || "No effectiveness notes entered."}
        </div>
      `;

    }else{

      content.innerHTML = `<div class="no-data">MEDA Report not found in Firebase.</div>`;

    }

  }).catch((error) => {

    content.innerHTML = `<div class="no-data">Error loading MEDA Report: ${error.message}</div>`;

  });

}

</script>

</body>
</html>
