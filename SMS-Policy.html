<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manual de SMS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  text-align:center;
}

.title-row{
  display:flex;
  align-items:center;
  gap:20px;
  justify-content:center;
}

h1{
  font-size:50px;
  color:#071f47;
  margin:0;
}

button{
  background:#071f47;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#0b2a66;
}
</style>

</head>

<body>

<div class="container">

  <div class="title-row">

    <!-- TITULO -->
    <h1>Manual de SMS</h1>

    <!-- BOTÓN -->
    <button onclick="attachDocument()">
      Adjuntar documento
    </button>

  </div>

</div>

<script>
function attachDocument(){
  alert("Aquí conectaremos el documento de Google Drive en el siguiente paso 👍");
}
</script>

</body>
</html>
