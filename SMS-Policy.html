<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMS Policy</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#071f47,#0b2a66,#123b7a);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
}

/* MAIN CONTAINER */
.container{
  width:100%;
  max-width:650px;
  background:white;
  padding:40px;
  border-radius:25px;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
  text-align:center;
}

/* TITLE */
h1{
  font-size:55px;
  color:#071f47;
  margin-bottom:35px;
  letter-spacing:1px;
}

/* SECTION */
.section{
  margin-bottom:25px;
}

/* SECTION TITLES */
.section-title{
  font-size:22px;
  color:#333;
  margin-bottom:12px;
  font-weight:bold;
}

/* MODERN BUTTONS */
.main-btn{
  display:inline-block;
  width:100%;
  max-width:420px;
  background:linear-gradient(135deg,#071f47,#0b2a66);
  color:white;
  text-decoration:none;
  padding:18px;
  border-radius:16px;
  font-size:18px;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.main-btn:hover{
  transform:translateY(-4px) scale(1.02);
  background:linear-gradient(135deg,#0b2a66,#1450b8);
  box-shadow:0 12px 25px rgba(0,0,0,0.3);
}

/* BACK BUTTON */
.back-btn{
  display:inline-block;
  margin-top:20px;
  background:linear-gradient(135deg,#c40000,#ff2b2b);
  color:white;
  text-decoration:none;
  padding:15px 35px;
  border-radius:14px;
  font-size:18px;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

.back-btn:hover{
  transform:translateY(-3px);
  background:linear-gradient(135deg,#ff2b2b,#ff4d4d);
}

</style>
</head>

<body>

<div class="container">

  <!-- TITLE -->
  <h1>SMS Policy</h1>

  <!-- MANUAL -->
  <div class="section">
    <div class="section-title">Manual</div>

    <a class="main-btn"
       href="https://docs.google.com/document/d/1Tg5qRdjBNnFmmkCuflhb_7JzFbwKHhdt/view"
       target="_blank">
       Open Manual
    </a>
  </div>

  <!-- SMS POLICY DOCUMENT -->
  <div class="section">
    <div class="section-title">SMS Policy Document</div>

    <a class="main-btn"
       href="https://docs.google.com/document/d/1VOfcOccqYe7618w5NkMiSR_eCVnqoXZn/view"
       target="_blank">
       Open SMS Policy Document
    </a>
  </div>

  <!-- OBJECTIVES -->
  <div class="section">
    <div class="section-title">Objectives</div>

    <a class="main-btn"
       href="https://docs.google.com/document/d/1PvXAmlvLIqr4c8pwLpoZA81AhPfBaieM/view"
       target="_blank">
       Open Objectives Document
    </a>
  </div>

  <!-- EMERGENCY PLANS -->
  <div class="section">
    <div class="section-title">Emergency Plans</div>

    <a class="main-btn"
       href="https://docs.google.com/document/d/1HqGqV4J5Z3yF0y02-qDaSIzxaX3axkBa/view"
       target="_blank">
       Open Emergency Plans
    </a>
  </div>

  <!-- BACK BUTTON -->
  <a class="back-btn" href="index.html">
    Back
  </a>

</div>

</body>
</html>
