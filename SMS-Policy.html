<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Policy Documents</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Arial, sans-serif;
    min-height:100vh;
    background:
    linear-gradient(rgba(5,20,55,0.88), rgba(5,20,55,0.92)),
    url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:rgba(255,255,255,0.97);
    border-radius:25px;
    padding:45px;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    color:#071f47;
    margin-bottom:35px;
    font-size:42px;
}

.section{
    margin-bottom:35px;
}

.section h2{
    color:#071f47;
    margin-bottom:12px;
    font-size:24px;
}

input{
    width:100%;
    padding:15px;
    border:1px solid #d1d5db;
    border-radius:12px;
    font-size:15px;
    margin-bottom:12px;
}

button{
    background:#1450b8;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
}

button:hover{
    background:#0f3d91;
}

.home-btn{
    background:#16a34a;
    margin-top:20px;
}

.home-btn:hover{
    background:#15803d;
}

</style>
</head>

<body>

<div class="container">

    <h1>SMS Policy Documents</h1>

    <div class="section">
        <h2>Manual SMS</h2>
        <input type="text" id="manualLink" placeholder="Paste Google Drive link here">
        <button onclick="openDocument('manualLink')">Open Document</button>
    </div>

    <div class="section">
        <h2>Safety Policy</h2>
        <input type="text" id="policyLink" placeholder="Paste Google Drive link here">
        <button onclick="openDocument('policyLink')">Open Document</button>
    </div>

    <div class="section">
        <h2>Emergency Response Plan</h2>
        <input type="text" id="emergencyLink" placeholder="Paste Google Drive link here">
        <button onclick="openDocument('emergencyLink')">Open Document</button>
    </div>

    <button class="home-btn" onclick="window.location.href='index.html'">
        Home
    </button>

</div>

<script>

function openDocument(inputId){

    const link = document.getElementById(inputId).value.trim();

    if(link === ""){
        alert("Please paste a document link first.");
        return;
    }

    window.open(link, "_blank");
}

</script>

</body>
</html>
