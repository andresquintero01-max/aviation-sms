<style>

*{

body{

  background:
    radial-gradient(circle at top left, rgba(255,140,0,0.28), transparent 30%),
    radial-gradient(circle at bottom right, rgba(20,80,184,0.40), transparent 38%),
    linear-gradient(rgba(3,15,45,0.88), rgba(3,15,45,0.92)),

  background-size:cover;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:35px;
}

.container{
  width:100%;
  max-width:1050px;
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(14px);
  padding:55px;
  border-radius:40px;
  box-shadow:0 30px 80px rgba(0,0,0,0.45);
  text-align:center;
}

.logo{
  width:115px;

  margin:auto;
  border-radius:32px;
  background:linear-gradient(135deg,#071f47,#1450b8);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:52px;
  box-shadow:0 18px 40px rgba(0,0,0,0.30);
  margin-bottom:24px;
}

.badge{
  display:inline-block;
  background:linear-gradient(135deg,#eaf2ff,#ffffff);
  color:#071f47;
  padding:11px 26px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
  letter-spacing:1.6px;
  margin-bottom:18px;
  text-transform:uppercase;
}

h1{
  font-size:74px;
  color:#071f47;
  margin-bottom:12px;
  font-weight:900;
}

.subtitle{
  color:#56657d;
  font-size:21px;
  margin-bottom:24px;
}

.title-line{
  width:230px;
  height:6px;
  margin:0 auto 44px;
  border-radius:10px;
  background:linear-gradient(90deg,transparent,#ff6b00,#1450b8,transparent);
}

.sections{
  display:flex;
  flex-direction:column;
  gap:26px;
}

.section{
  background:linear-gradient(135deg,#ffffff,#f8fbff);
  border-radius:30px;
  padding:30px;
  display:grid;
  grid-template-columns:100px 1fr;
  align-items:center;
  gap:25px;
  text-align:left;
  box-shadow:0 16px 35px rgba(0,0,0,0.12);
  border:1px solid #eef2f7;
  transition:.3s;
}

.section:hover{
  transform:translateY(-5px);
}

.icon{
  width:90px;
  height:90px;
  border-radius:25px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:42px;
}

.section:nth-child(1) .icon{
  background:linear-gradient(135deg,#071f47,#1450b8);
}

.section:nth-child(2) .icon{
  background:linear-gradient(135deg,#5b21b6,#8b5cf6);
}

.section:nth-child(3) .icon{
  background:linear-gradient(135deg,#d83b00,#ff8c00);
}

.info h2{
  color:#071f47;
  font-size:32px;
  margin-bottom:10px;
}

.document-link{
  display:inline-block;
  margin-top:10px;
  color:#1450b8;
  font-size:18px;
  font-weight:700;
  text-decoration:none;
  transition:.3s;
}

.document-link:hover{
  color:#ff6b00;
  text-decoration:underline;
}

.button-row{
  margin-top:45px;
}

.home-btn{
  display:inline-block;
  background:linear-gradient(135deg,#ff6b00,#ff9f1c);
  color:white;
  text-decoration:none;
  padding:18px 55px;
  border-radius:18px;
  font-size:22px;
  font-weight:900;
}

.footer{
  margin-top:35px;
  color:#51617b;
  font-size:14px;
  letter-spacing:3px;
  font-weight:900;
}

@media(max-width:900px){

  h1{
    font-size:50px;
  }

  .section{
    grid-template-columns:1fr;
    text-align:center;
  }

  .icon{
    margin:auto;
  }

}

</style>
</head>
