<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Report</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.sendReport = function () {

  const title = document.getElementById("title").value.trim();

  if (!title) {
    alert("The Title is required");
    document.getElementById("title").focus();
    return;
  }

  const newRef = push(ref(db, "smsReports"));

  set(newRef, {
    reportId: Date.now(),
    title: title,
    reporterName: document.getElementById("name").value,
    date: document.getElementById("date").value,
    flightNumber: document.getElementById("flightNumber").value,
    aircraftRegistration: document.getElementById("aircraftRegistration").value,
    airport: document.getElementById("airport").value,
    destination: document.getElementById("destination").value,
    reportType: document.getElementById("reportType").value,
    whatHappened: document.getElementById("what").value,
    recommendation: document.getElementById("recommendation").value,
    status: "OPEN",
    risk: "NOT ASSESSED",
    timestamp: new Date().toISOString()
  })
  .then(() => {

    alert("SMS Report Saved Successfully!");

    document.querySelectorAll("input, textarea, select").forEach(field => {
      field.value = "";
    });

    document.getElementById("title").focus();

  })
  .catch((error) => {
    alert("Error Saving Report: " + error.message);
  });

};
</script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  background:
  linear-gradient(rgba(5,20,55,0.84), rgba(5,20,55,0.90)),
  url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  padding:35px;
}

.container{
  width:100%;
  max-width:1050px;
  margin:auto;
  background:rgba(255,255,255,0.97);
  padding:50px;
  border-radius:35px;
  box-shadow:0 25px 70px rgba(0,0,0,0.38);
}

.logo{
  width:100px;
  height:100px;
  margin:auto;
  border-radius:50%;
  background:linear-gradient(135deg,#071f47,#ff9800);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:44px;
  margin-bottom:20px;
}

h1{
  text-align:center;
  color:#071f47;
  font-size:58px;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#56657d;
  font-size:20px;
  margin-bottom:35px;
}

.form-card{
  background:white;
  border-radius:30px;
  padding:35px;
  box-shadow:0 14px 32px rgba(0,0,0,0.12);
  border-left:8px solid #ff9800;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
}

.full{
  grid-column:1 / 3;
}

label{
  font-weight:bold;
  display:block;
  margin-bottom:8px;
  color:#071f47;
  font-size:17px;
}

input,
textarea,
select{
  width:100%;
  padding:16px;
  border:1px solid #d4dbe8;
  border-radius:16px;
  font-size:17px;
  font-family:Arial, sans-serif;
  outline:none;
  background:#f8fbff;
}

textarea{
  height:135px;
  resize:none;
}

input:focus,
textarea:focus,
select:focus{
  border-color:#1450b8;
  box-shadow:0 0 0 4px rgba(20,80,184,0.15);
  background:white;
}

.required{
  color:red;
}

.buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:30px;
}

button,
.database-btn,
.back{
  min-height:62px;
  border:none;
  border-radius:18px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.3s;
}

button{
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
  color:white;
  box-shadow:0 10px 24px rgba(0,0,0,0.25);
}

button:hover,
.database-btn:hover,
.back:hover{
  transform:translateY(-4px);
}

.database-btn{
  background:linear-gradient(135deg,#00a2ff,#00d4ff);
  color:white;
  box-shadow:0 10px 24px rgba(0,0,0,0.25);
}

.back{
  grid-column:1 / 3;
  background:linear-gradient(135deg,#d40000,#ff2b2b);
  color:white;
  box-shadow:0 10px 24px rgba(0,0,0,0.25);
}

.footer{
  margin-top:30px;
  text-align:center;
  color:#51617b;
  font-size:14px;
  letter-spacing:3px;
  font-weight:bold;
}

@media(max-width:800px){
  .container{
    padding:30px 22px;
  }

  h1{
    font-size:42px;
  }

  .grid,
  .buttons{
    grid-template-columns:1fr;
  }

  .full,
  .back{
    grid-column:1;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">📝</div>

  <h1>SMS Report Form</h1>

  <div class="subtitle">
    Aviation Safety Management Reporting System
  </div>

  <div class="form-card">

    <div class="grid">

      <div class="full">
        <label>Title <span class="required">*</span></label>
        <input id="title" type="text" placeholder="Enter report title">
      </div>

      <div>
        <label>Name</label>
        <input id="name" type="text" placeholder="Reporter name">
      </div>

      <div>
        <label>Date</label>
        <input id="date" type="date">
      </div>

      <div>
        <label>Flight Number</label>
        <input id="flightNumber" type="text" placeholder="Example: AV1234">
      </div>

      <div>
        <label>Aircraft Registration</label>
        <input id="aircraftRegistration" type="text" placeholder="Example: N123XX">
      </div>

      <div>
        <label>Airport</label>
        <input id="airport" type="text" placeholder="Example: KOPF, KMIA, KBOS">
      </div>

      <div>
        <label>Destination</label>
        <input id="destination" type="text" placeholder="Destination airport">
      </div>

      <div class="full">
        <label>Type Report</label>
        <select id="reportType">
          <option value="">Select report type</option>
          <option value="MOR">MOR</option>
          <option value="VOR">VOR</option>
        </select>
      </div>

      <div class="full">
        <label>What Happened?</label>
        <textarea id="what" placeholder="Describe what happened"></textarea>
      </div>

      <div class="full">
        <label>Recommendation to Prevent Recurrence</label>
        <textarea id="recommendation" placeholder="Write a simple recommendation to avoid this event again"></textarea>
      </div>

    </div>

    <div class="buttons">

      <button type="button" onclick="sendReport()">
        ✅ Send Report
      </button>

      <a class="database-btn" href="SMS-Database.html">
        📊 Open SMS Database
      </a>

      <a class="back" href="Hazard-Identification.html">
        ← Back to Hazard Identification
      </a>

    </div>

  </div>

  <div class="footer">
    AVIATION SAFETY MANAGEMENT PLATFORM
  </div>

</div>

</body>
</html>
