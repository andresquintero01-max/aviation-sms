<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Report</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.sendReport = function () {

  const what = document.getElementById("what").value;
  const date = document.getElementById("date").value;

  if (!what || !date) {
    alert("Fill all fields");
    return;
  }

  const newRef = push(ref(db, "smsReports"));

  set(newRef, {
    reportId: Date.now(),
    whatHappened: what,
    date: date,
    status: "OPEN",
    risk: "NOT ASSESSED",
    timestamp: new Date().toISOString()
  }).then(() => {
    window.location.href = "Hazard-Identification.html";
  });

};
</script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  background:
  linear-gradient(rgba(5,20,55,0.82), rgba(5,20,55,0.88)),
  url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:35px;
}

.container{
  width:100%;
  max-width:850px;
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(8px);
  padding:55px;
  border-radius:35px;
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
  position:relative;
  overflow:hidden;
  animation:fadeIn 0.8s ease;
}

.container::before{
  content:"";
  position:absolute;
  width:420px;
  height:420px;
  background:radial-gradient(circle,rgba(255,152,0,0.16),transparent 70%);
  top:-180px;
  right:-120px;
}

.logo{
  width:100px;
  height:100px;
  margin:auto;
  border-radius:50%;
  background:linear-gradient(135deg,#0b2a66,#ff9800);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:44px;
  box-shadow:0 12px 25px rgba(0,0,0,0.25);
  margin-bottom:22px;
}

h1{
  text-align:center;
  color:#071f47;
  font-size:62px;
  margin-bottom:12px;
  font-weight:800;
}

.subtitle{
  text-align:center;
  color:#56657d;
  font-size:21px;
  margin-bottom:18px;
}

.title-line{
  width:210px;
  height:4px;
  margin:0 auto 45px;
  border-radius:10px;
  background:linear-gradient(90deg,transparent,#ff9800,transparent);
}

.form-card{
  background:white;
  border-radius:30px;
  padding:35px;
  box-shadow:0 12px 28px rgba(0,0,0,0.10);
  border-left:8px solid #ff9800;
}

label{
  font-weight:bold;
  display:block;
  margin-bottom:10px;
  color:#071f47;
  font-size:20px;
}

input,
textarea{
  width:100%;
  padding:18px;
  margin-bottom:25px;
  border:1px solid #d4dbe8;
  border-radius:18px;
  font-size:18px;
  font-family:Arial, sans-serif;
  outline:none;
  transition:0.3s;
  background:#f8fbff;
}

textarea{
  height:150px;
  resize:none;
}

input{
  height:60px;
}

input:focus,
textarea:focus{
  border-color:#1c63db;
  box-shadow:0 0 0 4px rgba(28,99,219,0.15);
  background:white;
}

button,
.back{
  width:100%;
  min-height:62px;
  display:flex;
  justify-content:center;
  align-items:center;
  border:none;
  border-radius:18px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  transition:0.3s;
}

button{
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
  color:white;
  box-shadow:0 10px 22px rgba(0,0,0,0.20);
}

button:hover{
  transform:translateY(-4px);
  background:linear-gradient(135deg,#0b2a66,#1c63db);
  box-shadow:0 15px 28px rgba(0,0,0,0.28);
}

.back{
  margin-top:20px;
  background:linear-gradient(135deg,#d40000,#ff2b2b);
  color:white;
  box-shadow:0 10px 22px rgba(0,0,0,0.25);
}

.back:hover{
  transform:translateY(-4px);
  background:linear-gradient(135deg,#ff2b2b,#ff4d4d);
}

.footer{
  margin-top:35px;
  text-align:center;
  color:#51617b;
  font-size:14px;
  letter-spacing:3px;
  font-weight:bold;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@media(max-width:750px){

  .container{
    padding:35px 22px;
  }

  h1{
    font-size:44px;
  }

  .subtitle{
    font-size:18px;
  }

  .form-card{
    padding:25px;
  }

}

</style>

</head>

<body>

<div class="container">

  <div class="logo">📝</div>

  <h1>SMS Report Form</h1>

  <div class="subtitle">
    Aviation Safety Management Reporting System
  </div>

  <div class="title-line"></div>

  <div class="form-card">

    <label>What happened?</label>
    <textarea id="what" placeholder="Describe the event, hazard or safety concern"></textarea>

    <label>Date</label>
    <input type="date" id="date">

    <button onclick="sendReport()">
      Send Report
    </button>

    <a class="back" href="Hazard-Identification.html">
      ← Back to Hazard Identification
    </a>

  </div>

  <div class="footer">
    AVIATION SAFETY MANAGEMENT PLATFORM
  </div>

</div>

</body>
</html>
