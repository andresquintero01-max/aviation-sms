<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Report</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  
const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

  const auth = getAuth(app);

onAuthStateChanged(auth, async (user) => {
  if(!user){
    window.location.href = "index.html";
    return;
  }

  const snapshot = await get(child(ref(db), "users/" + user.uid));

  if(snapshot.exists()){
    const role = (snapshot.val().role || "").toLowerCase().trim();

    if(role === "tech" || role === "technician"){
      document.getElementById("smsDatabaseBtn").style.display = "none";
    }
  }
});

window.sendReport = function () {

  const title = document.getElementById("title").value.trim();

  if (!title) {
    alert("The Title is required");
    document.getElementById("title").focus();
    return;
  }

  const newRef = push(ref(db, "smsReports"));

  set(newRef, {
    reportId: Date.now(),
    title: title,
    reporterName: document.getElementById("name").value,
    date: document.getElementById("date").value,
    flightNumber: document.getElementById("flightNumber").value,
    aircraftRegistration: document.getElementById("aircraftRegistration").value,
    airport: document.getElementById("airport").value,
    destination: document.getElementById("destination").value,
    reportType: document.getElementById("reportType").value,
    whatHappened: document.getElementById("what").value,
    recommendation: document.getElementById("recommendation").value,
    status: "OPEN",
    risk: "NOT ASSESSED",
    timestamp: new Date().toISOString()
  })
  .then(() => {

    alert("SMS Report Saved Successfully!");

    document.querySelectorAll("input, textarea, select").forEach(field => {
      field.value = "";
    });

    document.getElementById("title").focus();

  })
  .catch((error) => {
    alert("Error Saving Report: " + error.message);
  });

};
</script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI', Arial, sans-serif;
  min-height:100vh;
  background:
  radial-gradient(circle at top left, rgba(255,152,0,0.28), transparent 30%),
  radial-gradient(circle at bottom right, rgba(28,99,219,0.42), transparent 38%),
  linear-gradient(rgba(5,20,55,0.86), rgba(5,20,55,0.94)),
  url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  padding:35px;
}

.container{
  width:100%;
  max-width:1080px;
  margin:auto;
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(14px);
  padding:55px;
  border-radius:40px;
  box-shadow:0 30px 80px rgba(0,0,0,0.45);
  position:relative;
  overflow:hidden;
}

.container::before{
  content:"";
  position:absolute;
  width:460px;
  height:460px;
  background:radial-gradient(circle,rgba(20,80,184,0.17),transparent 70%);
  top:-190px;
  right:-150px;
}

.container::after{
  content:"";
  position:absolute;
  width:340px;
  height:340px;
  background:radial-gradient(circle,rgba(255,152,0,0.18),transparent 70%);
  bottom:-150px;
  left:-120px;
}

.content{
  position:relative;
  z-index:2;
}

.logo{
  width:112px;
  height:112px;
  margin:auto;
  border-radius:32px;
  background:linear-gradient(135deg,#071f47,#1450b8,#ff9800);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:50px;
  margin-bottom:22px;
  box-shadow:0 18px 40px rgba(0,0,0,0.30);
}

.badge{
  display:block;
  width:max-content;
  margin:0 auto 16px auto;
  background:#eaf2ff;
  color:#071f47;
  padding:10px 24px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
  letter-spacing:1.8px;
}

h1{
  text-align:center;
  color:#071f47;
  font-size:60px;
  margin-bottom:10px;
  font-weight:900;
}

.subtitle{
  text-align:center;
  color:#56657d;
  font-size:21px;
  margin-bottom:22px;
  font-weight:500;
}

.title-line{
  width:230px;
  height:6px;
  margin:0 auto 42px;
  border-radius:10px;
  background:linear-gradient(90deg,transparent,#ff9800,#1450b8,transparent);
}

.form-card{
  background:linear-gradient(135deg,#ffffff,#f8fbff);
  border-radius:32px;
  padding:36px;
  box-shadow:0 16px 38px rgba(0,0,0,0.13);
  border-left:10px solid #ff9800;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
}

.full{
  grid-column:1 / 3;
}

label{
  font-weight:900;
  display:block;
  margin-bottom:8px;
  color:#071f47;
  font-size:17px;
}

input,
textarea,
select{
  width:100%;
  padding:16px;
  border:1px solid #d4dbe8;
  border-radius:16px;
  font-size:17px;
  font-family:'Segoe UI', Arial, sans-serif;
  outline:none;
  background:#f8fbff;
  transition:0.25s;
}

textarea{
  height:135px;
  resize:none;
}

input:focus,
textarea:focus,
select:focus{
  border-color:#1450b8;
  box-shadow:0 0 0 4px rgba(20,80,184,0.15);
  background:white;
}

.required{
  color:#dc2626;
}

.buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:35px;
}

button,
.database-btn,
.home-btn,
.hazard-btn{
  min-height:64px;
  border:none;
  border-radius:18px;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.3s;
  color:white;
  box-shadow:0 12px 26px rgba(0,0,0,0.25);
}

button{
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
}

.database-btn{
  background:linear-gradient(135deg,#00a2ff,#00d4ff);
}

.home-btn{
  background:linear-gradient(135deg,#071f47,#1450b8);
}

.hazard-btn{
  background:linear-gradient(135deg,#d83b00,#ff9800);
}

button:hover,
.database-btn:hover,
.home-btn:hover,
.hazard-btn:hover{
  transform:translateY(-4px);
}

.footer{
  margin-top:32px;
  text-align:center;
  color:#51617b;
  font-size:14px;
  letter-spacing:3px;
  font-weight:900;
}

@media(max-width:800px){
  body{
    padding:20px;
  }

  .container{
    padding:35px 22px;
    border-radius:32px;
  }

  h1{
    font-size:42px;
  }

  .subtitle{
    font-size:18px;
  }

  .grid,
  .buttons{
    grid-template-columns:1fr;
  }

  .full{
    grid-column:1;
  }
}
</style>
</head>

<body>

<div class="container">
<div class="content">

  <div class="logo">📝</div>

  <div class="badge">HAZARD REPORTING</div>

  <h1>SMS Report Form</h1>

  <div class="subtitle">
    Aviation Safety Management Reporting System
  </div>

  <div class="title-line"></div>

  <div class="form-card">

    <div class="grid">

      <div class="full">
        <label>Title <span class="required">*</span></label>
        <input id="title" type="text" placeholder="Enter report title">
      </div>

      <div>
        <label>Name</label>
        <input id="name" type="text" placeholder="Reporter name">
      </div>

      <div>
        <label>Date</label>
        <input id="date" type="date">
      </div>

      <div>
        <label>Flight Number</label>
        <input id="flightNumber" type="text" placeholder="Example: AV1234">
      </div>

      <div>
        <label>Aircraft Registration</label>
        <input id="aircraftRegistration" type="text" placeholder="Example: N123XX">
      </div>

      <div>
        <label>Airport</label>
        <input id="airport" type="text" placeholder="Example: KOPF, KMIA, KBOS">
      </div>

      <div>
        <label>Destination</label>
        <input id="destination" type="text" placeholder="Destination airport">
      </div>

      <div class="full">
        <label>Type Report</label>
        <select id="reportType">
          <option value="">Select report type</option>
          <option value="MOR">MOR</option>
          <option value="VOR">VOR</option>
        </select>
      </div>

      <div class="full">
        <label>What Happened?</label>
        <textarea id="what" placeholder="Describe what happened"></textarea>
      </div>

      <div class="full">
        <label>Recommendation to Prevent Recurrence</label>
        <textarea id="recommendation" placeholder="Write a simple recommendation to avoid this event again"></textarea>
      </div>

    </div>

    <div class="buttons">

      <button type="button" onclick="sendReport()">
        ✅ Send Report
      </button>

      <a class="database-btn" id="smsDatabaseBtn" href="SMS-Database.html">
      📊 SMS Database
      </a>

      <a class="home-btn" href="index.html">
        🏠 Home
      </a>

      <a class="hazard-btn" href="Hazard-Identification.html">
        ⚠️ Hazard Identification
      </a>

    </div>

  </div>

  <div class="footer">
    AVIATION SAFETY MANAGEMENT PLATFORM
  </div>

</div>
</div>

</body>
</html>
