<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMS Report</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.sendReport = function () {

  const what = document.getElementById("what").value;
  const date = document.getElementById("date").value;

  if (!what || !date) {
    alert("Fill all fields");
    return;
  }

  const newRef = push(ref(db, "smsReports"));

  set(newRef, {
    reportId: Date.now(),
    whatHappened: what,
    date: date,
    status: "OPEN",
    risk: "NOT ASSESSED",
    timestamp: new Date().toISOString()
  }).then(() => {
    window.location.href = "Hazard-Identification.html";
  });

};
</script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
}

/* MAIN CONTAINER */
.container{
  width:100%;
  max-width:620px;
  background:white;
  padding:45px;
  border-radius:28px;
  box-shadow:0 18px 45px rgba(0,0,0,0.3);
}

/* TITLE */
h1{
  text-align:center;
  color:#071f47;
  font-size:46px;
  margin-bottom:12px;
}

/* SUBTITLE */
.subtitle{
  text-align:center;
  color:#666;
  font-size:18px;
  margin-bottom:35px;
}

/* LABELS */
label{
  font-weight:bold;
  display:block;
  margin-bottom:8px;
  color:#333;
  font-size:18px;
}

/* INPUTS SAME SIZE */
input,
textarea{
  width:100%;
  height:55px;
  padding:14px;
  margin-bottom:22px;
  border:1px solid #ccc;
  border-radius:14px;
  font-size:17px;
  font-family:Arial, sans-serif;
  outline:none;
  transition:0.3s;
  background:#f9fbfd;
}

textarea{
  height:55px;
  resize:none;
}

input:focus,
textarea:focus{
  border-color:#071f47;
  box-shadow:0 0 0 3px rgba(7,31,71,0.15);
  background:white;
}

/* BUTTONS SAME SIZE */
button,
.back{
  width:100%;
  height:58px;
  display:flex;
  justify-content:center;
  align-items:center;
  border:none;
  border-radius:16px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  transition:0.3s;
}

/* SEND BUTTON */
button{
  background:linear-gradient(135deg,#071f47,#0b2a66);
  color:white;
  margin-top:5px;
  box-shadow:0 10px 22px rgba(0,0,0,0.2);
}

button:hover{
  transform:translateY(-4px);
  background:linear-gradient(135deg,#0b2a66,#1c63db);
  box-shadow:0 15px 28px rgba(0,0,0,0.3);
}

/* BACK BUTTON */
.back{
  margin-top:18px;
  background:linear-gradient(135deg,#c40000,#ff2b2b);
  color:white;
  box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

.back:hover{
  transform:translateY(-3px);
  background:linear-gradient(135deg,#ff2b2b,#ff5555);
  box-shadow:0 12px 22px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="container">

  <h1>SMS Report Form</h1>

  <div class="subtitle">
    Aviation Safety Management Reporting System
  </div>

  <label>What happened?</label>
  <textarea id="what" placeholder="Describe the event or hazard"></textarea>

  <label>Date</label>
  <input type="date" id="date">

  <button onclick="sendReport()">Send Report</button>

  <a class="back" href="Hazard-Identification.html">Back to Hazard Identification</a>

</div>

</body>
</html>
