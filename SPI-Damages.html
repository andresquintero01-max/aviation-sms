<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aircraft Damages SPI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  font-family:Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:25px;
}

h1{
  text-align:center;
  color:#071f47;
  margin-bottom:25px;
  font-size:38px;
}

.top-buttons{
  text-align:center;
  margin-bottom:25px;
}

button{
  background:#071f47;
  color:white;
  border:none;
  padding:12px 22px;
  border-radius:10px;
  cursor:pointer;
  margin:5px;
  font-size:15px;
  font-weight:bold;
}

button:hover{
  opacity:0.85;
}

.print-btn{
  background:#198754;
}

.add-btn{
  background:#6f42c1;
}

.back-btn{
  background:#dc3545;
}

.home-btn{
  background:#555;
}

.year-save-btn{
  background:#198754;
  padding:10px 18px;
}

.year-section{
  background:white;
  padding:28px;
  margin-bottom:35px;
  border-radius:18px;
  box-shadow:0 8px 22px rgba(0,0,0,0.12);
}

.year-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.year-title{
  font-size:32px;
  color:#071f47;
  font-weight:bold;
}

.right-buttons{
  display:flex;
  gap:10px;
}

.delete-year-btn{
  background:#dc3545;
  padding:10px 14px;
  border-radius:10px;
  font-size:18px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:25px;
  border-radius:12px;
  overflow:hidden;
}

th{
  background:#071f47;
  color:white;
  padding:12px 8px;
  font-size:15px;
}

td{
  border:1px solid #d0d7de;
  padding:7px 5px;
  text-align:center;
  font-size:14px;
}

tr:nth-child(even){
  background:#fafafa;
}

input{
  width:72px;
  padding:7px;
  text-align:center;
  border:1px solid #aaa;
  border-radius:8px;
  font-size:14px;
  font-weight:bold;
  background:white;
}

.rate{
  background:#f1f3f5;
  color:#071f47;
  font-weight:bold;
}

.summary{
  font-weight:bold;
  background:#e9ecef !important;
  color:#071f47;
}

canvas{
  background:white;
  margin-top:20px;
}

.historical{
  background:white;
  padding:28px;
  border-radius:18px;
  box-shadow:0 8px 22px rgba(0,0,0,0.12);
}

</style>
</head>

<body>

<h1>Aircraft Damages - Safety Performance Indicator</h1>

<div class="top-buttons">

  <button class="print-btn" onclick="window.print()">
    Print
  </button>

  <button class="add-btn" onclick="addYear()">
    + Add Year
  </button>

  <button class="back-btn"
  onclick="window.location.href='Safety-Performance-Indicators.html'">
    Back to Safety Performance Indicator
  </button>

  <button class="home-btn"
  onclick="window.location.href='index.html'">
    Home
  </button>

</div>

<div id="yearsContainer"></div>

<div class="historical">

  <h2 style="text-align:center;color:#071f47;">
    Historical Trend
  </h2>

  <canvas id="historicalChart"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  get
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const months = [
"JAN","FEB","MAR","APR","MAY","JUN",
"JUL","AUG","SEP","OCT","NOV","DEC"
];

let years = [2024,2025,2026];

let charts = {};
let historicalChart;

window.onload = loadData;

function defaultData(){

  let data = {};

  years.forEach(year=>{

    data[year] = months.map(month=>({
      month:month,
      workhours:0,
      events:0
    }));

  });

  return data;
}

let spiData = defaultData();

function calculateRate(events, workhours){

  if(!workhours || workhours <= 0){
    return 0;
  }

  return (events / workhours) * 10000;
}

function renderAll(){

  const container = document.getElementById("yearsContainer");

  container.innerHTML = "";

  years.forEach(year=>{

    const section = document.createElement("div");

    section.className = "year-section";

    section.innerHTML = `

      <div class="year-header">

        <div class="year-title">${year}</div>

        <div class="right-buttons">

          <button class="year-save-btn"
          onclick="saveData()">
            Save
          </button>

          <button class="delete-year-btn"
          onclick="deleteYear(${year})">
            🗑
          </button>

        </div>

      </div>

      <table>

        <thead>
          <tr>
            <th>Month</th>
            <th>Work Hours or Flight Hours</th>
            <th>Events</th>
            <th>Event Rate</th>
          </tr>
        </thead>

        <tbody id="table-${year}"></tbody>

      </table>

      <canvas id="chart-${year}"></canvas>

    `;

    container.appendChild(section);

    renderTable(year);

    renderYearChart(year);

  });

  renderHistoricalChart();
}

function renderTable(year){

  const tbody = document.getElementById(`table-${year}`);

  tbody.innerHTML = "";

  let rates = [];

  spiData[year].forEach((row,index)=>{

    const rate = calculateRate(row.events,row.workhours);

    rates.push(rate);

    tbody.innerHTML += `

      <tr>

        <td><strong>${row.month}</strong></td>

        <td>
          <input type="number"
          value="${row.workhours}"
          onchange="updateValue(${year},${index},'workhours',this.value)">
        </td>

        <td>
          <input type="number"
          value="${row.events}"
          onchange="updateValue(${year},${index},'events',this.value)">
        </td>

        <td class="rate">
          ${rate.toFixed(2)}
        </td>

      </tr>

    `;
  });

  if(year >= 2025){

    tbody.innerHTML += `

      <tr style="background:#d4edda;font-weight:bold;">
        <td colspan="3">Acceptable</td>
        <td>1.00</td>
      </tr>

      <tr style="background:#fff3cd;font-weight:bold;">
        <td colspan="3">Tolerable</td>
        <td>2.00</td>
      </tr>

      <tr style="background:#f8d7da;font-weight:bold;">
        <td colspan="3">Not Acceptable</td>
        <td>3.00</td>
      </tr>

    `;
  }

}

window.updateValue = function(year,index,field,value){

  spiData[year][index][field] = Number(value);

  renderAll();
}

function renderYearChart(year){

  const ctx = document.getElementById(`chart-${year}`);

  if(charts[year]){
    charts[year].destroy();
  }

  const rates = spiData[year].map(row=>
    calculateRate(row.events,row.workhours)
  );

  let datasets = [

    {
      label:String(year),
      data:rates,
      borderWidth:3,
      tension:0.25,
      pointRadius:5
    }

  ];

  if(year >= 2025){

    datasets.push(
      {
        label:"Acceptable",
        data:months.map(()=>1),
        borderDash:[5,5],
        pointRadius:0,
        borderWidth:2
      },

      {
        label:"Tolerable",
        data:months.map(()=>2),
        borderDash:[5,5],
        pointRadius:0,
        borderWidth:2
      },

      {
        label:"Not Acceptable",
        data:months.map(()=>3),
        borderDash:[5,5],
        pointRadius:0,
        borderWidth:2
      }
    );
  }

  charts[year] = new Chart(ctx,{

    type:"line",

    data:{
      labels:months,
      datasets:datasets
    },

    options:{
      responsive:true,

      plugins:{
        title:{
          display:true,
          text:"Event Rate"
        }
      },

      scales:{
        y:{
          beginAtZero:true
        }
      }
    }

  });
}

function renderHistoricalChart(){

  const ctx =
  document.getElementById("historicalChart");

  if(historicalChart){
    historicalChart.destroy();
  }

  let labels = [];
  let rates = [];

  years.forEach(year=>{

    spiData[year].forEach(row=>{

      labels.push(
        row.month + "-" + String(year).slice(2)
      );

      rates.push(
        calculateRate(row.events,row.workhours)
      );

    });

  });

  historicalChart = new Chart(ctx,{

    type:"line",

    data:{
      labels:labels,

      datasets:[

        {
          label:"Historical Event Rate",
          data:rates,
          borderWidth:3,
          tension:0.25,
          pointRadius:4
        }

      ]
    }

  });
}

window.addYear = function(){

  let lastYear = Math.max(...years);

  let newYear = lastYear + 1;

  years.push(newYear);

  spiData[newYear] = months.map(month=>({

    month:month,
    workhours:0,
    events:0

  }));

  renderAll();
}

window.deleteYear = async function(year){

  if(!confirm("Delete year " + year + "?")){
    return;
  }

  years = years.filter(y => y !== year);

  delete spiData[year];

  await saveData();

  renderAll();
}

window.saveData = async function(){

  await set(
    ref(db,"SPI-Damages"),
    {
      years:years,
      data:spiData,
      updatedAt:new Date().toISOString()
    }
  );

  alert("SPI Damages saved successfully.");
}

async function loadData(){

  const snapshot =
  await get(ref(db,"SPI-Damages"));

  if(snapshot.exists()){

    const saved = snapshot.val();

    years = saved.years || [2024,2025,2026];

    spiData = saved.data || defaultData();
  }

  renderAll();
}

</script>

</body>
</html>
