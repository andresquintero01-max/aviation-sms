<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.appspot.com",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

window.uploadFile = async function () {

  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Select a file first");
    return;
  }

  try {

    const fileRef = ref(storage, "sms-policy/" + file.name);

    await uploadBytes(fileRef, file);

    const url = await getDownloadURL(fileRef);

    const li = document.createElement("li");
    li.innerHTML = `<a href="${url}" target="_blank">${file.name}</a>`;

    document.getElementById("fileList").appendChild(li);

    alert("Upload successful");

  } catch (error) {
    console.log(error);
    alert("Upload failed");
  }
};
</script>
