<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMS Dashboard</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let charts = {};

function loadDashboard(){

  const reportsRef = ref(db, "smsReports");

  onValue(reportsRef, snapshot => {

    const data = snapshot.val() || {};
    const reports = Object.values(data);

    document.getElementById("totalReports").innerText = reports.length;

    let open = 0;
    let closed = 0;

    let acceptable = 0;
    let tolerable = 0;
    let notAcceptable = 0;

    let months = {};
    let categories = {};

    reports.forEach(r => {

      /* OPEN VS CLOSED */

      const residualStatus = (
        r.residualRiskStatus ||
        r.residualStatus ||
        r.residualRiskClosed ||
        ""
      ).toString().toLowerCase();

      const isClosed =
        residualStatus.includes("closed") ||
        residualStatus === "true" ||
        residualStatus === "yes";

      if(isClosed){
        closed++;
      }else{
        open++;
      }

      /* RISK LEVEL */

      const risk = (
        r.riskLevel ||
        r.riskAssessment ||
        r.initialRiskLevel ||
        ""
      ).toString().toLowerCase();

      if(risk.includes("acceptable") && !risk.includes("not")){
        acceptable++;
      }
      else if(risk.includes("tolerable")){
        tolerable++;
      }
      else if(risk.includes("not")){
        notAcceptable++;
      }

      /* REPORTS BY MONTH */

      const dateValue =
        r.date ||
        r.reportDate ||
        r.eventDate ||
        "";

      if(dateValue){

        const month = dateValue.substring(0,7);

        months[month] = (months[month] || 0) + 1;
      }

      /* CATEGORY */

      const category =
        r.category ||
        r.eventType ||
        r.reportType ||
        "Other";

      categories[category] = (categories[category] || 0) + 1;

    });

    document.getElementById("openReports").innerText = open;
    document.getElementById("closedReports").innerText = closed;
    document.getElementById("notAcceptable").innerText = notAcceptable;

    createBarChart(
      "statusChart",
      ["Open","Closed"],
      [open,closed],
      "Open vs Closed Reports"
    );

    createPieChart(
      "riskChart",
      ["Acceptable","Tolerable","Not Acceptable"],
      [acceptable,tolerable,notAcceptable],
      "Risk Level Distribution"
    );

    createBarChart(
      "monthChart",
      Object.keys(months),
      Object.values(months),
      "Reports by Month"
    );

    createBarChart(
      "categoryChart",
      Object.keys(categories),
      Object.values(categories),
      "Reports by Category"
    );

  });

}

function destroyChart(id){

  if(charts[id]){
    charts[id].destroy();
  }

}

function createBarChart(id, labels, values, title){

  destroyChart(id);

  const ctx = document.getElementById(id);

  charts[id] = new Chart(ctx, {

    type: "bar",

    data: {
      labels: labels,
      datasets: [{
        label: title,
        data: values,
        backgroundColor: "#0b2a66",
        borderRadius: 10
      }]
    },

    options: {

      responsive: true,

      plugins: {

        legend:{
          display:false
        },

        title:{
          display:true,
          text:title
        }

      },

      scales: {

        y: {
          beginAtZero:true,
          ticks:{
            precision:0
          }
        }

      }

    }

  });

}

function createPieChart(id, labels, values, title){

  destroyChart(id);

  const ctx = document.getElementById(id);

  charts[id] = new Chart(ctx, {

    type: "pie",

    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: [
          "#2ecc71",
          "#f1c40f",
          "#e74c3c"
        ]
      }]
    },

    options: {

      responsive:true,

      plugins: {

        title:{
          display:true,
          text:title
        }

      }

    }

  });

}

window.goBack = function(){
  location.href = "index.html";
}

window.onload = loadDashboard;

</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
  padding:30px;
}

.container{
  max-width:1250px;
  margin:auto;
  background:white;
  border-radius:28px;
  padding:35px;
  box-shadow:0 18px 45px rgba(0,0,0,0.35);
}

h1{
  text-align:center;
  color:#071f47;
  font-size:54px;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#555;
  font-size:18px;
  margin-bottom:35px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:22px;
  margin-bottom:40px;
}

.card{
  background:linear-gradient(135deg,#071f47,#0b2a66);
  color:white;
  border-radius:22px;
  padding:28px;
  text-align:center;
  box-shadow:0 10px 22px rgba(0,0,0,0.25);
}

.card h2{
  font-size:42px;
  margin-bottom:10px;
}

.card p{
  font-size:18px;
}

.charts{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
  gap:30px;
}

.chart-box{
  background:#f4f6f8;
  border-radius:22px;
  padding:25px;
  box-shadow:0 8px 18px rgba(0,0,0,0.12);
}

canvas{
  width:100% !important;
  max-height:360px;
}

.back-btn{
  margin-top:40px;
  width:100%;
  padding:18px;
  border:none;
  border-radius:16px;
  background:#c0392b;
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.back-btn:hover{
  background:#922b21;
}

@media(max-width:700px){

  h1{
    font-size:38px;
  }

  .charts{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="container">

  <h1>SMS Dashboard</h1>

  <div class="subtitle">
    Safety Management System Performance Overview
  </div>

  <div class="cards">

    <div class="card">
      <h2 id="totalReports">0</h2>
      <p>Total SMS Reports</p>
    </div>

    <div class="card">
      <h2 id="openReports">0</h2>
      <p>Open Reports</p>
    </div>

    <div class="card">
      <h2 id="closedReports">0</h2>
      <p>Closed Reports</p>
    </div>

    <div class="card">
      <h2 id="notAcceptable">0</h2>
      <p>Not Acceptable Risk</p>
    </div>

  </div>

  <div class="charts">

    <div class="chart-box">
      <canvas id="statusChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="riskChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="monthChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="categoryChart"></canvas>
    </div>

  </div>

  <button class="back-btn" onclick="goBack()">
    Back to Home
  </button>

</div>

</body>
</html>
