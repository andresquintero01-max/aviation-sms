<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FRAT Database</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
  padding:30px;
}

.container{
  max-width:1000px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:25px;
  box-shadow:0 18px 45px rgba(0,0,0,0.3);
}

h1{
  text-align:center;
  color:#071f47;
  font-size:46px;
  margin-bottom:10px;
}

.description{
  text-align:center;
  color:#666;
  font-size:18px;
  margin-bottom:35px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th{
  background:#071f47;
  color:white;
  padding:14px;
  font-size:16px;
}

td{
  border:1px solid #ddd;
  padding:12px;
  text-align:center;
  font-size:15px;
}

tr:nth-child(even){
  background:#f4f6f8;
}

.report-link{
  color:#071f47;
  font-weight:bold;
  text-decoration:none;
}

.report-link:hover{
  color:#1450b8;
  text-decoration:underline;
}

.no-data{
  text-align:center;
  color:#777;
  font-size:18px;
  margin-top:30px;
}

.buttons{
  text-align:center;
  margin-top:30px;
}

.btn{
  border:none;
  color:white;
  padding:14px 28px;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin:6px;
}

.back-btn{
  background:#c40000;
}

.home-btn{
  background:#071f47;
}

/* EDIT BUTTON */

.edit-btn{
  background:#1450b8;
  color:white;
  border:none;
  padding:8px 18px;
  border-radius:8px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.edit-btn:hover{
  background:#0b2a66;
  transform:scale(1.05);
}

/* REPORT NUMBER */

.report-number{
  width:180px;
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
  text-align:center;
  font-weight:bold;
}

/* SAVE BUTTON */

.save-btn{
  background:#2f9144;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  margin-left:8px;
}

.save-btn:hover{
  background:#1f6e31;
}

/* DELETE BUTTON */

.delete-btn{
  background:red;
  color:white;
  border:none;
  width:42px;
  height:42px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
  font-weight:bold;
  transition:0.3s;
}

.delete-btn:hover{
  background:#b30000;
  transform:scale(1.08);
}

.action-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
}

</style>
</head>

<body>

<div class="container">

  <h1>FRAT Database</h1>

  <div class="description">
    Stored Flight Risk Assessment Tool reports
  </div>

  <table>
    <thead>
      <tr>
        <th>FRAT Report Number</th>
      </tr>
    </thead>

    <tbody id="fratTableBody">
    </tbody>
  </table>

  <div id="noData" class="no-data" style="display:none;">
    No FRAT reports found.
  </div>

  <div class="buttons">
    <button class="btn back-btn" onclick="window.location.href='FRAT.html'">
      Back to FRAT
    </button>

    <button class="btn home-btn" onclick="window.location.href='index.html'">
      Home
    </button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  update,
  remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const tableBody = document.getElementById("fratTableBody");
const noData = document.getElementById("noData");

const reportsRef = ref(database, "fratReports");

onValue(reportsRef, (snapshot) => {

  tableBody.innerHTML = "";

  if(snapshot.exists()){

    noData.style.display = "none";

    snapshot.forEach((childSnapshot) => {

      const firebaseId = childSnapshot.key;
      const data = childSnapshot.val();

      const reportNumber =
        data.reportNumber ||
        "FRAT-" + firebaseId.substring(0,8);

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>

          <input
            type="text"
            class="report-number"
            id="report-${firebaseId}"
            value="${reportNumber}"
          >

          <button
            class="save-btn"
            onclick="saveReportNumber('${firebaseId}')"
          >
            Save
          </button>

          <button
            class="edit-btn"
            onclick="editReport('${firebaseId}')"
          >
            Edit
          </button>

          <button
            class="delete-btn"
            onclick="deleteReport('${firebaseId}')"
          >
            🗑
          </button>

        </td>
      `;

      tableBody.appendChild(row);

    });

  } else {

    noData.style.display = "block";

  }

});

/* SAVE REPORT NUMBER */

window.saveReportNumber = function(firebaseId){

  const value = document
    .getElementById("report-" + firebaseId)
    .value
    .trim();

  if(value === ""){
    alert("Report Number cannot be empty.");
    return;
  }

  update(
    ref(database, "fratReports/" + firebaseId),
    {
      reportNumber:value
    }
  )
  .then(() => {

    alert("FRAT Report Number updated successfully.");

  })
  .catch((error) => {

    alert("Error updating report: " + error.message);

  });

};

/* EDIT REPORT */

window.editReport = function(firebaseId){

  window.location.href =
    "FRAT.html?id=" + firebaseId + "&edit=true";

};

/* DELETE REPORT */

window.deleteReport = function(firebaseId){

  const confirmDelete = confirm(
    "Are you sure you want to permanently delete this FRAT report?"
  );

  if(!confirmDelete) return;

  remove(
    ref(database, "fratReports/" + firebaseId)
  )
  .then(() => {

    alert("FRAT Report deleted successfully.");

  })
  .catch((error) => {

    alert("Error deleting report: " + error.message);

  });

};

</script>

</body>
</html>
