<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FRAT Database</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI', Arial, sans-serif;
  min-height:100vh;
  background:
  radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 28%),
  linear-gradient(135deg,#061b3d,#082b66,#1450b8);
  padding:35px;
}

.container{
  max-width:1250px;
  margin:auto;
  background:rgba(255,255,255,0.97);
  padding:45px;
  border-radius:32px;
  box-shadow:0 25px 65px rgba(0,0,0,0.35);
}

h1{
  text-align:center;
  color:#071f47;
  font-size:54px;
  margin-bottom:8px;
}

.description{
  text-align:center;
  color:#555;
  font-size:18px;
  margin-bottom:30px;
}

.filter-box{
  background:#eef4ff;
  border:1px solid #c8d8f0;
  padding:22px;
  border-radius:22px;
  margin-bottom:28px;
}

.filter-title{
  font-weight:bold;
  color:#071f47;
  margin-bottom:15px;
  font-size:20px;
}

.filter-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.filter-field label{
  display:block;
  color:#071f47;
  font-size:13px;
  font-weight:bold;
  margin-bottom:6px;
}

.filter-field input,
.filter-field select{
  width:100%;
  padding:13px;
  border:1px solid #b8c7da;
  border-radius:14px;
  font-size:15px;
  background:white;
}

.top-buttons{
  text-align:center;
  margin-bottom:30px;
}

.btn{
  border:none;
  color:white;
  padding:13px 25px;
  border-radius:14px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  margin:6px;
  transition:0.25s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

.back-btn{
  background:linear-gradient(135deg,#c40000,#ff2b2b);
}

.home-btn{
  background:linear-gradient(135deg,#071f47,#0b2a66);
}

.clear-btn{
  background:linear-gradient(135deg,#555,#777);
}

.report-card{
  background:white;
  border-radius:24px;
  padding:24px;
  margin-bottom:22px;
  box-shadow:0 10px 28px rgba(0,0,0,0.12);
  border-left:9px solid #071f47;
  transition:0.25s;
}

.report-card:hover{
  transform:scale(1.01);
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.event-title{
  font-size:25px;
  font-weight:800;
  color:#071f47;
  margin-bottom:6px;
}

.meta{
  color:#555;
  font-size:15px;
  line-height:1.7;
}

.status{
  display:inline-block;
  padding:7px 16px;
  border-radius:999px;
  color:white;
  font-size:13px;
  font-weight:bold;
}

.status.open{
  background:#0b8a3a;
}

.status.closed{
  background:#555;
}

.details-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin-top:18px;
}

.detail-box{
  background:#f4f7fb;
  padding:14px;
  border-radius:16px;
  border:1px solid #dce3ef;
}

.detail-label{
  font-size:12px;
  color:#777;
  font-weight:bold;
  text-transform:uppercase;
  margin-bottom:6px;
}

.detail-value{
  font-size:15px;
  color:#071f47;
  font-weight:700;
  word-break:break-word;
}

.frat-id-input{
  width:100%;
  padding:11px;
  border:1px solid #cbd5e1;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  color:#071f47;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:22px;
  align-items:center;
}

.open-btn{
  background:linear-gradient(135deg,#004aad,#1473e6);
}

.save-btn{
  background:linear-gradient(135deg,#006b3c,#00a65a);
}

.status-btn{
  background:linear-gradient(135deg,#6b21a8,#9333ea);
}

.delete-btn{
  background:linear-gradient(135deg,#d00000,#ff1f1f);
  width:48px;
  height:48px;
  border-radius:50%;
  padding:0;
  font-size:20px;
}

.separator-buttons{
  text-align:center;
  margin:28px 0;
  padding:18px;
  background:#eef4ff;
  border-radius:22px;
  border:1px dashed #9bb7e0;
}

.no-data{
  text-align:center;
  color:#777;
  font-size:19px;
  margin-top:35px;
  background:#f4f6f8;
  padding:35px;
  border-radius:22px;
}

.counter{
  text-align:center;
  color:#071f47;
  font-weight:bold;
  margin-bottom:18px;
}

.small-note{
  font-size:12px;
  color:#777;
  margin-top:6px;
}

@media(max-width:700px){
  h1{font-size:40px;}
  .container{padding:25px;}
  .event-title{font-size:21px;}
}
</style>
</head>

<body>

<div class="container">

  <h1>FRAT Database</h1>

  <div class="description">
    Stored Flight Risk Assessment Tool Reports
  </div>

  <div class="filter-box">
    <div class="filter-title">Excel Style Filters</div>

    <div class="filter-grid">

      <div class="filter-field">
        <label>Search Anything</label>
        <input 
          id="searchInput" 
          placeholder="Search by ID, name, license, risk, date..."
          oninput="applyFilter()"
        >
      </div>

      <div class="filter-field">
        <label>Status</label>
        <select id="statusFilter" onchange="applyFilter()">
          <option value="">All Status</option>
          <option value="Open">Open</option>
          <option value="Closed">Closed</option>
        </select>
      </div>

      <div class="filter-field">
        <label>Risk Level</label>
        <select id="riskFilter" onchange="applyFilter()">
          <option value="">All Risk Levels</option>
          <option value="LOW RISK">Low Risk</option>
          <option value="MODERATE RISK">Moderate Risk</option>
          <option value="HIGH RISK">High Risk</option>
        </select>
      </div>

      <div class="filter-field">
        <label>Pilot Type</label>
        <select id="pilotFilter" onchange="applyFilter()">
          <option value="">All Pilot Types</option>
          <option value="VFR">VFR</option>
          <option value="IFR">IFR</option>
        </select>
      </div>

      <div class="filter-field">
        <label>Sort By</label>
        <select id="sortFilter" onchange="applyFilter()">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="riskHigh">Highest Risk First</option>
          <option value="riskLow">Lowest Risk First</option>
          <option value="nameAZ">Pilot Name A-Z</option>
        </select>
      </div>

    </div>

    <div style="text-align:center;margin-top:18px;">
      <button class="btn clear-btn" onclick="clearFilters()">Clear Filters</button>
    </div>
  </div>

  <div class="top-buttons">
    <button class="btn back-btn" onclick="window.location.href='FRAT.html'">
      Back to FRAT
    </button>

    <button class="btn home-btn" onclick="window.location.href='index.html'">
      Home
    </button>
  </div>

  <div id="counter" class="counter"></div>

  <div id="fratList"></div>

  <div id="noData" class="no-data" style="display:none;">
    No FRAT reports found.
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  remove,
  update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const fratList = document.getElementById("fratList");
const noData = document.getElementById("noData");
const counter = document.getElementById("counter");

let allReports = [];

function clean(value){
  return String(value || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function statusClass(status){
  return String(status || "Open").toLowerCase().replaceAll(" ","-");
}

function riskNumber(report){
  const value = Number(report.totalRiskValue);
  return isNaN(value) ? 0 : value;
}

function renderReports(reports){

  fratList.innerHTML = "";

  if(reports.length === 0){
    noData.style.display = "block";
    counter.innerHTML = "0 reports found";
    return;
  }

  noData.style.display = "none";
  counter.innerHTML = reports.length + " report(s) found";

  reports.forEach((report, index) => {

    const firebaseId = report.firebaseId;

    const fratVisibleId =
      report.fratId ||
      report.customId ||
      firebaseId;

    const pilotName =
      report.pilotName ||
      "N/A";

    const license =
      report.licenseNumber ||
      "N/A";

    const riskLevel =
      report.riskLevel ||
      "N/A";

    const totalRisk =
      report.totalRiskValue ?? "N/A";

    const date =
      report.createdAt ||
      report.date ||
      "N/A";

    const status =
      report.status || "Open";

    const pilotType =
      report.pilotType || "N/A";

    const experience =
      report.experienceLevel || "N/A";

    const card = document.createElement("div");
    card.className = "report-card";

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="event-title">
            ${clean(fratVisibleId)} | ${clean(pilotName)}
          </div>

          <div class="meta">
            <strong>Date:</strong> ${clean(date)}<br>
            <strong>Risk:</strong> ${clean(riskLevel)} | 
            <strong>Total:</strong> ${clean(totalRisk)}<br>
            <strong>Pilot Type:</strong> ${clean(pilotType)} | 
            <strong>Experience:</strong> ${clean(experience)}
          </div>
        </div>

        <span class="status ${statusClass(status)}">
          ${clean(status)}
        </span>
      </div>

      <div class="details-grid">

        <div class="detail-box">
          <div class="detail-label">Editable FRAT ID</div>
          <input 
            class="frat-id-input" 
            id="fratId_${clean(firebaseId)}" 
            value="${clean(fratVisibleId)}"
          >
          <div class="small-note">
            You can write your own FRAT ID here.
          </div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Pilot Name</div>
          <div class="detail-value">${clean(pilotName)}</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">License</div>
          <div class="detail-value">${clean(license)}</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Risk Level</div>
          <div class="detail-value">${clean(riskLevel)}</div>
        </div>

      </div>

      <div class="actions">

        <button class="btn open-btn" onclick="openReport('${clean(firebaseId)}')">
          Open Report
        </button>

        <button class="btn save-btn" onclick="saveFRATId('${clean(firebaseId)}')">
          Save FRAT ID
        </button>

        <button class="btn status-btn" onclick="toggleStatus('${clean(firebaseId)}', '${clean(status)}')">
          ${status === "Open" ? "Close Report" : "Open Report"}
        </button>

        <button class="btn delete-btn" onclick="deleteReport('${clean(firebaseId)}')">
          🗑
        </button>

      </div>
    `;

    fratList.appendChild(card);

    if((index + 1) % 3 === 0){
      const separator = document.createElement("div");
      separator.className = "separator-buttons";

      separator.innerHTML = `
        <button class="btn back-btn" onclick="window.location.href='FRAT.html'">
          Back to FRAT
        </button>

        <button class="btn home-btn" onclick="window.location.href='index.html'">
          Home
        </button>
      `;

      fratList.appendChild(separator);
    }

  });
}

window.applyFilter = function(){

  const searchText = document.getElementById("searchInput").value.toLowerCase().trim();
  const statusFilter = document.getElementById("statusFilter").value;
  const riskFilter = document.getElementById("riskFilter").value;
  const pilotFilter = document.getElementById("pilotFilter").value;
  const sortFilter = document.getElementById("sortFilter").value;

  let filtered = allReports.filter(report => {

    const searchArea = `
      ${report.firebaseId || ""}
      ${report.fratId || ""}
      ${report.customId || ""}
      ${report.pilotName || ""}
      ${report.licenseNumber || ""}
      ${report.pilotType || ""}
      ${report.experienceLevel || ""}
      ${report.totalRiskValue || ""}
      ${report.riskLevel || ""}
      ${report.createdAt || ""}
      ${report.updatedAt || ""}
      ${report.status || ""}
    `.toLowerCase();

    const matchesSearch =
      searchText === "" || searchArea.includes(searchText);

    const matchesStatus =
      statusFilter === "" || (report.status || "Open") === statusFilter;

    const matchesRisk =
      riskFilter === "" || (report.riskLevel || "") === riskFilter;

    const matchesPilot =
      pilotFilter === "" || (report.pilotType || "") === pilotFilter;

    return matchesSearch && matchesStatus && matchesRisk && matchesPilot;

  });

  filtered.sort((a,b) => {

    if(sortFilter === "oldest"){
      return String(a.firebaseId).localeCompare(String(b.firebaseId));
    }

    if(sortFilter === "riskHigh"){
      return riskNumber(b) - riskNumber(a);
    }

    if(sortFilter === "riskLow"){
      return riskNumber(a) - riskNumber(b);
    }

    if(sortFilter === "nameAZ"){
      return String(a.pilotName || "").localeCompare(String(b.pilotName || ""));
    }

    return String(b.firebaseId).localeCompare(String(a.firebaseId));

  });

  renderReports(filtered);
};

window.clearFilters = function(){

  document.getElementById("searchInput").value = "";
  document.getElementById("statusFilter").value = "";
  document.getElementById("riskFilter").value = "";
  document.getElementById("pilotFilter").value = "";
  document.getElementById("sortFilter").value = "newest";

  applyFilter();

};

const reportsRef = ref(database, "fratReports");

onValue(reportsRef, (snapshot) => {

  allReports = [];

  if(!snapshot.exists()){
    renderReports([]);
    return;
  }

  snapshot.forEach((childSnapshot) => {
    allReports.push({
      firebaseId: childSnapshot.key,
      ...childSnapshot.val()
    });
  });

  allReports.sort((a,b) => {
    return String(b.firebaseId).localeCompare(String(a.firebaseId));
  });

  applyFilter();

});

window.openReport = function(reportId){
  window.location.href = "FRAT-Details.html?id=" + reportId;
};

window.saveFRATId = function(reportId){

  const input = document.getElementById("fratId_" + reportId);
  const newFRATId = input.value.trim();

  if(newFRATId === ""){
    alert("FRAT ID cannot be empty.");
    return;
  }

  update(ref(database, "fratReports/" + reportId), {
    fratId: newFRATId,
    updatedAt: new Date().toLocaleString()
  })
  .then(() => {
    alert("FRAT ID updated successfully.");
  })
  .catch((error) => {
    alert("Error updating FRAT ID: " + error.message);
  });

};

window.toggleStatus = function(reportId, currentStatus){

  const newStatus = currentStatus === "Open" ? "Closed" : "Open";

  update(ref(database, "fratReports/" + reportId), {
    status: newStatus,
    updatedAt: new Date().toLocaleString()
  })
  .then(() => {
    alert("Report status changed to " + newStatus + ".");
  })
  .catch((error) => {
    alert("Error updating status: " + error.message);
  });

};

window.deleteReport = function(reportId){

  const confirmDelete = confirm(
    "Are you sure you want to permanently delete this FRAT report?"
  );

  if(!confirmDelete) return;

  remove(ref(database, "fratReports/" + reportId))
  .then(() => {
    alert("FRAT Report deleted successfully.");
  })
  .catch((error) => {
    alert("Error deleting report: " + error.message);
  });

};

</script>

</body>
</html>
