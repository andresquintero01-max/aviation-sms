<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Promotion</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.main-container{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:30px;
    padding:60px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
    animation:fadeIn 1s ease;
}

h1{
    font-size:58px;
    color:#071f47;
    margin-bottom:15px;
}

.subtitle{
    font-size:20px;
    color:#555;
    margin-bottom:50px;
}

.buttons-container{
    display:flex;
    flex-direction:column;
    gap:25px;
}

.main-btn{
    background:linear-gradient(135deg,#071f47,#1450b8);
    color:white;
    border:none;
    padding:22px;
    font-size:24px;
    font-weight:bold;
    border-radius:18px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.main-btn:hover{
    transform:translateY(-5px) scale(1.02);
    background:linear-gradient(135deg,#1450b8,#1d6eff);
}

.back-btn{
    margin-top:40px;
    background:#d62828;
    color:white;
    border:none;
    padding:16px 25px;
    font-size:18px;
    border-radius:14px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.back-btn:hover{
    background:#b71c1c;
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="main-container">

    <h1>Safety Promotion</h1>

    <div class="subtitle">
        Training and Safety Promotion Modules
    </div>

    <div class="buttons-container">

        <!-- TRAINING BUTTON -->

        <button class="main-btn"
        onclick="window.location.href='Safety-Promotion-Training.html'">
        Training
        </button>

        <!-- CULTURE BUTTON -->

        <button class="main-btn"
        onclick="window.location.href='Safety-Promotion-Culture.html'">
        Culture
        </button>

    </div>

    <!-- BACK BUTTON -->

    <button class="back-btn"
    onclick="window.location.href='index.html'">
    Back
    </button>

</div>

</body>
</html>
