<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Promotion</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    min-height:100vh;
    background:
    linear-gradient(rgba(5,20,55,0.82), rgba(5,20,55,0.88)),
    url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:35px;
}

/* MAIN CONTAINER */

.main-container{
    width:100%;
    max-width:1000px;
    background:rgba(255,255,255,0.96);
    backdrop-filter:blur(8px);
    border-radius:35px;
    padding:55px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
    position:relative;
    overflow:hidden;
    animation:fadeIn 0.8s ease;
}

.main-container::before{
    content:"";
    position:absolute;
    width:420px;
    height:420px;
    background:radial-gradient(circle,rgba(111,82,217,0.16),transparent 70%);
    top:-180px;
    right:-120px;
}

/* LOGO */

.logo{
    width:100px;
    height:100px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#5b35d5,#8b5cf6);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:44px;
    box-shadow:0 12px 25px rgba(0,0,0,0.25);
    margin-bottom:22px;
}

/* TITLE */

h1{
    font-size:64px;
    color:#071f47;
    margin-bottom:12px;
    font-weight:800;
}

/* SUBTITLE */

.subtitle{
    font-size:21px;
    color:#56657d;
    margin-bottom:18px;
}

/* LINE */

.title-line{
    width:210px;
    height:4px;
    margin:0 auto 45px;
    border-radius:10px;
    background:linear-gradient(90deg,transparent,#8b5cf6,transparent);
}

/* BUTTONS AREA */

.buttons-container{
    display:flex;
    flex-direction:column;
    gap:28px;
}

/* CARD BUTTON */

.main-btn{
    background:white;
    border:none;
    border-radius:30px;
    padding:28px;
    cursor:pointer;
    transition:0.35s;
    box-shadow:0 12px 28px rgba(0,0,0,0.10);
    display:grid;
    grid-template-columns:100px 1fr 70px;
    align-items:center;
    gap:25px;
    text-align:left;
    position:relative;
    overflow:hidden;
}

.main-btn:hover{
    transform:translateY(-6px);
    box-shadow:0 18px 35px rgba(0,0,0,0.18);
}

/* LEFT BORDER */

.main-btn::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    width:8px;
    height:100%;
}

.main-btn:nth-child(1)::before{
    background:#1c63db;
}

.main-btn:nth-child(2)::before{
    background:#8b5cf6;
}

/* ICON */

.icon{
    width:85px;
    height:85px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:38px;
    box-shadow:0 10px 22px rgba(0,0,0,0.20);
}

.main-btn:nth-child(1) .icon{
    background:linear-gradient(135deg,#0b2a66,#1c63db);
}

.main-btn:nth-child(2) .icon{
    background:linear-gradient(135deg,#5b35d5,#8b5cf6);
}

/* TEXT */

.info h2{
    font-size:34px;
    color:#071f47;
    margin-bottom:8px;
}

.info p{
    color:#56657d;
    font-size:18px;
    line-height:1.5;
}

/* ARROW */

.arrow{
    font-size:52px;
    color:#0b2a66;
    text-align:center;
    transition:0.3s;
}

.main-btn:hover .arrow{
    transform:translateX(8px);
}

/* BACK BUTTON */

.back-btn{
    margin-top:42px;
    background:linear-gradient(135deg,#d40000,#ff2b2b);
    color:white;
    border:none;
    padding:18px 45px;
    border-radius:16px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 22px rgba(0,0,0,0.25);
}

.back-btn:hover{
    transform:translateY(-4px);
    background:linear-gradient(135deg,#ff2b2b,#ff4d4d);
}

/* FOOTER */

.footer{
    margin-top:35px;
    color:#51617b;
    font-size:14px;
    letter-spacing:3px;
    font-weight:bold;
}

/* ANIMATION */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* RESPONSIVE */

@media(max-width:850px){

    .main-container{
        padding:35px 22px;
    }

    h1{
        font-size:46px;
    }

    .subtitle{
        font-size:18px;
    }

    .main-btn{
        grid-template-columns:1fr;
        text-align:center;
    }

    .icon{
        margin:auto;
    }

    .arrow{
        display:none;
    }

    .info h2{
        font-size:28px;
    }

    .info p{
        font-size:16px;
    }

}

</style>
</head>

<body>

<div class="main-container">

    <!-- LOGO -->
    <div class="logo">🎓</div>

    <!-- TITLE -->
    <h1>Safety Promotion</h1>

    <!-- SUBTITLE -->
    <div class="subtitle">
        Training and Safety Promotion Modules
    </div>

    <div class="title-line"></div>

    <!-- BUTTONS -->
    <div class="buttons-container">

        <!-- TRAINING -->

        <button class="main-btn"
        onclick="window.location.href='Safety-Promotion-Training.html'">

            <div class="icon">📚</div>

            <div class="info">
                <h2>Training</h2>

                <p>
                    Access aviation safety training,
                    SMS courses and operational guidance.
                </p>
            </div>

            <div class="arrow">›</div>

        </button>

        <!-- CULTURE -->

        <button class="main-btn"
        onclick="window.location.href='Safety-Promotion-Culture.html'">

            <div class="icon">👥</div>

            <div class="info">
                <h2>Culture</h2>

                <p>
                    Promote safety awareness,
                    communication and positive reporting culture.
                </p>
            </div>

            <div class="arrow">›</div>

        </button>

    </div>

    <!-- BACK BUTTON -->

    <button class="back-btn"
    onclick="window.location.href='index.html'">

        ← Back

    </button>

    <!-- FOOTER -->

    <div class="footer">
        AVIATION SAFETY MANAGEMENT PLATFORM
    </div>

</div>

</body>
</html>
