<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Aviation SMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI', Arial, sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#061b3d,#0b2a66,#1450b8);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
}

.login-box{
  width:100%;
  max-width:430px;
  background:white;
  padding:45px;
  border-radius:28px;
  box-shadow:0 25px 60px rgba(0,0,0,0.35);
  text-align:center;
}

h1{
  color:#071f47;
  font-size:36px;
  margin-bottom:10px;
}

p{
  color:#555;
  margin-bottom:30px;
}

input{
  width:100%;
  padding:15px;
  margin-bottom:18px;
  border:1px solid #ccc;
  border-radius:12px;
  font-size:16px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#1450b8;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0b2a66;
}

#error{
  margin-top:18px;
  color:red;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="login-box">
  <h1>Aviation SMS</h1>
  <p>Login to continue</p>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="error"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("error");

  if(email === "" || password === ""){
    errorBox.innerText = "Please enter email and password.";
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch(() => {
      errorBox.innerText = "Invalid email or password.";
    });
};
</script>

</body>
</html>
