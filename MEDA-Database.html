<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MEDA Database</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI', Arial, sans-serif;
  min-height:100vh;
  background:
  radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 28%),
  linear-gradient(135deg,#061b3d,#082b66,#1450b8);
  padding:35px;
}

.container{
  max-width:1250px;
  margin:auto;
  background:rgba(255,255,255,0.97);
  padding:45px;
  border-radius:32px;
  box-shadow:0 25px 65px rgba(0,0,0,0.35);
}

h1{
  text-align:center;
  color:#071f47;
  font-size:54px;
  margin-bottom:8px;
}

.description{
  text-align:center;
  color:#555;
  font-size:18px;
  margin-bottom:35px;
}

.top-buttons{
  text-align:center;
  margin-bottom:30px;
}

.btn{
  border:none;
  color:white;
  padding:13px 25px;
  border-radius:14px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  margin:6px;
  transition:0.25s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

.back-btn{
  background:linear-gradient(135deg,#c40000,#ff2b2b);
}

.home-btn{
  background:linear-gradient(135deg,#071f47,#0b2a66);
}

.report-card{
  background:white;
  border-radius:24px;
  padding:24px;
  margin-bottom:22px;
  box-shadow:0 10px 28px rgba(0,0,0,0.12);
  border-left:9px solid #071f47;
  transition:0.25s;
}

.report-card:hover{
  transform:scale(1.01);
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.event-title{
  font-size:25px;
  font-weight:800;
  color:#071f47;
  margin-bottom:6px;
}

.meta{
  color:#555;
  font-size:15px;
  line-height:1.7;
}

.status{
  display:inline-block;
  padding:7px 16px;
  border-radius:999px;
  color:white;
  font-size:13px;
  font-weight:bold;
}

.status.open{
  background:#0b8a3a;
}

.status.closed{
  background:#555;
}

.details-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin-top:18px;
}

.detail-box{
  background:#f4f7fb;
  padding:14px;
  border-radius:16px;
  border:1px solid #dce3ef;
}

.detail-label{
  font-size:12px;
  color:#777;
  font-weight:bold;
  text-transform:uppercase;
  margin-bottom:6px;
}

.detail-value{
  font-size:15px;
  color:#071f47;
  font-weight:700;
}

.meda-id-input{
  width:100%;
  padding:11px;
  border:1px solid #cbd5e1;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  color:#071f47;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:22px;
  align-items:center;
}

.open-btn{
  background:linear-gradient(135deg,#004aad,#1473e6);
}

.save-btn{
  background:linear-gradient(135deg,#006b3c,#00a65a);
}

.status-btn{
  background:linear-gradient(135deg,#6b21a8,#9333ea);
}

.delete-btn{
  background:linear-gradient(135deg,#d00000,#ff1f1f);
  width:48px;
  height:48px;
  border-radius:50%;
  padding:0;
  font-size:20px;
}

.separator-buttons{
  text-align:center;
  margin:28px 0;
  padding:18px;
  background:#eef4ff;
  border-radius:22px;
  border:1px dashed #9bb7e0;
}

.no-data{
  text-align:center;
  color:#777;
  font-size:19px;
  margin-top:35px;
  background:#f4f6f8;
  padding:35px;
  border-radius:22px;
}

.small-note{
  font-size:12px;
  color:#777;
  margin-top:6px;
}

@media(max-width:700px){
  h1{
    font-size:40px;
  }

  .container{
    padding:25px;
  }

  .event-title{
    font-size:21px;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>MEDA Database</h1>

  <div class="description">
    Stored Maintenance Error Decision Aid Investigation Reports
  </div>

  <div class="top-buttons">
    <button class="btn back-btn" onclick="window.location.href='MEDA.html'">
      Back to MEDA
    </button>

    <button class="btn home-btn" onclick="window.location.href='index.html'">
      Home
    </button>
  </div>

  <div id="medaList"></div>

  <div id="noData" class="no-data" style="display:none;">
    No MEDA reports found.
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  remove,
  update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const medaList = document.getElementById("medaList");
const noData = document.getElementById("noData");

const reportsRef = ref(database, "medaReports");

onValue(reportsRef, (snapshot) => {

  medaList.innerHTML = "";

  if(!snapshot.exists()){
    noData.style.display = "block";
    return;
  }

  noData.style.display = "none";

  let reports = [];

  snapshot.forEach((childSnapshot) => {
    reports.push({
      firebaseId: childSnapshot.key,
      ...childSnapshot.val()
    });
  });

  reports.sort((a,b) => {
    const dateA = a.createdAt || a.date || "";
    const dateB = b.createdAt || b.date || "";
    return String(dateB).localeCompare(String(dateA));
  });

  reports.forEach((report, index) => {

    const firebaseId = report.firebaseId;

    const title =
      report.title ||
      report.eventTitle ||
      report.event ||
      "Untitled MEDA Report";

    const affectedPerson =
      report.affectedPerson ||
      report.personAffected ||
      report.employeeName ||
      report.person ||
      "N/A";

    const date =
      report.date ||
      report.eventDate ||
      report.createdAt ||
      "N/A";

    const status =
      report.status || "Open";

    const medaVisibleId =
      report.medaId ||
      report.customId ||
      firebaseId;

    const card = document.createElement("div");
    card.className = "report-card";

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="event-title">${title}</div>

          <div class="meta">
            <strong>Date:</strong> ${date}<br>
            <strong>Affected Person:</strong> ${affectedPerson}
          </div>
        </div>

        <span class="status ${status.toLowerCase()}">
          ${status}
        </span>
      </div>

      <div class="details-grid">

        <div class="detail-box">
          <div class="detail-label">Editable MEDA ID</div>
          <input 
            class="meda-id-input" 
            id="medaId_${firebaseId}" 
            value="${medaVisibleId}"
          >
          <div class="small-note">
            You can write your own MEDA ID here.
          </div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Event Title</div>
          <div class="detail-value">${title}</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Report Date</div>
          <div class="detail-value">${date}</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Affected Person</div>
          <div class="detail-value">${affectedPerson}</div>
        </div>

      </div>

      <div class="actions">

        <button class="btn open-btn" onclick="openReport('${firebaseId}')">
          Open Report
        </button>

        <button class="btn save-btn" onclick="saveMEDAId('${firebaseId}')">
          Save MEDA ID
        </button>

        <button class="btn status-btn" onclick="toggleStatus('${firebaseId}', '${status}')">
          ${status === "Open" ? "Close Report" : "Open Report"}
        </button>

        <button class="btn delete-btn" onclick="deleteReport('${firebaseId}')">
          🗑
        </button>

      </div>
    `;

    medaList.appendChild(card);

    if((index + 1) % 3 === 0){
      const separator = document.createElement("div");
      separator.className = "separator-buttons";

      separator.innerHTML = `
        <button class="btn back-btn" onclick="window.location.href='MEDA.html'">
          Back to MEDA
        </button>

        <button class="btn home-btn" onclick="window.location.href='index.html'">
          Home
        </button>
      `;

      medaList.appendChild(separator);
    }

  });

});

window.openReport = function(reportId){
  window.location.href = "MEDA-Details.html?id=" + reportId;
};

window.saveMEDAId = function(reportId){

  const input = document.getElementById("medaId_" + reportId);
  const newMEDAId = input.value.trim();

  if(newMEDAId === ""){
    alert("MEDA ID cannot be empty.");
    return;
  }

  update(ref(database, "medaReports/" + reportId), {
    medaId: newMEDAId
  })
  .then(() => {
    alert("MEDA ID updated successfully.");
  })
  .catch((error) => {
    alert("Error updating MEDA ID: " + error.message);
  });

};

window.toggleStatus = function(reportId, currentStatus){

  const newStatus = currentStatus === "Open" ? "Closed" : "Open";

  update(ref(database, "medaReports/" + reportId), {
    status: newStatus
  })
  .then(() => {
    alert("Report status changed to " + newStatus + ".");
  })
  .catch((error) => {
    alert("Error updating status: " + error.message);
  });

};

window.deleteReport = function(reportId){

  const confirmDelete = confirm(
    "Are you sure you want to permanently delete this MEDA report?"
  );

  if(!confirmDelete) return;

  remove(ref(database, "medaReports/" + reportId))
  .then(() => {
    alert("MEDA Report deleted successfully.");
  })
  .catch((error) => {
    alert("Error deleting report: " + error.message);
  });

};

</script>

</body>
</html>
