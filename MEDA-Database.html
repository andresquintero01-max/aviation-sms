<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MEDA Database</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
  padding:30px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:40px;
  border-radius:25px;
  box-shadow:0 18px 45px rgba(0,0,0,0.3);
}

h1{
  text-align:center;
  color:#071f47;
  font-size:46px;
  margin-bottom:10px;
}

.description{
  text-align:center;
  color:#666;
  font-size:18px;
  margin-bottom:35px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th{
  background:#071f47;
  color:white;
  padding:14px;
  font-size:16px;
}

td{
  border:1px solid #ddd;
  padding:12px;
  text-align:center;
  font-size:15px;
}

tr:nth-child(even){
  background:#f4f6f8;
}

.report-link{
  color:#071f47;
  font-weight:bold;
  text-decoration:none;
}

.report-link:hover{
  color:#1450b8;
  text-decoration:underline;
}

.no-data{
  text-align:center;
  color:#777;
  font-size:18px;
  margin-top:30px;
}

.buttons{
  text-align:center;
  margin-top:30px;
}

.btn{
  border:none;
  color:white;
  padding:14px 28px;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin:6px;
}

.back-btn{
  background:#c40000;
}

.home-btn{
  background:#071f47;
}

.delete-btn{
  background:red;
  color:white;
  border:none;
  width:42px;
  height:42px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
  font-weight:bold;
  transition:0.3s;
}

.delete-btn:hover{
  background:#b30000;
  transform:scale(1.08);
}

.action-cell{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
}

</style>
</head>

<body>

<div class="container">

  <h1>MEDA Database</h1>

  <div class="description">
    Stored Maintenance Error Decision Aid investigation reports
  </div>

  <table>
    <thead>
      <tr>
        <th>MEDA Report ID</th>
      </tr>
    </thead>

    <tbody id="medaTableBody">
    </tbody>
  </table>

  <div id="noData" class="no-data" style="display:none;">
    No MEDA reports found.
  </div>

  <div class="buttons">
    <button class="btn back-btn" onclick="window.location.href='MEDA.html'">
      Back to MEDA
    </button>

    <button class="btn home-btn" onclick="window.location.href='index.html'">
      Home
    </button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const tableBody = document.getElementById("medaTableBody");
const noData = document.getElementById("noData");

const reportsRef = ref(database, "medaReports");

onValue(reportsRef, (snapshot) => {

  tableBody.innerHTML = "";

  if(snapshot.exists()){

    noData.style.display = "none";

    snapshot.forEach((childSnapshot) => {

      const reportId = childSnapshot.key;
      const report = childSnapshot.val();

      const title = report.title || "Untitled MEDA Report";
      const aircraft = report.aircraft || "N/A";
      const customer = report.customer || "N/A";
      const status = report.status || "Open";

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>

          <div class="action-cell">

            <a class="report-link" href="MEDA-Details.html?id=${reportId}">
              ID: ${reportId} | ${title} | Aircraft: ${aircraft} | Customer: ${customer} | Status: ${status}
            </a>

            <button
              class="delete-btn"
              onclick="deleteReport('${reportId}')"
            >
              🗑
            </button>

          </div>

        </td>
      `;

      tableBody.appendChild(row);

    });

  } else {

    noData.style.display = "block";

  }

});

window.deleteReport = function(reportId){

  const confirmDelete = confirm(
    "Are you sure you want to permanently delete this MEDA report?"
  );

  if(!confirmDelete) return;

  remove(
    ref(database, "medaReports/" + reportId)
  )
  .then(() => {
    alert("MEDA Report deleted successfully.");
  })
  .catch((error) => {
    alert("Error deleting report: " + error.message);
  });

};

</script>

</body>
</html>
