<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MEDA Database</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
  padding:30px;
}

.container{
  max-width:1250px;
  margin:auto;
  background:white;
  padding:42px;
  border-radius:28px;
  box-shadow:0 22px 55px rgba(0,0,0,0.35);
}

h1{
  text-align:center;
  color:#071f47;
  font-size:52px;
  margin-bottom:8px;
}

.description{
  text-align:center;
  color:#666;
  font-size:18px;
  margin-bottom:30px;
}

.top-tools{
  display:flex;
  justify-content:space-between;
  gap:15px;
  margin-bottom:25px;
  flex-wrap:wrap;
}

.search-box{
  flex:1;
  min-width:260px;
}

.search-box input{
  width:100%;
  padding:14px;
  border:1px solid #b8c7da;
  border-radius:14px;
  font-size:15px;
}

.filter-box select{
  padding:14px;
  border:1px solid #b8c7da;
  border-radius:14px;
  font-size:15px;
}

.cards-area{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:20px;
}

.report-card{
  background:#f8fbff;
  border:1px solid #d8e1ef;
  border-left:8px solid #1450b8;
  border-radius:20px;
  padding:22px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  transition:0.25s;
}

.report-card:hover{
  transform:translateY(-4px);
  box-shadow:0 14px 28px rgba(0,0,0,0.15);
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:15px;
}

.report-title{
  color:#071f47;
  font-size:22px;
  font-weight:bold;
  line-height:1.2;
}

.status-badge{
  padding:8px 14px;
  border-radius:20px;
  font-size:13px;
  font-weight:bold;
  color:white;
  white-space:nowrap;
}

.status-open{
  background:#f59e0b;
}

.status-closed{
  background:#16a34a;
}

.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}

.info-box{
  background:white;
  border:1px solid #e1e8f0;
  border-radius:14px;
  padding:12px;
}

.info-label{
  color:#004080;
  font-size:12px;
  font-weight:bold;
  margin-bottom:4px;
}

.info-value{
  color:#111;
  font-size:14px;
  font-weight:bold;
  word-break:break-word;
}

.report-id{
  margin-top:14px;
  color:#6b7280;
  font-size:12px;
  word-break:break-all;
}

.card-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-top:18px;
  flex-wrap:wrap;
}

.status-select{
  padding:11px;
  border-radius:12px;
  border:1px solid #b8c7da;
  font-weight:bold;
}

.btn{
  border:none;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  transition:0.25s;
}

.view-btn{
  background:#071f47;
}

.view-btn:hover{
  background:#1450b8;
}

.delete-btn{
  background:red;
  width:45px;
  height:45px;
  border-radius:50%;
  font-size:18px;
}

.delete-btn:hover{
  background:#b30000;
  transform:scale(1.08);
}

.buttons{
  text-align:center;
  margin-top:35px;
}

.back-btn{
  background:#c40000;
  padding:14px 30px;
}

.home-btn{
  background:#071f47;
  padding:14px 30px;
}

.no-data{
  text-align:center;
  color:#777;
  font-size:19px;
  margin-top:30px;
  display:none;
}

@media(max-width:700px){
  .container{
    padding:25px;
  }

  h1{
    font-size:38px;
  }

  .info-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>MEDA Database</h1>

  <div class="description">
    Stored Maintenance Error Decision Aid investigation reports
  </div>

  <div class="top-tools">
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="Search by title, aircraft, customer, affected person, or location...">
    </div>

    <div class="filter-box">
      <select id="statusFilter">
        <option value="All">All Status</option>
        <option value="Open">Open</option>
        <option value="Closed">Closed</option>
        <option value="In Progress">In Progress</option>
        <option value="Pending Corrective Action">Pending Corrective Action</option>
      </select>
    </div>
  </div>

  <div id="cardsArea" class="cards-area"></div>

  <div id="noData" class="no-data">
    No MEDA reports found.
  </div>

  <div class="buttons">
    <button class="btn back-btn" onclick="window.location.href='MEDA.html'">
      Back to MEDA
    </button>

    <button class="btn home-btn" onclick="window.location.href='index.html'">
      Home
    </button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  remove,
  update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const cardsArea = document.getElementById("cardsArea");
const noData = document.getElementById("noData");
const searchInput = document.getElementById("searchInput");
const statusFilter = document.getElementById("statusFilter");

let allReports = [];

const reportsRef = ref(database, "medaReports");

onValue(reportsRef, (snapshot) => {

  allReports = [];

  if(snapshot.exists()){

    snapshot.forEach((childSnapshot) => {
      allReports.push({
        id: childSnapshot.key,
        data: childSnapshot.val()
      });
    });

  }

  renderReports();

});

function renderReports(){

  cardsArea.innerHTML = "";

  const searchText = searchInput.value.toLowerCase();
  const selectedStatus = statusFilter.value;

  const filteredReports = allReports.filter(item => {

    const report = item.data;

    const title = (report.title || "").toLowerCase();
    const aircraft = (report.aircraft || "").toLowerCase();
    const customer = (report.customer || "").toLowerCase();
    const affectedPerson = (report.affectedPerson || "").toLowerCase();
    const location = (report.location || "").toLowerCase();
    const status = report.status || "Open";

    const matchesSearch =
      title.includes(searchText) ||
      aircraft.includes(searchText) ||
      customer.includes(searchText) ||
      affectedPerson.includes(searchText) ||
      location.includes(searchText);

    const matchesStatus =
      selectedStatus === "All" || status === selectedStatus;

    return matchesSearch && matchesStatus;

  });

  if(filteredReports.length === 0){
    noData.style.display = "block";
    return;
  }

  noData.style.display = "none";

  filteredReports.forEach(item => {

    const reportId = item.id;
    const report = item.data;

    const title = report.title || "Untitled MEDA Report";
    const aircraft = report.aircraft || "N/A";
    const customer = report.customer || "N/A";
    const date = report.date || "N/A";
    const location = report.location || "N/A";
    const affectedPerson = report.affectedPerson || "N/A";
    const eventType = report.eventType || "N/A";
    const status = report.status || "Open";

    const statusClass = status === "Closed" ? "status-closed" : "status-open";

    const card = document.createElement("div");
    card.className = "report-card";

    card.innerHTML = `
      <div class="card-header">
        <div class="report-title">${title}</div>
        <div class="status-badge ${statusClass}">${status}</div>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-label">Date</div>
          <div class="info-value">${date}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Aircraft</div>
          <div class="info-value">${aircraft}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Customer</div>
          <div class="info-value">${customer}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Affected Person</div>
          <div class="info-value">${affectedPerson}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Location</div>
          <div class="info-value">${location}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Event Type</div>
          <div class="info-value">${eventType}</div>
        </div>
      </div>

      <div class="report-id">
        MEDA ID: ${reportId}
      </div>

      <div class="card-actions">

        <select class="status-select" onchange="changeStatus('${reportId}', this.value)">
          <option ${status === "Open" ? "selected" : ""}>Open</option>
          <option ${status === "In Progress" ? "selected" : ""}>In Progress</option>
          <option ${status === "Pending Corrective Action" ? "selected" : ""}>Pending Corrective Action</option>
          <option ${status === "Closed" ? "selected" : ""}>Closed</option>
        </select>

        <button class="btn view-btn" onclick="window.location.href='MEDA-Details.html?id=${reportId}'">
          View Report
        </button>

        <button class="delete-btn" onclick="deleteReport('${reportId}')">
          🗑
        </button>

      </div>
    `;

    cardsArea.appendChild(card);

  });

}

window.changeStatus = function(reportId, newStatus){

  update(ref(database, "medaReports/" + reportId), {
    status: newStatus,
    statusUpdatedAt: new Date().toLocaleString()
  })
  .then(() => {
    alert("Report status updated to: " + newStatus);
  })
  .catch((error) => {
    alert("Error updating status: " + error.message);
  });

};

window.deleteReport = function(reportId){

  const confirmDelete = confirm(
    "Are you sure you want to permanently delete this MEDA report?"
  );

  if(!confirmDelete) return;

  remove(ref(database, "medaReports/" + reportId))
  .then(() => {
    alert("MEDA Report deleted successfully.");
  })
  .catch((error) => {
    alert("Error deleting report: " + error.message);
  });

};

searchInput.addEventListener("input", renderReports);
statusFilter.addEventListener("change", renderReports);

</script>

</body>
</html>
