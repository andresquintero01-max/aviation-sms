<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Risk Overview Database</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at top left,rgba(255,152,0,.30),transparent 30%),
    radial-gradient(circle at bottom right,rgba(28,99,219,.45),transparent 38%),
    linear-gradient(rgba(5,20,55,.88),rgba(5,20,55,.95)),
    url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  padding:35px;
}

.container{
  max-width:1450px;
  margin:auto;
  background:rgba(255,255,255,.97);
  backdrop-filter:blur(14px);
  padding:46px;
  border-radius:38px;
  box-shadow:0 30px 80px rgba(0,0,0,.45);
}

.logo{
  width:112px;
  height:112px;
  margin:0 auto 20px;
  border-radius:32px;
  background:linear-gradient(135deg,#071f47,#1450b8,#ff9800);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  box-shadow:0 18px 40px rgba(0,0,0,.30);
}

.badge{
  display:block;
  width:max-content;
  margin:0 auto 16px;
  background:#eaf2ff;
  color:#071f47;
  padding:10px 24px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
  letter-spacing:1.8px;
}

h1{
  text-align:center;
  color:#071f47;
  font-size:56px;
  margin-bottom:10px;
  font-weight:900;
}

.description{
  text-align:center;
  color:#56657d;
  font-size:19px;
  margin-bottom:28px;
  font-weight:600;
}

.title-line{
  width:230px;
  height:6px;
  margin:0 auto 32px;
  border-radius:10px;
  background:linear-gradient(90deg,transparent,#1450b8,#ff9800,transparent);
}

.top-actions,
.bottom-buttons,
.separator-buttons{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:14px;
  margin-bottom:25px;
  background:#f8fbff;
  padding:20px;
  border-radius:26px;
  border:1px solid #e5e7eb;
  box-shadow:0 14px 32px rgba(0,0,0,.10);
}

.btn{
  border:none;
  color:white;
  padding:14px 24px;
  border-radius:16px;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  transition:.25s;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  box-shadow:0 10px 22px rgba(0,0,0,.22);
}

.btn:hover{transform:translateY(-2px);opacity:.94;}

.filter-btn{background:linear-gradient(135deg,#7c3aed,#a855f7);}
.excel-btn{background:linear-gradient(135deg,#047857,#22c55e);}
.risk-btn{background:linear-gradient(135deg,#d83b00,#ff9800);}
.home-btn{background:linear-gradient(135deg,#071f47,#1450b8);}
.open-btn{background:linear-gradient(135deg,#071f47,#1450b8);}
.save-btn{background:linear-gradient(135deg,#047857,#22c55e);}
.status-btn{background:linear-gradient(135deg,#6b21a8,#9333ea);}
.delete-btn{background:linear-gradient(135deg,#dc2626,#ef4444);}

.filter-panel{
  background:#f8fbff;
  border:1px solid #dbe3ef;
  padding:22px;
  border-radius:22px;
  margin-bottom:28px;
  display:grid;
  grid-template-columns:1.3fr .8fr 1fr 1fr;
  gap:14px;
}

.filter-panel input,
.filter-panel select{
  width:100%;
  padding:15px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  font-size:15px;
  background:white;
  outline:none;
}

.counter{
  text-align:center;
  color:#071f47;
  font-weight:900;
  margin-bottom:20px;
  font-size:17px;
}

.report-card{
  background:linear-gradient(135deg,#ffffff,#f8fbff);
  border-radius:28px;
  padding:26px;
  margin-bottom:24px;
  box-shadow:0 18px 45px rgba(0,0,0,.14);
  border-left:10px solid #1450b8;
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.event-title{
  font-size:26px;
  font-weight:900;
  color:#071f47;
  margin-bottom:6px;
}

.meta{
  color:#56657d;
  font-size:15px;
  line-height:1.7;
}

.status{
  display:inline-block;
  padding:9px 18px;
  border-radius:999px;
  color:white;
  font-size:13px;
  font-weight:900;
}

.status.open{background:linear-gradient(135deg,#047857,#22c55e);}
.status.closed{background:linear-gradient(135deg,#475569,#64748b);}
.status.in-progress{background:linear-gradient(135deg,#071f47,#1450b8);}
.status.pending-action{background:linear-gradient(135deg,#d83b00,#ff9800);}

.details-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin-top:18px;
}

.detail-box{
  background:#f4f7fb;
  padding:15px;
  border-radius:18px;
  border:1px solid #dce3ef;
}

.detail-label{
  font-size:12px;
  color:#64748b;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:6px;
}

.detail-value{
  font-size:15px;
  color:#071f47;
  font-weight:800;
  word-break:break-word;
}

.risk-id-input{
  width:100%;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  font-size:15px;
  font-weight:800;
  color:#071f47;
}

.hazard-list{
  margin-top:22px;
  display:grid;
  gap:14px;
}

.hazard-item{
  background:white;
  border:1px solid #d8e1ef;
  border-radius:20px;
  padding:18px;
}

.hazard-title{
  color:#071f47;
  font-size:18px;
  font-weight:900;
  margin-bottom:8px;
}

.hazard-meta{
  color:#56657d;
  line-height:1.6;
  font-size:14px;
}

.risk-pill{
  display:inline-block;
  padding:7px 13px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  margin:4px 5px 4px 0;
}

.low{background:#d8f3dc;color:#14532d;}
.medium{background:#fff3cd;color:#664d03;}
.high{background:#ffe0b2;color:#9a3412;}
.extreme{background:#f8d7da;color:#842029;}
.na{background:#e5e7eb;color:#374151;}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:22px;
  align-items:center;
}

.no-data{
  text-align:center;
  color:#56657d;
  font-size:20px;
  margin-top:35px;
  background:#f8fbff;
  padding:42px;
  border-radius:24px;
  border:1px solid #e5e7eb;
  font-weight:700;
}

.footer{
  margin-top:35px;
  text-align:center;
  color:#51617b;
  font-size:14px;
  letter-spacing:3px;
  font-weight:900;
}

@media(max-width:900px){
  body{padding:20px;}
  .container{padding:30px 22px;}
  h1{font-size:40px;}
  .filter-panel{grid-template-columns:1fr;}
  .btn{width:100%;}
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">🗂️</div>
  <div class="badge">RISK OVERVIEW DATABASE</div>
  <h1>Risk Overview Database</h1>

  <div class="description">
    Stored risk panorama reports with multiple hazard identifications
  </div>

  <div class="title-line"></div>

  <div class="top-actions">
    <button class="btn filter-btn" onclick="window.toggleFilters()">🔎 Filters</button>
    <button class="btn excel-btn" onclick="window.downloadExcel()">📥 Download Excel</button>
    <button class="btn risk-btn" onclick="window.location.href='Risk-Overview.html'">📊 New Risk Overview</button>
    <button class="btn home-btn" onclick="window.location.href='index.html'">🏠 Home</button>
  </div>

  <div id="filterPanel" class="filter-panel">
    <input id="searchInput" placeholder="Search ID, title, airport, area, hazard, owner..." oninput="window.applyFilter()">

    <input type="date" id="dateFilter" onchange="window.applyFilter()">

    <select id="riskFilter" onchange="window.applyFilter()">
      <option value="">All Risk Levels</option>
      <option value="LOW RISK">Low Risk</option>
      <option value="MEDIUM RISK">Medium Risk</option>
      <option value="HIGH RISK">High Risk</option>
      <option value="EXTREME RISK">Extreme Risk</option>
    </select>

    <select id="statusFilter" onchange="window.applyFilter()">
      <option value="">All Status</option>
      <option value="Open">Open</option>
      <option value="In Progress">In Progress</option>
      <option value="Pending Action">Pending Action</option>
      <option value="Closed">Closed</option>
    </select>
  </div>

  <div id="counter" class="counter"></div>

  <div id="riskList"></div>

  <div id="noData" class="no-data" style="display:none;">
    No Risk Overview reports found.
  </div>

  <div class="bottom-buttons">
    <button class="btn risk-btn" onclick="window.location.href='Risk-Overview.html'">📊 New Risk Overview</button>
    <button class="btn home-btn" onclick="window.location.href='index.html'">🏠 Home</button>
  </div>

  <div class="footer">
    371Q AVIATION SAFETY MANAGEMENT PLATFORM
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  remove,
  update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const riskList = document.getElementById("riskList");
const noData = document.getElementById("noData");
const counter = document.getElementById("counter");

let allReports = [];
let filteredReports = [];

function clean(value){
  return String(value || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function statusClass(status){
  return String(status || "Open").toLowerCase().replaceAll(" ","-");
}

function riskClass(level){
  const v = String(level || "").toUpperCase();

  if(v === "LOW RISK") return "low";
  if(v === "MEDIUM RISK") return "medium";
  if(v === "HIGH RISK") return "high";
  if(v === "EXTREME RISK") return "extreme";

  return "na";
}

function normalizeDate(value){
  if(!value) return "";
  const d = new Date(value);
  if(isNaN(d)) return "";
  return d.toISOString().split("T")[0];
}

function getHazards(report){
  if(Array.isArray(report.hazards)){
    return report.hazards;
  }

  if(report.hazardTitle || report.hazardDescription || report.initialRisk || report.residualRisk){
    return [{
      hazardTitle:report.hazardTitle || "N/A",
      hazardCategory:report.hazardCategory || "N/A",
      riskOwner:report.riskOwner || "N/A",
      hazardDescription:report.hazardDescription || "",
      causes:report.causes || "",
      consequences:report.consequences || "",
      initialRisk:report.initialRisk || {},
      residualRisk:report.residualRisk || {},
      existingControls:report.existingControls || "",
      correctiveActions:report.correctiveActions || [],
      acceptable:report.acceptable || "",
      kpiSpi:report.kpiSpi || "",
      monitoringMethod:report.monitoringMethod || "",
      reviewFrequency:report.reviewFrequency || "",
      notes:report.notes || ""
    }];
  }

  return [];
}

function getHighestRiskLevel(hazards,type){
  const order = {
    "N/A":0,
    "LOW RISK":1,
    "MEDIUM RISK":2,
    "HIGH RISK":3,
    "EXTREME RISK":4
  };

  let highest = "N/A";

  hazards.forEach(h => {
    const level = h[type]?.level || "N/A";
    if((order[level] || 0) > (order[highest] || 0)){
      highest = level;
    }
  });

  return highest;
}

function renderReports(reports){

  riskList.innerHTML = "";

  if(reports.length === 0){
    noData.style.display = "block";
    counter.innerHTML = "0 reports found";
    return;
  }

  noData.style.display = "none";
  counter.innerHTML = reports.length + " report(s) found";

  reports.forEach((report,index) => {

    const firebaseId = report.firebaseId;
    const visibleId = report.riskOverviewId || report.customId || firebaseId;

    const hazards = getHazards(report);
    const totalHazards = hazards.length;

    const title = report.title || "Untitled Risk Overview";
    const airport = report.airport || "N/A";
    const area = report.area || "N/A";
    const process = report.process || "N/A";
    const evaluator = report.evaluator || "N/A";
    const status = report.status || "Open";
    const date = report.date || report.createdAt || "N/A";
    const reviewDate = report.reviewDate || "N/A";

    const highestInitial = getHighestRiskLevel(hazards,"initialRisk");
    const highestResidual = getHighestRiskLevel(hazards,"residualRisk");

    const card = document.createElement("div");
    card.className = "report-card";

    let hazardHtml = "";

    if(totalHazards === 0){
      hazardHtml = `
        <div class="hazard-item">
          <div class="hazard-title">No hazards stored in this report.</div>
        </div>
      `;
    }else{
      hazards.forEach((hazard,hIndex) => {

        const initialLevel = hazard.initialRisk?.level || "N/A";
        const residualLevel = hazard.residualRisk?.level || "N/A";
        const cpaCount = Array.isArray(hazard.correctiveActions) ? hazard.correctiveActions.length : 0;

        hazardHtml += `
          <div class="hazard-item">
            <div class="hazard-title">
              Hazard ${hIndex + 1}: ${clean(hazard.hazardTitle || "Untitled Hazard")}
            </div>

            <div class="hazard-meta">
              <strong>Category:</strong> ${clean(hazard.hazardCategory || "N/A")} |
              <strong>Owner:</strong> ${clean(hazard.riskOwner || "N/A")} |
              <strong>CPAs:</strong> ${clean(cpaCount)}
              <br>

              <span class="risk-pill ${riskClass(initialLevel)}">
                Initial: ${clean(initialLevel)}
              </span>

              <span class="risk-pill ${riskClass(residualLevel)}">
                Residual: ${clean(residualLevel)}
              </span>

              <span class="risk-pill na">
                Acceptable: ${clean(hazard.acceptable || "N/A")}
              </span>
            </div>
          </div>
        `;
      });
    }

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="event-title">
            ${clean(visibleId)} | ${clean(title)}
          </div>

          <div class="meta">
            <strong>Date:</strong> ${clean(date)} |
            <strong>Review:</strong> ${clean(reviewDate)}<br>
            <strong>Airport / Station:</strong> ${clean(airport)}<br>
            <strong>Area:</strong> ${clean(area)} |
            <strong>Process:</strong> ${clean(process)}<br>
            <strong>Evaluator:</strong> ${clean(evaluator)}
          </div>
        </div>

        <span class="status ${statusClass(status)}">
          ${clean(status)}
        </span>
      </div>

      <div class="details-grid">

        <div class="detail-box">
          <div class="detail-label">Editable Risk Overview ID</div>
          <input 
            class="risk-id-input" 
            id="riskOverviewId_${clean(firebaseId)}" 
            value="${clean(visibleId)}"
          >
        </div>

        <div class="detail-box">
          <div class="detail-label">Total Hazards</div>
          <div class="detail-value">${clean(totalHazards)}</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Highest Initial Risk</div>
          <div class="detail-value">
            <span class="risk-pill ${riskClass(highestInitial)}">${clean(highestInitial)}</span>
          </div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Highest Residual Risk</div>
          <div class="detail-value">
            <span class="risk-pill ${riskClass(highestResidual)}">${clean(highestResidual)}</span>
          </div>
        </div>

      </div>

      <div class="hazard-list">
        ${hazardHtml}
      </div>

      <div class="actions">

        <button class="btn open-btn" onclick="window.openReport('${clean(firebaseId)}')">
          Open Report
        </button>

        <button class="btn save-btn" onclick="window.saveRiskOverviewId('${clean(firebaseId)}')">
          Save ID
        </button>

        <button class="btn status-btn" onclick="window.toggleStatus('${clean(firebaseId)}','${clean(status)}')">
          ${status === "Closed" ? "Reopen Report" : "Close Report"}
        </button>

        <button class="btn delete-btn" onclick="window.deleteReport('${clean(firebaseId)}')">
          🗑 Delete
        </button>

      </div>
    `;

    riskList.appendChild(card);

    if((index + 1) % 3 === 0){
      const separator = document.createElement("div");
      separator.className = "separator-buttons";

      separator.innerHTML = `
        <button class="btn risk-btn" onclick="window.location.href='Risk-Overview.html'">
          📊 New Risk Overview
        </button>

        <button class="btn home-btn" onclick="window.location.href='index.html'">
          🏠 Home
        </button>
      `;

      riskList.appendChild(separator);
    }

  });
}

window.applyFilter = function(){

  const searchText = document.getElementById("searchInput").value.toLowerCase().trim();
  const dateFilter = document.getElementById("dateFilter").value;
  const riskFilter = document.getElementById("riskFilter").value;
  const statusFilter = document.getElementById("statusFilter").value;

  filteredReports = allReports.filter(report => {

    const hazards = getHazards(report);

    const hazardsSearch = hazards.map(h => `
      ${h.hazardTitle || ""}
      ${h.hazardCategory || ""}
      ${h.riskOwner || ""}
      ${h.hazardDescription || ""}
      ${h.causes || ""}
      ${h.consequences || ""}
      ${h.initialRisk?.level || ""}
      ${h.residualRisk?.level || ""}
      ${h.acceptable || ""}
      ${h.kpiSpi || ""}
      ${h.monitoringMethod || ""}
    `).join(" ");

    const searchArea = `
      ${report.firebaseId || ""}
      ${report.riskOverviewId || ""}
      ${report.customId || ""}
      ${report.title || ""}
      ${report.airport || ""}
      ${report.area || ""}
      ${report.process || ""}
      ${report.evaluator || ""}
      ${report.status || ""}
      ${hazardsSearch}
    `.toLowerCase();

    const matchesSearch =
      searchText === "" || searchArea.includes(searchText);

    const reportDate = normalizeDate(report.date || report.createdAtISO || report.createdAt || "");

    const matchesDate =
      dateFilter === "" || reportDate === dateFilter;

    const matchesRisk =
      riskFilter === "" ||
      hazards.some(h =>
        (h.initialRisk?.level || "") === riskFilter ||
        (h.residualRisk?.level || "") === riskFilter
      );

    const matchesStatus =
      statusFilter === "" || (report.status || "Open") === statusFilter;

    return matchesSearch && matchesDate && matchesRisk && matchesStatus;

  });

  filteredReports.sort((a,b) => {
    const dateA = a.createdAtISO || a.createdAt || a.firebaseId || "";
    const dateB = b.createdAtISO || b.createdAt || b.firebaseId || "";
    return String(dateB).localeCompare(String(dateA));
  });

  renderReports(filteredReports);
};

window.toggleFilters = function(){
  const panel = document.getElementById("filterPanel");
  panel.style.display = panel.style.display === "none" ? "grid" : "none";
};

const reportsRef = ref(database,"riskOverviewReports");

onValue(reportsRef,(snapshot) => {

  allReports = [];

  if(!snapshot.exists()){
    renderReports([]);
    return;
  }

  snapshot.forEach((childSnapshot) => {
    allReports.push({
      firebaseId:childSnapshot.key,
      ...childSnapshot.val()
    });
  });

  allReports.sort((a,b) => {
    const dateA = a.createdAtISO || a.createdAt || a.firebaseId || "";
    const dateB = b.createdAtISO || b.createdAt || b.firebaseId || "";
    return String(dateB).localeCompare(String(dateA));
  });

  window.applyFilter();

});

window.openReport = function(reportId){
  window.location.href = "Risk-Overview-Details.html?id=" + encodeURIComponent(reportId);
};

window.saveRiskOverviewId = function(reportId){

  const input = document.getElementById("riskOverviewId_" + reportId);
  const newId = input.value.trim();

  if(newId === ""){
    alert("Risk Overview ID cannot be empty.");
    return;
  }

  update(ref(database,"riskOverviewReports/" + reportId),{
    riskOverviewId:newId,
    updatedAt:new Date().toLocaleString(),
    updatedAtISO:new Date().toISOString()
  })
  .then(() => {
    alert("Risk Overview ID updated successfully.");
  })
  .catch((error) => {
    alert("Error updating Risk Overview ID: " + error.message);
  });

};

window.toggleStatus = function(reportId,currentStatus){

  const newStatus = currentStatus === "Closed" ? "Open" : "Closed";

  update(ref(database,"riskOverviewReports/" + reportId),{
    status:newStatus,
    updatedAt:new Date().toLocaleString(),
    updatedAtISO:new Date().toISOString()
  })
  .then(() => {
    alert("Report status changed to " + newStatus + ".");
  })
  .catch((error) => {
    alert("Error updating status: " + error.message);
  });

};

window.deleteReport = function(reportId){

  const confirmDelete = confirm(
    "Are you sure you want to permanently delete this Risk Overview report?"
  );

  if(!confirmDelete) return;

  remove(ref(database,"riskOverviewReports/" + reportId))
  .then(() => {
    alert("Risk Overview Report deleted successfully.");
  })
  .catch((error) => {
    alert("Error deleting report: " + error.message);
  });

};

window.downloadExcel = function(){

  let csv = "Risk Overview ID,Report Title,Airport,Area,Process,Evaluator,Report Status,Report Date,Review Date,Hazard Number,Hazard Title,Hazard Category,Risk Owner,Initial Risk,Residual Risk,Risk Acceptable,CPA Count,KPI/SPI,Monitoring Method,Review Frequency\n";

  filteredReports.forEach(report => {

    const hazards = getHazards(report);

    if(hazards.length === 0){
      const row = [
        report.riskOverviewId || report.firebaseId || "",
        report.title || "",
        report.airport || "",
        report.area || "",
        report.process || "",
        report.evaluator || "",
        report.status || "Open",
        report.date || "",
        report.reviewDate || "",
        "",
        "",
        "",
        "",
        "",
        "",
        "",
        "",
        "",
        "",
        ""
      ];

      csv += row.map(v => `"${String(v).replaceAll('"','""')}"`).join(",") + "\n";
    }

    hazards.forEach((hazard,index) => {

      const cpaCount = Array.isArray(hazard.correctiveActions) ? hazard.correctiveActions.length : 0;

      const row = [
        report.riskOverviewId || report.firebaseId || "",
        report.title || "",
        report.airport || "",
        report.area || "",
        report.process || "",
        report.evaluator || "",
        report.status || "Open",
        report.date || "",
        report.reviewDate || "",
        index + 1,
        hazard.hazardTitle || "",
        hazard.hazardCategory || "",
        hazard.riskOwner || "",
        hazard.initialRisk?.level || "",
        hazard.residualRisk?.level || "",
        hazard.acceptable || "",
        cpaCount,
        hazard.kpiSpi || "",
        hazard.monitoringMethod || "",
        hazard.reviewFrequency || ""
      ];

      csv += row.map(v => `"${String(v).replaceAll('"','""')}"`).join(",") + "\n";

    });

  });

  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "Risk_Overview_Database.csv";
  link.click();

  URL.revokeObjectURL(url);

};

</script>

</body>
</html>
