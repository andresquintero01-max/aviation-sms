<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Risk Overview Database</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  min-height:100vh;
  background:
  radial-gradient(circle at top left, rgba(255,152,0,0.30), transparent 30%),
  radial-gradient(circle at bottom right, rgba(28,99,219,0.45), transparent 38%),
  linear-gradient(rgba(5,20,55,0.86),rgba(5,20,55,0.94)),
  url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  padding:35px;
}

.container{
  max-width:1350px;
  margin:auto;
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(14px);
  padding:50px;
  border-radius:40px;
  box-shadow:0 30px 80px rgba(0,0,0,0.45);
  position:relative;
  overflow:hidden;
}

.content{position:relative;z-index:2;}

.logo{
  width:112px;
  height:112px;
  margin:0 auto 20px;
  border-radius:32px;
  background:linear-gradient(135deg,#071f47,#1450b8,#ff9800);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  box-shadow:0 18px 40px rgba(0,0,0,0.30);
}

.badge{
  display:block;
  width:max-content;
  margin:0 auto 16px;
  background:#eaf2ff;
  color:#071f47;
  padding:10px 24px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
  letter-spacing:1.8px;
}

h1{
  text-align:center;
  color:#071f47;
  font-size:58px;
  margin-bottom:10px;
  font-weight:900;
}

.description{
  text-align:center;
  color:#56657d;
  font-size:19px;
  margin-bottom:28px;
  font-weight:500;
}

.title-line{
  width:230px;
  height:6px;
  margin:0 auto 32px;
  border-radius:10px;
  background:linear-gradient(90deg,transparent,#1450b8,#ff9800,transparent);
}

.filter-box{
  background:#f8fbff;
  border:1px solid #e5e7eb;
  padding:22px;
  border-radius:26px;
  margin-bottom:26px;
  box-shadow:0 14px 32px rgba(0,0,0,0.10);
}

.filter-title{
  font-weight:900;
  color:#071f47;
  margin-bottom:12px;
  font-size:18px;
}

.filter-grid{
  display:grid;
  grid-template-columns:1.4fr 1fr 1fr;
  gap:14px;
}

.search-input,
select{
  width:100%;
  padding:16px;
  border:1px solid #cbd5e1;
  border-radius:16px;
  font-size:16px;
  outline:none;
  background:white;
}

.search-input:focus,
select:focus{
  border-color:#1450b8;
  box-shadow:0 0 0 4px rgba(20,80,184,0.12);
}

.top-buttons,
.bottom-buttons{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:30px;
  background:#f8fbff;
  padding:18px;
  border-radius:24px;
  border:1px solid #e5e7eb;
}

.bottom-buttons{
  margin-top:40px;
  margin-bottom:0;
}

.btn{
  border:none;
  color:white;
  padding:15px 28px;
  border-radius:16px;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  transition:0.25s;
  box-shadow:0 10px 22px rgba(0,0,0,0.22);
}

.btn:hover{transform:translateY(-3px);}

.overview-btn{background:linear-gradient(135deg,#d83b00,#ff9800);}
.home-btn{background:linear-gradient(135deg,#071f47,#1450b8);}
.open-btn{background:linear-gradient(135deg,#071f47,#1450b8);}
.save-btn{background:linear-gradient(135deg,#047857,#22c55e);}
.status-btn{background:linear-gradient(135deg,#6b21a8,#9333ea);}
.excel-btn{background:linear-gradient(135deg,#047857,#22c55e);}

.delete-btn{
  background:linear-gradient(135deg,#dc2626,#ef4444);
  width:50px;
  height:50px;
  border-radius:50%;
  padding:0;
  font-size:20px;
}

.counter{
  text-align:center;
  color:#071f47;
  font-weight:900;
  margin-bottom:20px;
  font-size:17px;
}

.report-card{
  background:linear-gradient(135deg,#ffffff,#f8fbff);
  border-radius:28px;
  padding:26px;
  margin-bottom:24px;
  box-shadow:0 18px 45px rgba(0,0,0,0.14);
  border-left:10px solid #1450b8;
  transition:0.25s;
  position:relative;
  overflow:hidden;
}

.report-card:hover{
  transform:translateY(-5px);
  box-shadow:0 26px 60px rgba(0,0,0,0.20);
}

.card-header,
.details-grid,
.actions{
  position:relative;
  z-index:2;
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.event-title{
  font-size:26px;
  font-weight:900;
  color:#071f47;
  margin-bottom:6px;
}

.meta{
  color:#56657d;
  font-size:15px;
  line-height:1.7;
}

.status{
  display:inline-block;
  padding:8px 18px;
  border-radius:999px;
  color:white;
  font-size:13px;
  font-weight:900;
  box-shadow:0 8px 18px rgba(0,0,0,0.18);
}

.status.open{background:linear-gradient(135deg,#047857,#22c55e);}
.status.closed{background:linear-gradient(135deg,#475569,#64748b);}
.status.in-progress{background:linear-gradient(135deg,#071f47,#1450b8);}
.status.pending-action{background:linear-gradient(135deg,#d83b00,#ff9800);}

.risk-badge{
  display:inline-block;
  padding:8px 16px;
  border-radius:999px;
  font-weight:900;
  font-size:13px;
}

.low-risk{background:#d8f3dc;color:#14532d;}
.medium-risk{background:#fff3cd;color:#664d03;}
.high-risk{background:#ffe0b2;color:#9a3412;}
.extreme-risk{background:#f8d7da;color:#842029;}

.details-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin-top:18px;
}

.detail-box{
  background:#f4f7fb;
  padding:15px;
  border-radius:18px;
  border:1px solid #dce3ef;
}

.detail-label{
  font-size:12px;
  color:#64748b;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:6px;
}

.detail-value{
  font-size:15px;
  color:#071f47;
  font-weight:800;
  word-break:break-word;
}

.risk-id-input{
  width:100%;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  font-size:15px;
  font-weight:800;
  color:#071f47;
}

.small-note{
  font-size:12px;
  color:#64748b;
  margin-top:6px;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:22px;
  align-items:center;
}

.separator-buttons{
  margin:30px 0;
  padding:18px;
  background:rgba(255,255,255,0.18);
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.30);
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  backdrop-filter:blur(8px);
}

.no-data{
  text-align:center;
  color:#56657d;
  font-size:20px;
  margin-top:35px;
  background:#f8fbff;
  padding:42px;
  border-radius:24px;
  border:1px solid #e5e7eb;
  font-weight:700;
}

.footer{
  margin-top:35px;
  text-align:center;
  color:#51617b;
  font-size:14px;
  letter-spacing:3px;
  font-weight:900;
}

@media(max-width:800px){
  body{padding:20px;}
  .container{padding:30px 22px;}
  h1{font-size:40px;}
  .event-title{font-size:21px;}
  .btn{width:100%;}
  .filter-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">
<div class="content">

  <div class="logo">🗂️</div>

  <div class="badge">RISK OVERVIEW DATABASE</div>

  <h1>Risk Overview Database</h1>

  <div class="description">
    Stored airport and operational risk panorama reports
  </div>

  <div class="title-line"></div>

  <div class="filter-box">
    <div class="filter-title">Search Risk Overview Reports</div>

    <div class="filter-grid">
      <input 
        id="searchInput" 
        class="search-input" 
        placeholder="Search by ID, title, airport, area, hazard, category, status..."
        oninput="applyFilter()"
      >

      <select id="riskFilter" onchange="applyFilter()">
        <option value="">All Risk Levels</option>
        <option value="LOW RISK">Low Risk</option>
        <option value="MEDIUM RISK">Medium Risk</option>
        <option value="HIGH RISK">High Risk</option>
        <option value="EXTREME RISK">Extreme Risk</option>
      </select>

      <select id="statusFilter" onchange="applyFilter()">
        <option value="">All Status</option>
        <option value="Open">Open</option>
        <option value="In Progress">In Progress</option>
        <option value="Pending Action">Pending Action</option>
        <option value="Closed">Closed</option>
      </select>
    </div>
  </div>

  <div class="top-buttons">
    <button class="btn excel-btn" onclick="downloadExcel()">📥 Download Excel</button>
    <button class="btn overview-btn" onclick="window.location.href='Risk-Overview.html'">📊 Risk Overview</button>
    <button class="btn home-btn" onclick="window.location.href='index.html'">🏠 Home</button>
  </div>

  <div id="counter" class="counter"></div>

  <div id="riskList"></div>

  <div id="noData" class="no-data" style="display:none;">
    No Risk Overview reports found.
  </div>

  <div class="bottom-buttons">
    <button class="btn overview-btn" onclick="window.location.href='Risk-Overview.html'">📊 Risk Overview</button>
    <button class="btn home-btn" onclick="window.location.href='index.html'">🏠 Home</button>
  </div>

  <div class="footer">
    AVIATION SAFETY MANAGEMENT PLATFORM
  </div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  remove,
  update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const riskList = document.getElementById("riskList");
const noData = document.getElementById("noData");
const counter = document.getElementById("counter");

let allReports = [];
let filteredReports = [];

function clean(value){
  return String(value || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function statusClass(status){
  return String(status || "Open")
    .toLowerCase()
    .replaceAll(" ","-");
}

function riskClass(level){
  return String(level || "LOW RISK")
    .toLowerCase()
    .replaceAll(" ","-");
}

function renderReports(reports){

  riskList.innerHTML = "";

  if(reports.length === 0){
    noData.style.display = "block";
    counter.innerHTML = "0 reports found";
    return;
  }

  noData.style.display = "none";
  counter.innerHTML = reports.length + " report(s) found";

  reports.forEach((report,index) => {

    const firebaseId = report.firebaseId;

    const visibleId =
      report.riskOverviewId ||
      report.customId ||
      firebaseId;

    const title =
      report.title ||
      "Untitled Risk Overview";

    const airport =
      report.airport ||
      "N/A";

    const area =
      report.area ||
      "N/A";

    const process =
      report.process ||
      "N/A";

    const hazardTitle =
      report.hazardTitle ||
      "N/A";

    const hazardCategory =
      report.hazardCategory ||
      "N/A";

    const status =
      report.status ||
      "Open";

    const date =
      report.date ||
      report.createdAt ||
      "N/A";

    const initialRisk = report.initialRisk || {};
    const residualRisk = report.residualRisk || {};

    const initialLevel =
      initialRisk.level ||
      "LOW RISK";

    const residualLevel =
      residualRisk.level ||
      "LOW RISK";

    const card = document.createElement("div");
    card.className = "report-card";

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="event-title">${clean(title)}</div>

          <div class="meta">
            <strong>Date:</strong> ${clean(date)}<br>
            <strong>Airport / Station:</strong> ${clean(airport)}<br>
            <strong>Area:</strong> ${clean(area)} | 
            <strong>Process:</strong> ${clean(process)}<br>
            <strong>Hazard:</strong> ${clean(hazardTitle)}
          </div>
        </div>

        <span class="status ${statusClass(status)}">
          ${clean(status)}
        </span>
      </div>

      <div class="details-grid">

        <div class="detail-box">
          <div class="detail-label">Editable Risk Overview ID</div>
          <input 
            class="risk-id-input" 
            id="riskOverviewId_${clean(firebaseId)}" 
            value="${clean(visibleId)}"
          >
          <div class="small-note">
            You can write your own Risk Overview ID here.
          </div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Hazard Category</div>
          <div class="detail-value">${clean(hazardCategory)}</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Initial Risk</div>
          <div class="detail-value">
            <span class="risk-badge ${riskClass(initialLevel)}">${clean(initialLevel)}</span>
          </div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Residual Risk</div>
          <div class="detail-value">
            <span class="risk-badge ${riskClass(residualLevel)}">${clean(residualLevel)}</span>
          </div>
        </div>

      </div>

      <div class="actions">

        <button class="btn open-btn" onclick="openReport('${clean(firebaseId)}')">
          Open Report
        </button>

        <button class="btn save-btn" onclick="saveRiskOverviewId('${clean(firebaseId)}')">
          Save ID
        </button>

        <button class="btn status-btn" onclick="toggleStatus('${clean(firebaseId)}', '${clean(status)}')">
          ${status === "Open" ? "Close Report" : "Open Report"}
        </button>

        <button class="btn delete-btn" onclick="deleteReport('${clean(firebaseId)}')">
          🗑
        </button>

      </div>
    `;

    riskList.appendChild(card);

    if((index + 1) % 3 === 0){
      const separator = document.createElement("div");
      separator.className = "separator-buttons";

      separator.innerHTML = `
        <button class="btn overview-btn" onclick="window.location.href='Risk-Overview.html'">
          📊 Risk Overview
        </button>

        <button class="btn home-btn" onclick="window.location.href='index.html'">
          🏠 Home
        </button>
      `;

      riskList.appendChild(separator);
    }

  });
}

window.applyFilter = function(){

  const searchText = document.getElementById("searchInput").value.toLowerCase().trim();
  const riskFilter = document.getElementById("riskFilter").value;
  const statusFilter = document.getElementById("statusFilter").value;

  filteredReports = allReports.filter(report => {

    const initialRisk = report.initialRisk || {};
    const residualRisk = report.residualRisk || {};

    const searchArea = `
      ${report.firebaseId || ""}
      ${report.riskOverviewId || ""}
      ${report.customId || ""}
      ${report.title || ""}
      ${report.airport || ""}
      ${report.area || ""}
      ${report.process || ""}
      ${report.evaluator || ""}
      ${report.date || ""}
      ${report.reviewDate || ""}
      ${report.status || ""}
      ${report.hazardTitle || ""}
      ${report.hazardCategory || ""}
      ${report.riskOwner || ""}
      ${report.hazardDescription || ""}
      ${report.causes || ""}
      ${report.consequences || ""}
      ${report.existingControls || ""}
      ${report.kpiSpi || ""}
      ${report.monitoringMethod || ""}
      ${initialRisk.level || ""}
      ${residualRisk.level || ""}
    `.toLowerCase();

    const matchesSearch =
      searchText === "" || searchArea.includes(searchText);

    const matchesRisk =
      riskFilter === "" ||
      (initialRisk.level || "") === riskFilter ||
      (residualRisk.level || "") === riskFilter;

    const matchesStatus =
      statusFilter === "" ||
      (report.status || "Open") === statusFilter;

    return matchesSearch && matchesRisk && matchesStatus;

  });

  filteredReports.sort((a,b) => {
    return String(b.firebaseId).localeCompare(String(a.firebaseId));
  });

  renderReports(filteredReports);
};

const reportsRef = ref(database, "riskOverviewReports");

onValue(reportsRef, (snapshot) => {

  allReports = [];

  if(!snapshot.exists()){
    renderReports([]);
    return;
  }

  snapshot.forEach((childSnapshot) => {
    allReports.push({
      firebaseId: childSnapshot.key,
      ...childSnapshot.val()
    });
  });

  allReports.sort((a,b) => {
    return String(b.firebaseId).localeCompare(String(a.firebaseId));
  });

  applyFilter();

});

window.openReport = function(reportId){
  window.location.href = "Risk-Overview-Details.html?id=" + reportId;
};

window.saveRiskOverviewId = function(reportId){

  const input = document.getElementById("riskOverviewId_" + reportId);
  const newId = input.value.trim();

  if(newId === ""){
    alert("Risk Overview ID cannot be empty.");
    return;
  }

  update(ref(database, "riskOverviewReports/" + reportId), {
    riskOverviewId: newId,
    updatedAt: new Date().toLocaleString()
  })
  .then(() => {
    alert("Risk Overview ID updated successfully.");
  })
  .catch((error) => {
    alert("Error updating Risk Overview ID: " + error.message);
  });

};

window.toggleStatus = function(reportId, currentStatus){

  const newStatus = currentStatus === "Open" ? "Closed" : "Open";

  update(ref(database, "riskOverviewReports/" + reportId), {
    status: newStatus,
    updatedAt: new Date().toLocaleString()
  })
  .then(() => {
    alert("Report status changed to " + newStatus + ".");
  })
  .catch((error) => {
    alert("Error updating status: " + error.message);
  });

};

window.deleteReport = function(reportId){

  const confirmDelete = confirm(
    "Are you sure you want to permanently delete this Risk Overview report?"
  );

  if(!confirmDelete) return;

  remove(ref(database, "riskOverviewReports/" + reportId))
  .then(() => {
    alert("Risk Overview Report deleted successfully.");
  })
  .catch((error) => {
    alert("Error deleting report: " + error.message);
  });

};

window.downloadExcel = function(){

  let csv = "Risk Overview ID,Title,Airport,Area,Process,Hazard Title,Hazard Category,Initial Risk,Residual Risk,Status,Date,Review Date,Evaluator\n";

  filteredReports.forEach(report => {

    const initialRisk = report.initialRisk || {};
    const residualRisk = report.residualRisk || {};

    const row = [
      report.riskOverviewId || report.firebaseId || "",
      report.title || "",
      report.airport || "",
      report.area || "",
      report.process || "",
      report.hazardTitle || "",
      report.hazardCategory || "",
      initialRisk.level || "",
      residualRisk.level || "",
      report.status || "Open",
      report.date || "",
      report.reviewDate || "",
      report.evaluator || ""
    ];

    csv += row.map(value => `"${String(value).replaceAll('"','""')}"`).join(",") + "\n";

  });

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "Risk_Overview_Database.csv";
  link.click();

  URL.revokeObjectURL(url);

};

</script>

</body>
</html>
