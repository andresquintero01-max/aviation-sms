<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Risk Overview Database</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at top left,rgba(255,152,0,.24),transparent 30%),
    radial-gradient(circle at bottom right,rgba(37,99,235,.42),transparent 38%),
    linear-gradient(135deg,#020617,#071f47,#1450b8);
  padding:35px;
}

.container{
  max-width:1280px;
  margin:auto;
  background:rgba(255,255,255,.96);
  padding:38px;
  border-radius:34px;
  box-shadow:0 25px 70px rgba(0,0,0,.38);
}

.header{
  text-align:center;
  margin-bottom:28px;
}

.header-icon{font-size:54px;}

h1{
  color:#071f47;
  font-size:46px;
  margin-top:5px;
}

.subtitle{
  color:#64748b;
  margin-top:8px;
  font-size:17px;
}

.top-buttons,.actions,.modal-buttons{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}

.top-buttons{margin-bottom:28px;}

a,button{
  border:none;
  text-decoration:none;
  padding:14px 24px;
  border-radius:999px;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  color:white;
  background:#071f47;
  transition:.25s;
}

a:hover,button:hover{
  transform:translateY(-3px);
  filter:brightness(1.08);
}

.report{background:#f97316;}
.home{background:#071f47;}
.back{background:#475569;}
.excel{background:#16a34a;}
.view{background:#2563eb;}
.print{background:#f97316;}
.edit{background:#0f766e;}
.delete{background:#dc2626;}

.filters{
  display:grid;
  grid-template-columns:2fr 1fr 1fr;
  gap:15px;
  margin-bottom:28px;
  background:#f8fafc;
  padding:18px;
  border-radius:22px;
  border:1px solid #dbeafe;
}

input,select,textarea{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #cbd5e1;
  font-size:15px;
  background:white;
}

textarea{
  min-height:110px;
  resize:vertical;
}

.cards{
  display:grid;
  gap:24px;
}

.card{
  position:relative;
  overflow:hidden;
  border-radius:28px;
  padding:28px;
  background:linear-gradient(180deg,#ffffff,#f8fafc);
  border:1px solid #dbeafe;
  border-left:9px solid #2563eb;
  box-shadow:0 16px 35px rgba(15,23,42,.13);
}

.card::before{
  content:"";
  position:absolute;
  top:-80px;
  right:-80px;
  width:190px;
  height:190px;
  background:rgba(37,99,235,.08);
  border-radius:50%;
}

.card-header{
  position:relative;
  display:flex;
  justify-content:space-between;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.card h2{
  color:#071f47;
  font-size:26px;
  margin-bottom:5px;
}

.meta{
  color:#334155;
  font-size:15px;
}

.badges{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:flex-start;
}

.badge{
  padding:10px 15px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

.OPEN{background:#fee2e2;color:#991b1b;}
.INPROGRESS{background:#fef9c3;color:#854d0e;}
.CLOSED{background:#dcfce7;color:#166534;}

.LOW{background:#dcfce7;color:#166534;}
.MEDIUM{background:#fef9c3;color:#854d0e;}
.HIGH{background:#ffedd5;color:#9a3412;}
.EXTREME{background:#fee2e2;color:#991b1b;}

.info-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin:18px 0;
}

.info{
  background:white;
  padding:16px;
  border-radius:17px;
  border:1px solid #e2e8f0;
  box-shadow:0 6px 16px rgba(15,23,42,.05);
}

.info strong{
  display:block;
  color:#071f47;
  margin-bottom:7px;
}

.text-block{
  background:white;
  padding:18px;
  border-radius:18px;
  border:1px solid #e2e8f0;
  margin-top:12px;
  white-space:pre-wrap;
  line-height:1.5;
}

.text-block strong{
  color:#071f47;
}

.actions{
  justify-content:flex-start;
  margin-top:22px;
}

.empty{
  text-align:center;
  color:#64748b;
  font-size:18px;
  padding:45px;
  background:#f8fafc;
  border-radius:24px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.72);
  padding:30px;
  overflow:auto;
  z-index:1000;
}

.modal-content{
  max-width:1000px;
  margin:auto;
  background:white;
  border-radius:30px;
  padding:35px;
  box-shadow:0 25px 70px rgba(0,0,0,.42);
}

.modal-title{
  text-align:center;
  color:#071f47;
  font-size:36px;
  margin-bottom:8px;
}

.close-modal{
  float:right;
  background:#dc2626;
  padding:10px 16px;
}

.edit-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  margin-top:24px;
}

.full{grid-column:1/3;}

label{
  font-weight:800;
  color:#334155;
  margin-bottom:7px;
  display:block;
}

.modal-buttons{
  margin-top:28px;
}

@media(max-width:850px){
  .filters,.info-grid,.edit-grid{grid-template-columns:1fr;}
  .full{grid-column:1/2;}
  h1{font-size:34px;}
  .container{padding:24px;}
}

@media print{
  body{background:white;padding:0;}
  .container{box-shadow:none;border-radius:0;}
  .top-buttons,.filters,.actions,.close-modal{display:none!important;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="header-icon">🗂️</div>
  <h1>Risk Overview Database</h1>
  <p class="subtitle">Saved Risk Overview Reports - 371Q Professional Safety Software</p>
</div>

<div class="top-buttons">
  <a class="report" href="Risk-Overview-Report.html">➕ New Report</a>
  <button class="excel" onclick="downloadCSV()">⬇ Export CSV</button>
  <a class="back" href="Risk-Overview.html">⬅ Back</a>
  <a class="home" href="index.html">🏠 Home</a>
</div>

<div class="filters">
  <input id="searchInput" placeholder="Search by title, department, location, hazard..." oninput="renderReports()">

  <select id="statusFilter" onchange="renderReports()">
    <option value="">All Status</option>
    <option value="OPEN">OPEN</option>
    <option value="IN PROGRESS">IN PROGRESS</option>
    <option value="CLOSED">CLOSED</option>
  </select>

  <select id="riskFilter" onchange="renderReports()">
    <option value="">All Risk Levels</option>
    <option value="LOW">LOW</option>
    <option value="MEDIUM">MEDIUM</option>
    <option value="HIGH">HIGH</option>
    <option value="EXTREME">EXTREME</option>
  </select>
</div>

<div id="records" class="cards"></div>

</div>

<div id="viewModal" class="modal">
  <div class="modal-content" id="viewContent"></div>
</div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <button class="close-modal" onclick="closeEdit()">X</button>
    <h2 class="modal-title">Edit Visible Information</h2>
    <p class="subtitle" style="text-align:center;">This edit does not change probability, severity, or risk calculations.</p>

    <div class="edit-grid">
      <div>
        <label>Report Title</label>
        <input id="editTitle">
      </div>

      <div>
        <label>Date</label>
        <input id="editDate" type="date">
      </div>

      <div>
        <label>Department / Area</label>
        <input id="editDepartment">
      </div>

      <div>
        <label>Location</label>
        <input id="editLocation">
      </div>

      <div>
        <label>Reported By</label>
        <input id="editReportedBy">
      </div>

      <div>
        <label>Status</label>
        <select id="editStatus">
          <option value="OPEN">OPEN</option>
          <option value="IN PROGRESS">IN PROGRESS</option>
          <option value="CLOSED">CLOSED</option>
        </select>
      </div>

      <div>
        <label>Responsible Person</label>
        <input id="editResponsible">
      </div>

      <div>
        <label>Due Date</label>
        <input id="editDueDate" type="date">
      </div>

      <div class="full">
        <label>Hazard</label>
        <textarea id="editHazard"></textarea>
      </div>

      <div class="full">
        <label>Recommended Actions</label>
        <textarea id="editActions"></textarea>
      </div>
    </div>

    <div class="modal-buttons">
      <button class="excel" onclick="saveEdit()">💾 Save Changes</button>
      <button class="back" onclick="closeEdit()">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let allReports = [];
let editingId = null;

function getCompanyId(){
  return localStorage.getItem("companyId") || "defaultCompany";
}

function safe(value){
  return value || "";
}

function cleanStatus(status){
  return (status || "OPEN").replace(/\s/g,"");
}

function firstHazard(r){
  if(r.hazards && Array.isArray(r.hazards) && r.hazards.length > 0){
    return r.hazards[0];
  }
  return {
    hazard:r.hazard || "",
    consequence:r.consequence || "",
    existingControls:r.existingControls || "",
    actions:r.actions || ""
  };
}

function allHazardText(r){
  if(r.hazards && Array.isArray(r.hazards)){
    return r.hazards.map(h => `${h.hazard} ${h.actions} ${h.consequence}`).join(" ");
  }
  return `${r.hazard} ${r.actions} ${r.consequence}`;
}

function loadReports(){
  const companyId = getCompanyId();
  const reportsRef = ref(db, "riskOverview/" + companyId);

  onValue(reportsRef, snapshot => {
    allReports = [];

    snapshot.forEach(child => {
      const data = child.val();
      data.id = child.key;
      allReports.push(data);
    });

    allReports.sort((a,b) => new Date(b.createdAt || b.date || 0) - new Date(a.createdAt || a.date || 0));
    renderReports();
  });
}

window.renderReports = function(){
  const container = document.getElementById("records");
  const search = document.getElementById("searchInput").value.toLowerCase();
  const statusFilter = document.getElementById("statusFilter").value;
  const riskFilter = document.getElementById("riskFilter").value;

  let filtered = allReports.filter(r => {
    const text = `
      ${r.title}
      ${r.department}
      ${r.location}
      ${r.reportedBy}
      ${r.responsible}
      ${allHazardText(r)}
    `.toLowerCase();

    const matchSearch = text.includes(search);
    const matchStatus = !statusFilter || r.status === statusFilter;
    const matchRisk = !riskFilter || r.initialRiskLevel === riskFilter || r.residualRiskLevel === riskFilter;

    return matchSearch && matchStatus && matchRisk;
  });

  if(filtered.length === 0){
    container.innerHTML = `<div class="empty">No Risk Overview reports found.</div>`;
    return;
  }

  container.innerHTML = filtered.map(r => {
    const h = firstHazard(r);
    const hazardCount = r.hazards && Array.isArray(r.hazards) ? r.hazards.length : 1;

    return `
      <div class="card">
        <div class="card-header">
          <div>
            <h2>${safe(r.title)}</h2>
            <p class="meta">${safe(r.date)} | ${safe(r.department)} | ${safe(r.location)}</p>
            <p class="meta">${safe(r.environment)} ${r.operationType ? "| " + safe(r.operationType) : ""}</p>
          </div>

          <div class="badges">
            <span class="badge ${cleanStatus(r.status)}">${safe(r.status)}</span>
            <span class="badge ${safe(r.initialRiskLevel)}">Initial: ${safe(r.initialRiskScore)} ${safe(r.initialRiskLevel)}</span>
            <span class="badge ${safe(r.residualRiskLevel)}">Residual: ${safe(r.residualRiskScore)} ${safe(r.residualRiskLevel)}</span>
          </div>
        </div>

        <div class="info-grid">
          <div class="info"><strong>Reported By</strong>${safe(r.reportedBy)}</div>
          <div class="info"><strong>Responsible</strong>${safe(r.responsible)}</div>
          <div class="info"><strong>Due Date</strong>${safe(r.dueDate)}</div>
        </div>

        <div class="text-block"><strong>Hazard:</strong><br>${safe(h.hazard)}</div>
        <div class="text-block"><strong>Recommended Actions:</strong><br>${safe(h.actions)}</div>

        <div class="text-block"><strong>Total Hazards in this Panorama:</strong> ${hazardCount}</div>

        <div class="actions">
          <button class="view" onclick="viewReport('${r.id}')">👁 View</button>
          <button class="print" onclick="printReport('${r.id}')">🖨 Print</button>
          <button class="edit" onclick="openEdit('${r.id}')">✏ Edit</button>
          <button class="delete" onclick="deleteReport('${r.id}')">🗑 Delete</button>
        </div>
      </div>
    `;
  }).join("");
}

window.viewReport = function(id){
  const r = allReports.find(item => item.id === id);
  if(!r) return;

  let hazardsHtml = "";

  if(r.hazards && Array.isArray(r.hazards)){
    hazardsHtml = r.hazards.map((h,index) => `
      <div class="text-block">
        <strong>Hazard ${index + 1}</strong><br><br>
        <strong>Description:</strong><br>${safe(h.hazard)}<br><br>
        <strong>Consequence:</strong><br>${safe(h.consequence)}<br><br>
        <strong>Existing Controls:</strong><br>${safe(h.existingControls)}<br><br>
        <strong>Recommended Actions:</strong><br>${safe(h.actions)}<br><br>
        <strong>Initial Risk:</strong> ${safe(h.initialRiskScore)} - ${safe(h.initialRiskLevel)}<br>
        <strong>Residual Risk:</strong> ${safe(h.residualRiskScore)} - ${safe(h.residualRiskLevel)}
      </div>
    `).join("");
  }else{
    hazardsHtml = `
      <div class="text-block"><strong>Hazard Description</strong><br>${safe(r.hazard)}</div>
      <div class="text-block"><strong>Potential Consequence</strong><br>${safe(r.consequence)}</div>
      <div class="text-block"><strong>Existing Controls</strong><br>${safe(r.existingControls)}</div>
      <div class="text-block"><strong>Recommended Actions</strong><br>${safe(r.actions)}</div>
    `;
  }

  document.getElementById("viewContent").innerHTML = `
    <button class="close-modal" onclick="closeView()">X</button>

    <h2 class="modal-title">${safe(r.title)}</h2>
    <p class="subtitle" style="text-align:center;">Risk Overview Full Report</p>

    <div class="info-grid">
      <div class="info"><strong>Date</strong>${safe(r.date)}</div>
      <div class="info"><strong>Department</strong>${safe(r.department)}</div>
      <div class="info"><strong>Location</strong>${safe(r.location)}</div>
      <div class="info"><strong>Environment</strong>${safe(r.environment)}</div>
      <div class="info"><strong>Operation Type</strong>${safe(r.operationType)}</div>
      <div class="info"><strong>Reported By</strong>${safe(r.reportedBy)}</div>
      <div class="info"><strong>Status</strong>${safe(r.status)}</div>
      <div class="info"><strong>Responsible</strong>${safe(r.responsible)}</div>
      <div class="info"><strong>Due Date</strong>${safe(r.dueDate)}</div>
      <div class="info"><strong>Initial Risk</strong>${safe(r.initialRiskScore)} - ${safe(r.initialRiskLevel)}</div>
      <div class="info"><strong>Residual Risk</strong>${safe(r.residualRiskScore)} - ${safe(r.residualRiskLevel)}</div>
      <div class="info"><strong>Created At</strong>${safe(r.createdAt)}</div>
    </div>

    ${hazardsHtml}

    <div class="modal-buttons">
      <button class="print" onclick="window.print()">🖨 Print</button>
    </div>
  `;

  document.getElementById("viewModal").style.display = "block";
}

window.closeView = function(){
  document.getElementById("viewModal").style.display = "none";
}

window.printReport = function(id){
  viewReport(id);
  setTimeout(() => window.print(), 300);
}

window.openEdit = function(id){
  const r = allReports.find(item => item.id === id);
  if(!r) return;

  const h = firstHazard(r);
  editingId = id;

  document.getElementById("editTitle").value = safe(r.title);
  document.getElementById("editDate").value = safe(r.date);
  document.getElementById("editDepartment").value = safe(r.department);
  document.getElementById("editLocation").value = safe(r.location);
  document.getElementById("editReportedBy").value = safe(r.reportedBy);
  document.getElementById("editStatus").value = safe(r.status) || "OPEN";
  document.getElementById("editResponsible").value = safe(r.responsible);
  document.getElementById("editDueDate").value = safe(r.dueDate);
  document.getElementById("editHazard").value = safe(h.hazard);
  document.getElementById("editActions").value = safe(h.actions);

  document.getElementById("editModal").style.display = "block";
}

window.closeEdit = function(){
  editingId = null;
  document.getElementById("editModal").style.display = "none";
}

window.saveEdit = async function(){
  if(!editingId) return;

  const companyId = getCompanyId();
  const r = allReports.find(item => item.id === editingId);
  if(!r) return;

  let updatedHazards = r.hazards && Array.isArray(r.hazards) ? [...r.hazards] : null;

  if(updatedHazards && updatedHazards.length > 0){
    updatedHazards[0] = {
      ...updatedHazards[0],
      hazard:document.getElementById("editHazard").value,
      actions:document.getElementById("editActions").value
    };
  }

  const updatedData = {
    title:document.getElementById("editTitle").value,
    date:document.getElementById("editDate").value,
    department:document.getElementById("editDepartment").value,
    location:document.getElementById("editLocation").value,
    reportedBy:document.getElementById("editReportedBy").value,
    status:document.getElementById("editStatus").value,
    responsible:document.getElementById("editResponsible").value,
    dueDate:document.getElementById("editDueDate").value,

    hazard:document.getElementById("editHazard").value,
    actions:document.getElementById("editActions").value,

    updatedAt:new Date().toISOString()
  };

  if(updatedHazards){
    updatedData.hazards = updatedHazards;
  }

  await update(ref(db, "riskOverview/" + companyId + "/" + editingId), updatedData);

  closeEdit();
  alert("Visible information updated successfully.");
}

window.deleteReport = async function(id){
  const confirmDelete = confirm("Are you sure you want to delete this Risk Overview report?");
  if(!confirmDelete) return;

  const companyId = getCompanyId();
  await remove(ref(db, "riskOverview/" + companyId + "/" + id));

  alert("Report deleted successfully.");
}

window.downloadCSV = function(){
  if(allReports.length === 0){
    alert("No reports to export.");
    return;
  }

  const headers = [
    "Title","Date","Environment","Operation Type","Department","Location","Reported By","Status",
    "Hazard","Recommended Actions","Responsible","Due Date",
    "Initial Risk Score","Initial Risk Level","Residual Risk Score","Residual Risk Level","Created At"
  ];

  const rows = allReports.map(r => {
    const h = firstHazard(r);
    return [
      safe(r.title),safe(r.date),safe(r.environment),safe(r.operationType),safe(r.department),safe(r.location),
      safe(r.reportedBy),safe(r.status),safe(h.hazard),safe(h.actions),safe(r.responsible),safe(r.dueDate),
      safe(r.initialRiskScore),safe(r.initialRiskLevel),safe(r.residualRiskScore),safe(r.residualRiskLevel),
      safe(r.createdAt)
    ];
  });

  let csv = headers.join(",") + "\n";
  rows.forEach(row => {
    csv += row.map(value => `"${String(value).replace(/"/g,'""')}"`).join(",") + "\n";
  });

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");

  link.href = url;
  link.download = "Risk-Overview-Database.csv";
  link.click();

  URL.revokeObjectURL(url);
}

loadReports();
</script>

</body>
</html>
