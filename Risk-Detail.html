<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getDatabase, ref, get, update, push, remove }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

import { getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
apiKey: "xxx",
authDomain: "aviation-sms.firebaseapp.com",
databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
projectId: "aviation-sms",
storageBucket: "aviation-sms.firebasestorage.app",
messagingSenderId: "147000937860",
appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const key = new URLSearchParams(window.location.search).get("key");

let p=0,s=0,risk=0,cpaCounter=0;
let rp=0,rs=0,residualRisk=0;

get(ref(db,"smsReports/"+key)).then(s=>{
if(s.exists()){
const d=s.val();

document.getElementById("reportBox").innerHTML=`
<b>ID:</b> ${d.reportId}<br>
<b>What Happened:</b> ${d.whatHappened}<br>
<b>Date:</b> ${d.date}<br>
<b>Risk:</b> ${d.risk}
`;

savedRisk.innerText=d.risk||"N/A";
savedResidualRisk.innerText=d.residualRisk||"N/A";

if(d.status==="Closed"){
const btn=document.getElementById("closeBtn");

btn.innerText="Closed ✅";
btn.style.background="green";
}

loadCPA(d.CPA);
renderMatrix();
renderResidualMatrix();
}
});

function createButtons(id,type){
const c=document.getElementById(id);

for(let i=1;i<=5;i++){
let b=document.createElement("button");
b.innerText=i;

b.onclick=()=>{
for(let x of c.children)x.classList.remove("active");
b.classList.add("active");

if(type==="p")p=i;
if(type==="s")s=i;
};

c.appendChild(b);
}
}

createButtons("pBtns","p");
createButtons("sBtns","s");

function createResidualButtons(id,type){
const c=document.getElementById(id);

for(let i=1;i<=5;i++){
let b=document.createElement("button");
b.innerText=i;

b.onclick=()=>{
for(let x of c.children)x.classList.remove("active");
b.classList.add("active");

if(type==="rp")rp=i;
if(type==="rs")rs=i;
};

c.appendChild(b);
}
}

createResidualButtons("rpBtns","rp");
createResidualButtons("rsBtns","rs");

window.calculateRisk=function(){
risk=p*s;

let lvl = risk<=5?"LOW 🟢":risk<=12?"MEDIUM 🟡":"HIGH 🔴";

result.innerText="Risk: "+risk+" → "+lvl;
renderMatrix();
};

window.saveRisk=function(){
update(ref(db,"smsReports/"+key),{risk});
savedRisk.innerText=risk;
};

window.calculateResidualRisk=function(){
residualRisk=rp*rs;

let lvl = residualRisk<=5?"LOW 🟢":residualRisk<=12?"MEDIUM 🟡":"HIGH 🔴";

residualResult.innerText="Risk: "+residualRisk+" → "+lvl;
renderResidualMatrix();
};

window.saveResidualRisk=function(){
update(ref(db,"smsReports/"+key),{residualRisk});
savedResidualRisk.innerText=residualRisk;
};

window.closeSMS=function(){

update(ref(db,"smsReports/"+key),{
status:"Closed"
});

const btn=document.getElementById("closeBtn");

btn.innerText="Closed ✅";

btn.style.background="green";

};

function renderMatrix(){

const m=document.getElementById("matrix");
m.innerHTML="";

const grid=document.createElement("div");
grid.className="matrix-grid";

grid.appendChild(document.createElement("div"));

for(let p=1;p<=5;p++){
let x=document.createElement("div");
x.innerText="P"+p;
x.style.fontWeight="bold";
x.style.textAlign="center";
grid.appendChild(x);
}

const dp={
1:"Very unlikely",
2:"Unlikely",
3:"Possible",
4:"Likely",
5:"Very likely"
};

const ds={
1:"Minor",
2:"Low",
3:"Medium",
4:"High",
5:"Catastrophic"
};

for(let s=5;s>=1;s--){

let y=document.createElement("div");
y.innerText="S"+s;
y.style.fontWeight="bold";
y.style.display="flex";
y.style.alignItems="center";
y.style.justifyContent="center";

grid.appendChild(y);

for(let p=1;p<=5;p++){

let v=p*s;

let cell=document.createElement("div");
cell.className="cell "+(v<=5?"low":v<=12?"medium":"high");
cell.innerText=v;

cell.onmouseover=()=>{
let t=document.createElement("div");
t.className="tooltip";
t.innerText=`P:${dp[p]} | S:${ds[s]}`;
cell.appendChild(t);
t.style.display="block";
};

cell.onmouseout=()=>cell.querySelector(".tooltip")?.remove();

grid.appendChild(cell);
}
}

m.appendChild(grid);
}

for(let s=5;s>=1;s--){

y.innerText="S"+s;

y.style.display="flex";
y.style.alignItems="center";
y.style.justifyContent="center";

grid.appendChild(y);

for(let p=1;p<=5;p++){

let v=p*s;

cell.innerText=v;

t.className="tooltip";

}
</script>

</body>
