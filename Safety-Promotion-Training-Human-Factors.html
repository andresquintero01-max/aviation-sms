<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Human Factors Training</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI', Arial, sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 28%),
    radial-gradient(circle at bottom right, rgba(139,92,246,0.35), transparent 35%),
    linear-gradient(135deg,#020617,#071f47,#1450b8);
  padding:35px;
}

.container{
  max-width:1200px;
  margin:auto;
  background:rgba(255,255,255,0.97);
  border-radius:36px;
  padding:45px;
  box-shadow:0 25px 70px rgba(0,0,0,0.38);
}

.header{
  background:linear-gradient(135deg,#071f47,#1450b8,#8b5cf6);
  color:white;
  padding:45px;
  border-radius:30px;
  text-align:center;
  margin-bottom:35px;
}

.header h1{
  font-size:54px;
  margin-bottom:12px;
}

.header p{
  font-size:19px;
  color:#e0e7ff;
}

.top-buttons{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:30px;
}

.section{
  background:#f8fbff;
  border:1px solid #d8e1ef;
  border-radius:26px;
  padding:28px;
  margin-bottom:28px;
  border-left:9px solid #8b5cf6;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.section h2{
  color:#071f47;
  font-size:28px;
  margin-bottom:18px;
}

label{
  display:block;
  margin-top:15px;
  margin-bottom:7px;
  font-weight:bold;
  color:#071f47;
}

input{
  width:100%;
  padding:15px;
  border:1px solid #b8c7da;
  border-radius:14px;
  font-size:16px;
  background:white;
}

.btn{
  border:none;
  color:white;
  padding:14px 26px;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin:6px;
  transition:0.25s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

.save-btn{background:linear-gradient(135deg,#071f47,#1450b8);}
.play-btn{background:linear-gradient(135deg,#004aad,#1473e6);}
.add-btn{background:linear-gradient(135deg,#f59e0b,#ff9800);}
.submit-btn{background:linear-gradient(135deg,#15803d,#22c55e);}
.back-btn{background:linear-gradient(135deg,#c40000,#ff3131);}
.home-btn{background:linear-gradient(135deg,#071f47,#0b2a66);}
.print-btn{background:linear-gradient(135deg,#006b3c,#22c55e);}

.delete-btn{
  background:linear-gradient(135deg,#d00000,#ff1f1f);
  color:white;
  border:none;
  padding:11px 17px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

iframe{
  width:100%;
  height:440px;
  border:none;
  border-radius:22px;
  margin-top:25px;
  box-shadow:0 12px 30px rgba(0,0,0,0.22);
}

.question{
  background:white;
  padding:22px;
  border-radius:20px;
  margin-top:22px;
  box-shadow:0 8px 20px rgba(0,0,0,0.10);
  border:1px solid #d8e1ef;
}

.question h3{
  color:#071f47;
  margin-bottom:14px;
}

.option{
  display:block;
  margin:12px 0;
  color:#333;
  font-size:16px;
  font-weight:500;
}

.option input{
  width:auto;
  margin-right:8px;
}

.hidden{
  display:none;
}

.success{
  color:#14532d;
  font-weight:bold;
  font-size:20px;
  background:#e8f5e9;
  border-left:9px solid #22c55e;
}

.error{
  color:#7f1d1d;
  font-weight:bold;
  font-size:20px;
  background:#fee2e2;
  border-left:9px solid #dc2626;
}

.record-card{
  background:white;
  padding:20px;
  border-radius:18px;
  margin-top:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.10);
  color:#071f47;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  border-left:7px solid #1450b8;
}

.record-info{
  line-height:1.7;
}

.note{
  background:#eef4ff;
  border:1px solid #c8d8f0;
  color:#071f47;
  padding:18px;
  border-radius:18px;
  font-weight:bold;
  margin-bottom:25px;
  text-align:center;
}

@media print{
  .section.video-section,
  .quiz-box,
  .top-buttons,
  .add-btn,
  .result-box,
  .delete-btn{
    display:none !important;
  }

  body{
    background:white;
  }

  .container{
    box-shadow:none;
    border-radius:0;
  }
}

@media(max-width:800px){
  body{
    padding:20px;
  }

  .container{
    padding:25px;
  }

  .header{
    padding:30px 20px;
  }

  .header h1{
    font-size:38px;
  }

  iframe{
    height:260px;
  }

  .record-card{
    flex-direction:column;
    align-items:flex-start;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Human Factors Training</h1>
    <p>Safety Promotion Training Video and Knowledge Check</p>
  </div>

  <div class="top-buttons">
    <button class="btn back-btn" onclick="location.href='Safety-Promotion-Training.html'">← Back</button>
    <button class="btn home-btn" onclick="location.href='index.html'">🏠 Home</button>
    <button class="btn print-btn" onclick="window.print()">🖨 Print Records</button>
  </div>

  <div class="note">
    Employees must watch the training video before starting the knowledge check.
  </div>

  <div class="section video-section">
    <h2>Training Video</h2>

    <label>Training Video Link</label>
    <input type="text" id="videoLink" placeholder="Paste YouTube or Google Drive video link here">

    <button class="btn save-btn" onclick="saveVideo()">Save Video Link</button>
    <button class="btn play-btn" onclick="loadVideo()">▶ Play Video</button>

    <div id="videoFrame"></div>
  </div>

  <button class="btn add-btn" onclick="newEmployee()">➕ New Employee</button>

  <div class="section quiz-box hidden" id="quizBox">
    <h2>Knowledge Check</h2>

    <label>Employee Name</label>
    <input type="text" id="employeeName" placeholder="Enter employee name">

    <label>Company ID</label>
    <input type="text" id="employeeId" placeholder="Enter company ID">

    <div class="question">
      <h3>1. What are Human Factors?</h3>

      <label class="option">
        <input type="radio" name="q1" value="a">
        A. Conditions that influence human performance
      </label>

      <label class="option">
        <input type="radio" name="q1" value="b">
        B. Aircraft components
      </label>

      <label class="option">
        <input type="radio" name="q1" value="c">
        C. Weather reports
      </label>
    </div>

    <div class="question">
      <h3>2. Which of the following is a Human Factor?</h3>

      <label class="option">
        <input type="radio" name="q2" value="a">
        A. Fatigue
      </label>

      <label class="option">
        <input type="radio" name="q2" value="b">
        B. Paint color
      </label>

      <label class="option">
        <input type="radio" name="q2" value="c">
        C. Aircraft registration number
      </label>
    </div>

    <button class="btn submit-btn" onclick="submitQuiz()">Submit Training</button>
  </div>

  <div class="section result-box hidden" id="resultBox"></div>

  <div class="section records-box">
    <h2>Training Completion Records</h2>
    <div id="recordsList"></div>
  </div>

</div>

<script>

let videoPlayed = false;
const DELETE_PASSWORD = "Tom";

const savedVideo = localStorage.getItem("humanFactorsVideo");

if(savedVideo){
  document.getElementById("videoLink").value = savedVideo;
}

function convertToEmbed(url){

  if(url.includes("youtube.com/watch?v=")){
    return url.replace("watch?v=","embed/");
  }

  if(url.includes("youtu.be/")){
    const videoId = url.split("youtu.be/")[1].split("?")[0];
    return "https://www.youtube.com/embed/" + videoId;
  }

  if(url.includes("drive.google.com")){
    return url.replace("/view","/preview");
  }

  return url;
}

function saveVideo(){

  const link = document.getElementById("videoLink").value.trim();

  if(link === ""){
    alert("Please paste a video link first.");
    return;
  }

  localStorage.setItem("humanFactorsVideo", link);
  alert("Video link saved successfully.");
}

function loadVideo(){

  const link = document.getElementById("videoLink").value.trim();

  if(link === ""){
    alert("Please paste or save a video link first.");
    return;
  }

  const embedLink = convertToEmbed(link);

  document.getElementById("videoFrame").innerHTML =
  `<iframe
    src="${embedLink}"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>`;

  videoPlayed = true;
}

function newEmployee(){

  if(!videoPlayed){
    alert("Please play the training video before starting the quiz.");
    return;
  }

  document.getElementById("quizBox").classList.remove("hidden");
  document.getElementById("resultBox").classList.add("hidden");

  document.getElementById("employeeName").value = "";
  document.getElementById("employeeId").value = "";

  document.querySelectorAll("input[name='q1']").forEach(r => r.checked = false);
  document.querySelectorAll("input[name='q2']").forEach(r => r.checked = false);

  document.getElementById("quizBox").scrollIntoView({behavior:"smooth"});
}

function submitQuiz(){

  const name = document.getElementById("employeeName").value.trim();
  const id = document.getElementById("employeeId").value.trim();

  const q1 = document.querySelector("input[name='q1']:checked");
  const q2 = document.querySelector("input[name='q2']:checked");

  const resultBox = document.getElementById("resultBox");

  if(name === "" || id === ""){
    alert("Please enter employee name and company ID.");
    return;
  }

  if(!q1 || !q2){
    alert("Please answer both questions.");
    return;
  }

  if(q1.value === "a" && q2.value === "a"){

    const record = {
      employeeName:name,
      employeeId:id,
      course:"Human Factors",
      result:"Passed",
      date:new Date().toLocaleString()
    };

    let records =
    JSON.parse(localStorage.getItem("humanFactorsTrainingRecords")) || [];

    records.push(record);

    localStorage.setItem(
      "humanFactorsTrainingRecords",
      JSON.stringify(records)
    );

    resultBox.className = "section result-box success";
    resultBox.innerHTML =
    `✅ Training Completed Successfully<br><br>
    Employee: ${name}<br>
    Company ID: ${id}<br>
    Course: Human Factors<br>
    Date: ${record.date}`;

    document.getElementById("quizBox").classList.add("hidden");
    displayRecords();

  }else{

    videoPlayed = false;

    resultBox.className = "section result-box error";
    resultBox.innerHTML =
    `❌ Incorrect answers.<br><br>
    The employee must play the training video again before trying the quiz again.`;

    document.getElementById("quizBox").classList.add("hidden");
  }

  resultBox.classList.remove("hidden");
}

function displayRecords(){

  const records =
  JSON.parse(localStorage.getItem("humanFactorsTrainingRecords")) || [];

  const recordsList = document.getElementById("recordsList");

  recordsList.innerHTML = "";

  if(records.length === 0){
    recordsList.innerHTML = "<p>No completed training records yet.</p>";
    return;
  }

  records.forEach(function(record, index){

    const div = document.createElement("div");

    div.className = "record-card";

    div.innerHTML =
    `<div class="record-info">
      <strong>${index + 1}. ${record.employeeName}</strong><br>
      Company ID: ${record.employeeId}<br>
      Course: ${record.course}<br>
      Result: ${record.result}<br>
      Date: ${record.date}
    </div>

    <button class="delete-btn" onclick="deleteRecord(${index})">
      🗑 Delete
    </button>`;

    recordsList.appendChild(div);

  });
}

function deleteRecord(index){

  const password = prompt("Enter password to delete this record:");

  if(password === null){
    return;
  }

  if(password !== DELETE_PASSWORD){
    alert("Incorrect password. Record was not deleted.");
    return;
  }

  if(!confirm("Are you sure you want to delete this employee training record?")){
    return;
  }

  let records =
  JSON.parse(localStorage.getItem("humanFactorsTrainingRecords")) || [];

  records.splice(index, 1);

  localStorage.setItem(
    "humanFactorsTrainingRecords",
    JSON.stringify(records)
  );

  displayRecords();

  alert("Record deleted successfully.");
}

displayRecords();

</script>

</body>
</html>
