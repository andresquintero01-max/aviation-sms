<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What Is SMS?</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  min-height:100vh;
  background:
  radial-gradient(circle at top left, rgba(255,152,0,0.28), transparent 30%),
  radial-gradient(circle at bottom right, rgba(28,99,219,0.42), transparent 38%),
  linear-gradient(rgba(5,20,55,0.88), rgba(5,20,55,0.95)),
  url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  padding:35px;
}

.container{
  max-width:1150px;
  margin:auto;
  background:rgba(255,255,255,0.97);
  border-radius:38px;
  padding:48px;
  box-shadow:0 30px 80px rgba(0,0,0,0.45);
}

.logo{
  width:105px;
  height:105px;
  margin:0 auto 20px;
  border-radius:32px;
  background:linear-gradient(135deg,#071f47,#1450b8,#ff9800);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:48px;
  box-shadow:0 18px 40px rgba(0,0,0,0.30);
}

h1{
  text-align:center;
  color:#071f47;
  font-size:56px;
  margin-bottom:10px;
  font-weight:900;
}

.subtitle{
  text-align:center;
  color:#56657d;
  font-size:20px;
  margin-bottom:35px;
}

.top-buttons{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:30px;
}

.box{
  background:linear-gradient(135deg,#ffffff,#f8fbff);
  border-radius:26px;
  padding:28px;
  margin-bottom:25px;
  border-left:10px solid #1450b8;
  box-shadow:0 14px 34px rgba(0,0,0,0.13);
}

label{
  display:block;
  margin-top:15px;
  margin-bottom:7px;
  font-weight:900;
  color:#071f47;
}

input{
  width:100%;
  padding:15px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  font-size:16px;
}

button,.btn{
  padding:15px 24px;
  border:none;
  border-radius:15px;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  color:white;
  box-shadow:0 10px 22px rgba(0,0,0,0.25);
  transition:0.3s;
}

button:hover,.btn:hover{
  transform:translateY(-4px);
}

.save-btn{background:linear-gradient(135deg,#071f47,#1450b8);}
.play-btn{background:linear-gradient(135deg,#1450b8,#00a2ff);}
.add-btn{background:linear-gradient(135deg,#d83b00,#ff9800);margin-bottom:25px;}
.submit-btn{background:linear-gradient(135deg,#047857,#22c55e);margin-top:20px;}

.back-btn{
  background:linear-gradient(135deg,#ff6b00,#ff9800);
  padding:16px 32px;
  border-radius:999px;
}

.home-btn{background:linear-gradient(135deg,#071f47,#1450b8);}
.print-btn{background:linear-gradient(135deg,#111827,#374151);}
.delete-btn{background:linear-gradient(135deg,#dc2626,#ef4444);}

iframe{
  width:100%;
  height:430px;
  border:none;
  border-radius:22px;
  margin-top:22px;
  box-shadow:0 14px 35px rgba(0,0,0,0.25);
}

.question{
  background:white;
  padding:22px;
  border-radius:18px;
  margin-top:22px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.question h3{
  color:#071f47;
  margin-bottom:14px;
}

.option{
  display:block;
  margin:11px 0;
  color:#333;
  font-size:16px;
}

.hidden{display:none;}

.result-box{
  padding:25px;
  border-radius:22px;
  margin-bottom:25px;
  font-size:20px;
  font-weight:900;
}

.success{background:#dcfce7;color:#166534;}
.error{background:#fee2e2;color:#991b1b;}

.record-card{
  background:white;
  padding:20px;
  border-radius:18px;
  margin-top:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.10);
  color:#071f47;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
}

.record-info{
  line-height:1.8;
  font-size:16px;
}

.admin-note{
  background:#fff7ed;
  color:#9a3412;
  padding:16px;
  border-radius:16px;
  margin-top:18px;
  font-weight:800;
}

.print-title{
  display:none;
}

@media print{
  body{
    background:white!important;
    padding:10px!important;
  }

  .container{
    box-shadow:none!important;
    padding:20px!important;
  }

  .video-box,
  .quiz-box,
  .top-buttons,
  .add-btn,
  .result-box,
  .delete-btn,
  .admin-note{
    display:none!important;
  }

  .records-box{
    display:block!important;
    box-shadow:none!important;
    border-left:none!important;
    background:white!important;
  }

  .print-title{
    display:block!important;
    text-align:center;
    color:#071f47;
    font-size:28px;
    margin-bottom:25px;
    font-weight:900;
  }

  h1,.subtitle,.logo{
    display:none!important;
  }

  .record-card{
    box-shadow:none!important;
    border:1px solid #ddd;
    break-inside:avoid;
  }
}

@media(max-width:800px){
  body{padding:20px;}
  .container{padding:28px;}
  h1{font-size:38px;}
  iframe{height:260px;}
  .record-card{flex-direction:column;align-items:flex-start;}
  button,.btn{width:100%;}
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">🎓</div>

  <h1>Safety Promotion Training</h1>

  <div class="subtitle">
    What Is SMS? - Training Video and Knowledge Check
  </div>

  <div class="top-buttons">
    <button class="back-btn" onclick="location.href='Safety-Promotion-Training.html'">
      ⬅ Back to Training
    </button>

    <button class="home-btn" onclick="location.href='index.html'">
      🏠 Home
    </button>

    <button class="print-btn admin-only" onclick="window.print()">
      🖨 Print Records
    </button>
  </div>

  <div class="box video-box">

    <div class="admin-only">
      <label>Training Video Link</label>
      <input type="text" id="videoLink" placeholder="Paste YouTube or Google Drive video link here">

      <button class="save-btn" onclick="saveVideo()">
        💾 Save Video Link
      </button>

      <div class="admin-note">
        Admin view: you can add or update the training video link. Technicians cannot see or edit this link.
      </div>
    </div>

    <button class="play-btn" onclick="loadVideo()">
      ▶ Play Training Video
    </button>

    <div id="videoFrame"></div>

  </div>

  <button class="add-btn" onclick="newEmployee()">
    ➕ Start Exam
  </button>

  <div class="box quiz-box hidden" id="quizBox">

    <label>Employee Name</label>
    <input type="text" id="employeeName" placeholder="Enter employee name">

    <label>Company ID</label>
    <input type="text" id="employeeId" placeholder="Enter company ID">

    <div class="question">
      <h3>1. What is SMS?</h3>

      <label class="option">
        <input type="radio" name="q1" value="a">
        A. A system
      </label>

      <label class="option">
        <input type="radio" name="q1" value="b">
        B. A Safety Management System
      </label>

      <label class="option">
        <input type="radio" name="q1" value="c">
        C. A text message
      </label>
    </div>

    <div class="question">
      <h3>2. What is Risk?</h3>

      <label class="option">
        <input type="radio" name="q2" value="a">
        A. A hazard
      </label>

      <label class="option">
        <input type="radio" name="q2" value="b">
        B. Damage
      </label>

      <label class="option">
        <input type="radio" name="q2" value="c">
        C. The probability and severity of an event
      </label>
    </div>

    <button class="submit-btn" onclick="submitQuiz()">
      ✅ Submit Training
    </button>

  </div>

  <div class="result-box hidden" id="resultBox"></div>

  <div class="box records-box admin-only">
    <div class="print-title">Training Completion Records - What Is SMS?</div>
    <h2>Training Completion Records</h2>
    <div id="recordsList"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  push,
  onValue,
  remove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let videoPlayed = false;
let videoURL = "";

let userRole = (localStorage.getItem("userRole") || "tech").toLowerCase();

const isAdmin =
userRole === "admin" ||
userRole === "manager" ||
userRole === "sms manager";

const videoRef = ref(db, "trainingVideos/whatIsSMS/videoLink");
const recordsRef = ref(db, "trainingRecords/whatIsSMS");

function applyRoleAccess(){
  if(!isAdmin){
    document.querySelectorAll(".admin-only").forEach(element => {
      element.style.display = "none";
    });
  }
}

function convertToEmbed(url){

  if(url.includes("youtube.com/watch?v=")){
    return url.replace("watch?v=","embed/");
  }

  if(url.includes("youtu.be/")){
    const videoId = url.split("youtu.be/")[1].split("?")[0];
    return "https://www.youtube.com/embed/" + videoId;
  }

  if(url.includes("drive.google.com")){
    return url.replace("/view","/preview");
  }

  return url;
}

onValue(videoRef, (snapshot) => {
  videoURL = snapshot.val() || "";

  if(isAdmin && document.getElementById("videoLink")){
    document.getElementById("videoLink").value = videoURL;
  }
});

window.saveVideo = function(){

  if(!isAdmin){
    alert("You are not authorized to edit the training video.");
    return;
  }

  const link = document.getElementById("videoLink").value.trim();

  if(link === ""){
    alert("Please paste a video link first.");
    return;
  }

  set(videoRef, link).then(() => {
    alert("Video link saved successfully.");
  });
};

window.loadVideo = function(){

  if(videoURL === ""){
    alert("No training video is available. Please contact the administrator.");
    return;
  }

  const embedLink = convertToEmbed(videoURL);

  document.getElementById("videoFrame").innerHTML =
  `<iframe
  src="${embedLink}"
  allow="autoplay; encrypted-media"
  allowfullscreen>
  </iframe>`;

  videoPlayed = true;
};

window.newEmployee = function(){

  if(!videoPlayed){
    alert("Please play the training video before starting the exam.");
    return;
  }

  document.getElementById("quizBox").classList.remove("hidden");
  document.getElementById("resultBox").classList.add("hidden");

  document.getElementById("employeeName").value = "";
  document.getElementById("employeeId").value = "";

  document.querySelectorAll("input[name='q1']").forEach(r => r.checked = false);
  document.querySelectorAll("input[name='q2']").forEach(r => r.checked = false);

  document.getElementById("quizBox").scrollIntoView({behavior:"smooth"});
};

window.submitQuiz = function(){

  const name = document.getElementById("employeeName").value.trim();
  const id = document.getElementById("employeeId").value.trim();

  const q1 = document.querySelector("input[name='q1']:checked");
  const q2 = document.querySelector("input[name='q2']:checked");

  const resultBox = document.getElementById("resultBox");

  if(name === "" || id === ""){
    alert("Please enter employee name and company ID.");
    return;
  }

  if(!q1 || !q2){
    alert("Please answer both questions.");
    return;
  }

  if(q1.value === "b" && q2.value === "c"){

    const record = {
      employeeName:name,
      employeeId:id,
      course:"What Is SMS?",
      result:"Passed",
      date:new Date().toLocaleString(),
      timestamp:new Date().toISOString()
    };

    push(recordsRef, record).then(() => {

      resultBox.className = "result-box success";
      resultBox.innerHTML =
      `✅ Training Completed Successfully<br><br>
      Employee: ${name}<br>
      Company ID: ${id}<br>
      Course: What Is SMS?<br>
      Result: Passed<br>
      Date: ${record.date}`;

      document.getElementById("quizBox").classList.add("hidden");
      resultBox.classList.remove("hidden");

    });

  }else{

    videoPlayed = false;

    resultBox.className = "result-box error";
    resultBox.innerHTML =
    `❌ Incorrect answers.<br><br>
    The employee must play the training video again before trying the exam again.`;

    document.getElementById("quizBox").classList.add("hidden");
    resultBox.classList.remove("hidden");
  }
};

function displayRecords(){

  const recordsList = document.getElementById("recordsList");

  if(!recordsList){
    return;
  }

  onValue(recordsRef, (snapshot) => {

    recordsList.innerHTML = "";

    if(!snapshot.exists()){
      recordsList.innerHTML = "<p>No completed training records yet.</p>";
      return;
    }

    const records = [];

    snapshot.forEach(child => {
      records.push({
        key: child.key,
        data: child.val()
      });
    });

    records.reverse().forEach((record, index) => {

      const div = document.createElement("div");
      div.className = "record-card";

      div.innerHTML =
      `<div class="record-info">
        <strong>${index + 1}. Employee: ${record.data.employeeName || "N/A"}</strong><br>
        <strong>Company ID:</strong> ${record.data.employeeId || "N/A"}<br>
        <strong>Course:</strong> ${record.data.course || "N/A"}<br>
        <strong>Result:</strong> ${record.data.result || "N/A"}<br>
        <strong>Date:</strong> ${record.data.date || "N/A"}
      </div>

      ${isAdmin ? `
      <button class="delete-btn" onclick="deleteRecord('${record.key}')">
        🗑 Delete
      </button>` : ""}`;

      recordsList.appendChild(div);
    });
  });
}

window.deleteRecord = function(recordKey){

  if(!isAdmin){
    alert("You are not authorized to delete records.");
    return;
  }

  if(!confirm("Are you sure you want to delete this employee training record?")){
    return;
  }

  remove(ref(db, "trainingRecords/whatIsSMS/" + recordKey)).then(() => {
    alert("Record deleted successfully.");
  });
};

applyRoleAccess();
displayRecords();

</script>

</body>
</html>
