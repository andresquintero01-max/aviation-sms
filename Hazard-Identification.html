<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hazard Identification</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  text-align:center;
}

/* TITULO PRINCIPAL */
h1{
  font-size:60px;
  color:#071f47;
  margin-bottom:30px;
}

/* SUBTITULOS */
.subtitle{
  font-size:22px;
  color:#333;
  margin:15px 0;
}

/* BOTONES */
button{
  background:#071f47;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  margin-top:8px;
}

button:hover{
  background:#0b2a66;
}

/* BOTON ROJO REGRESAR */
.back{
  margin-top:20px;
  background:red;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}
</style>

</head>

<body>

<div class="container">

  <!-- TITULO PRINCIPAL -->
  <h1>Hazard Identification</h1>

  <!-- SUBTITULO 1 -->
  <div class="subtitle">Reporte de SMS</div>
  <button onclick="openReport()">Abrir Reporte</button>

  <!-- SUBTITULO 2 -->
  <div class="subtitle">Base de datos de SMS</div>
  <button onclick="openDatabase()">Abrir Base de Datos</button>

  <!-- BOTON REGRESAR -->
  <br><br>
  <button class="back" onclick="goHome()">Regresar</button>

</div>

<script>
function openReport(){
  alert("Aquí conectaremos el Reporte SMS en el siguiente paso 👍");
}

function openDatabase(){
  alert("Aquí conectaremos la Base de Datos SMS en el siguiente paso 👍");
}

function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
