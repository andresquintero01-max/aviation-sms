<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MEDA Full Report</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:white;
  color:#111;
  padding:25px;
}

.header{
  background:#004080;
  color:white;
  padding:22px;
  border-radius:12px;
  margin-bottom:20px;
  text-align:center;
}

.header h1{
  font-size:32px;
  letter-spacing:2px;
}

.header p{
  margin-top:8px;
  font-size:15px;
}

.section{
  margin-bottom:22px;
  border:1px solid #ccc;
  border-radius:10px;
  overflow:hidden;
}

.section-title{
  background:#004080;
  color:white;
  padding:10px;
  font-size:18px;
  font-weight:bold;
}

.section-body{
  padding:15px;
}

.info-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.info-box{
  border-bottom:1px solid #ddd;
  padding:8px 0;
}

.label{
  font-weight:bold;
  color:#004080;
}

.value{
  margin-top:4px;
  color:#222;
}

.text-box{
  background:#f4f6f8;
  border-left:6px solid #004080;
  padding:14px;
  border-radius:8px;
  line-height:1.5;
  margin-top:8px;
}

.status{
  text-align:center;
  padding:15px;
  border-radius:10px;
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
}

.open{background:#ffd966;color:#222;}
.progress{background:#1450b8;color:white;}
.pending{background:#ff9800;color:white;}
.closed{background:#2f9144;color:white;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
}

th{
  background:#004080;
  color:white;
  padding:10px;
}

td{
  border:1px solid #ddd;
  padding:9px;
  text-align:center;
  vertical-align:top;
}

tr:nth-child(even){
  background:#f4f6f8;
}

.yes{color:#2f9144;font-weight:bold;}
.no{color:#777;font-weight:bold;}
.unknown{color:#ff9800;font-weight:bold;}

.bottom-buttons{
  text-align:center;
  margin:25px;
}

.btn{
  border:none;
  color:white;
  padding:14px 28px;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin:6px;
}

.print-btn{background:#2f9144;}
.back-btn{background:#c40000;}
.database-btn{background:#004080;}
.home-btn{background:#0b2a66;}

@media print{
  .bottom-buttons{display:none;}
  body{padding:10px;}
}

@media(max-width:800px){
  .info-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
  <h1>MAINTENANCE ERROR DECISION AID - MEDA</h1>
  <p>Full maintenance event investigation report loaded from Firebase</p>
</div>

<div id="reportArea">
  Loading MEDA Report...
</div>

<div class="bottom-buttons">
  <button class="btn print-btn" onclick="window.print()">Print / Save PDF</button>

  <button class="btn back-btn" onclick="goBackDetails()">
    Back to MEDA Details
  </button>

  <button class="btn database-btn" onclick="window.location.href='MEDA-Database.html'">
    Back to MEDA Database
  </button>

  <button class="btn home-btn" onclick="window.location.href='index.html'">
    Home
  </button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const reportId = params.get("id");
const reportArea = document.getElementById("reportArea");

window.goBackDetails = function(){
  window.location.href = "MEDA-Details.html?id=" + reportId;
};

function statusClass(status){
  if(!status) return "open";
  if(status === "Open") return "open";
  if(status === "In Progress") return "progress";
  if(status === "Pending Effectiveness Review") return "pending";
  if(status === "Closed") return "closed";
  return "open";
}

function presentClass(value){
  if(value === "Yes") return "yes";
  if(value === "No") return "no";
  if(value === "Unknown") return "unknown";
  return "";
}

if(!reportId){

  reportArea.innerHTML = "<h2>No MEDA Report ID was found in the URL.</h2>";

}else{

  const reportRef = ref(database, "medaReports/" + reportId);

  get(reportRef).then(snapshot => {

    if(snapshot.exists()){

      const data = snapshot.val();

      let factorsHTML = "";

      if(data.contributingFactors && data.contributingFactors.length > 0){

        data.contributingFactors.forEach(factor => {

          factorsHTML += `
            <tr>
              <td>${factor.name || ""}</td>
              <td class="${presentClass(factor.present)}">${factor.present || ""}</td>
              <td>${factor.evidence || ""}</td>
              <td>${factor.recommendedAction || ""}</td>
            </tr>
          `;

        });

      }else{

        factorsHTML = `
          <tr>
            <td colspan="4">No MEDA contributing factors found.</td>
          </tr>
        `;

      }

      let actionsHTML = "";

      if(data.correctiveActions && data.correctiveActions.length > 0){

        data.correctiveActions.forEach(action => {

          if(action.action || action.responsible || action.dueDate){

            actionsHTML += `
              <tr>
                <td>${action.action || ""}</td>
                <td>${action.responsible || ""}</td>
                <td>${action.dueDate || ""}</td>
              </tr>
            `;

          }

        });

      }

      if(actionsHTML === ""){
        actionsHTML = `
          <tr>
            <td colspan="3">No corrective / preventive actions found.</td>
          </tr>
        `;
      }

      reportArea.innerHTML = `

        <div class="status ${statusClass(data.status)}">
          Investigation Status: ${data.status || "Open"}
        </div>

        <div class="section">
          <div class="section-title">1. Event Information</div>
          <div class="section-body">
            <div class="info-grid">

              <div class="info-box">
                <div class="label">MEDA Report ID</div>
                <div class="value">${reportId}</div>
              </div>

              <div class="info-box">
                <div class="label">Created At</div>
                <div class="value">${data.createdAt || ""}</div>
              </div>

              <div class="info-box">
                <div class="label">Report Title</div>
                <div class="value">${data.title || ""}</div>
              </div>

              <div class="info-box">
                <div class="label">Aircraft Registration</div>
                <div class="value">${data.aircraft || ""}</div>
              </div>

              <div class="info-box">
                <div class="label">Customer</div>
                <div class="value">${data.customer || ""}</div>
              </div>

              <div class="info-box">
                <div class="label">Location</div>
                <div class="value">${data.location || ""}</div>
              </div>

              <div class="info-box">
                <div class="label">Date</div>
                <div class="value">${data.date || ""}</div>
              </div>

              <div class="info-box">
                <div class="label">Work Order / Task Card / NRC</div>
                <div class="value">${data.workOrder || ""}</div>
              </div>

            </div>

            <br>

            <div class="label">Event Description</div>
            <div class="text-box">
              ${data.eventDescription || "No event description entered."}
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">2. Maintenance Error / Event Type</div>
          <div class="section-body">
            <div class="info-grid">

              <div class="info-box">
                <div class="label">Event Type</div>
                <div class="value">${data.eventType || ""}</div>
              </div>

              <div class="info-box">
                <div class="label">Detection Method</div>
                <div class="value">${data.detectionMethod || ""}</div>
              </div>

              <div class="info-box">
                <div class="label">Immediate Action Taken</div>
                <div class="value">${data.immediateAction || ""}</div>
              </div>

            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">3. MEDA Contributing Factors</div>
          <div class="section-body">

            <table>
              <thead>
                <tr>
                  <th>Factor</th>
                  <th>Present?</th>
                  <th>Evidence / Description</th>
                  <th>Recommended Action</th>
                </tr>
              </thead>

              <tbody>
                ${factorsHTML}
              </tbody>
            </table>

          </div>
        </div>

        <div class="section">
          <div class="section-title">4. Root Cause / System Weakness</div>
          <div class="section-body">

            <div class="info-grid">

              <div class="info-box">
                <div class="label">Main Contributing Factor</div>
                <div class="value">${data.mainFactor || ""}</div>
              </div>

            </div>

            <br>

            <div class="label">Root Cause Statement</div>
            <div class="text-box">
              ${data.rootCause || "No root cause statement entered."}
            </div>

            <br>

            <div class="label">System Weakness Identified</div>
            <div class="text-box">
              ${data.systemWeakness || "No system weakness entered."}
            </div>

          </div>
        </div>

        <div class="section">
          <div class="section-title">5. Corrective / Preventive Actions</div>
          <div class="section-body">

            <table>
              <thead>
                <tr>
                  <th>Action</th>
                  <th>Responsible Person</th>
                  <th>Due Date</th>
                </tr>
              </thead>

              <tbody>
                ${actionsHTML}
              </tbody>
            </table>

          </div>
        </div>

        <div class="section">
          <div class="section-title">6. Effectiveness Review</div>
          <div class="section-body">

            <div class="info-grid">

              <div class="info-box">
                <div class="label">Review Method</div>
                <div class="value">${data.reviewMethod || ""}</div>
              </div>

              <div class="info-box">
                <div class="label">Effectiveness Status</div>
                <div class="value">${data.effectivenessStatus || ""}</div>
              </div>

              <div class="info-box">
                <div class="label">Review Date</div>
                <div class="value">${data.reviewDate || ""}</div>
              </div>

            </div>

            <br>

            <div class="label">Effectiveness Notes</div>
            <div class="text-box">
              ${data.effectivenessNotes || "No effectiveness notes entered."}
            </div>

          </div>
        </div>

      `;

    }else{

      reportArea.innerHTML = "<h2>MEDA Report not found in Firebase.</h2>";

    }

  }).catch(error => {

    reportArea.innerHTML = "<h2>Error loading MEDA Report: " + error.message + "</h2>";

  });

}

</script>

</body>
</html>
