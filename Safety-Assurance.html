<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safety Assurance</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
}

.main-container{
  width:100%;
  max-width:650px;
  background:white;
  border-radius:28px;
  padding:45px;
  box-shadow:0 18px 45px rgba(0,0,0,0.3);
  text-align:center;
}

h1{
  font-size:42px;
  color:#071f47;
  margin-bottom:15px;
}

.subtitle{
  font-size:18px;
  color:#555;
  margin-bottom:40px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.btn{
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#071f47,#0b2a66);
  color:white;
  text-decoration:none;
  padding:22px;
  border-radius:18px;
  font-size:22px;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 10px 22px rgba(0,0,0,0.2);
}

.btn:hover{
  transform:translateY(-5px) scale(1.02);
  background:linear-gradient(135deg,#0b2a66,#1c63db);
  box-shadow:0 15px 28px rgba(0,0,0,0.3);
}

.btn span{
  font-size:15px;
  font-weight:normal;
  display:block;
  margin-top:5px;
  opacity:0.9;
}

.back-btn{
  margin-top:35px;
  background:red;
  color:white;
  border:none;
  padding:14px 28px;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

.back-btn:hover{
  background:darkred;
}

.footer{
  margin-top:30px;
  color:#777;
  font-size:14px;
}

</style>

</head>

<body>

<div class="main-container">

  <h1>Safety Assurance</h1>

  <div class="subtitle">
    Audits, inspections and safety performance monitoring
  </div>

  <div class="menu">

    <!-- SAFETY PERFORMANCE MONITORING -->
    <a class="btn" href="safety-performance-monitoring.html">
      <div>
        Safety Performance Monitoring
        <span>Monitor KPIs, inspections and safety trends</span>
      </div>
    </a>

  </div>

  <!-- BACK BUTTON -->
  <button class="back-btn"
  onclick="window.location.href='index.html'">
    Back
  </button>

  <div class="footer">
    Aviation Safety Management Platform
  </div>

</div>

</body>
</html>
