<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safety Promotion Training</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    background:
    linear-gradient(rgba(5,20,55,0.82), rgba(5,20,55,0.88)),
    url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    padding:35px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:rgba(255,255,255,0.96);
    backdrop-filter:blur(8px);
    border-radius:35px;
    padding:55px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.logo{
    width:100px;
    height:100px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#5b35d5,#8b5cf6);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:44px;
    box-shadow:0 12px 25px rgba(0,0,0,0.25);
    margin-bottom:25px;
}

h1{
    text-align:center;
    color:#071f47;
    font-size:60px;
    margin-bottom:10px;
    font-weight:800;
}

.subtitle{
    text-align:center;
    color:#56657d;
    font-size:20px;
    margin-bottom:45px;
}

.training-btn{
    width:100%;
    padding:32px;
    margin-bottom:22px;
    border:none;
    border-radius:24px;
    font-size:30px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    transition:0.3s;
    box-shadow:0 12px 28px rgba(0,0,0,0.18);
}

.training-btn:hover{
    transform:translateY(-5px);
}

.sms{
    background:linear-gradient(135deg,#1450b8,#1d6eff);
}

.hf{
    background:linear-gradient(135deg,#5b35d5,#8b5cf6);
}

.culture{
    background:linear-gradient(135deg,#168f58,#22b573);
}

.bottom-buttons{
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.home-btn,
.back-btn{
    border:none;
    padding:14px 28px;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    transition:0.3s;
    box-shadow:0 8px 18px rgba(0,0,0,0.20);
}

.home-btn{
    background:linear-gradient(135deg,#071f47,#1450b8);
}

.back-btn{
    background:linear-gradient(135deg,#d40000,#ff2b2b);
}

.home-btn:hover,
.back-btn:hover{
    transform:translateY(-3px);
}

.footer{
    margin-top:35px;
    text-align:center;
    color:#51617b;
    font-size:14px;
    letter-spacing:3px;
    font-weight:bold;
}

@media(max-width:800px){

    .container{
        padding:35px 22px;
    }

    h1{
        font-size:42px;
    }

    .subtitle{
        font-size:18px;
    }

    .training-btn{
        font-size:24px;
        padding:24px;
    }

    .bottom-buttons{
        flex-direction:column;
        align-items:center;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="logo">🎓</div>

    <h1>Safety Promotion Training</h1>

    <div class="subtitle">
        Aviation Safety Training and Awareness Modules
    </div>

    <!-- WHAT IS SMS -->

   <button class="training-btn sms"
onclick="location.href='Safety-Promotion-Training-What-is-SMS.html'">
    📘 What Is SMS?
    </button>

    <!-- HUMAN FACTORS -->

    <button class="training-btn hf"
    onclick="location.href='Human-Factors.html'">
        🧠 Human Factors
    </button>

    <!-- SAFETY CULTURE -->

    <button class="training-btn culture"
    onclick="location.href='Safety-Culture.html'">
        👥 Safety Culture
    </button>

    <!-- SMALL NAVIGATION BUTTONS -->

    <div class="bottom-buttons">

        <button class="home-btn"
        onclick="location.href='index.html'">
            🏠 Home
        </button>

        <button class="back-btn"
        onclick="location.href='Safety-Promotion.html'">
            🔙 Back
        </button>

    </div>

    <div class="footer">
        AVIATION SAFETY MANAGEMENT PLATFORM
    </div>

</div>

</body>
</html>
