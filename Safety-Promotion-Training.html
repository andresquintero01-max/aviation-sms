<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safety Promotion Training</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    background:
    linear-gradient(rgba(5,20,55,0.82), rgba(5,20,55,0.88)),
    url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    padding:35px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:rgba(255,255,255,0.96);
    border-radius:35px;
    padding:55px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.logo{
    width:100px;
    height:100px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#5b35d5,#8b5cf6);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:44px;
    margin-bottom:25px;
}

h1{
    text-align:center;
    color:#071f47;
    font-size:60px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#56657d;
    font-size:20px;
    margin-bottom:40px;
}

.training-btn{
    width:100%;
    padding:28px;
    margin-bottom:20px;
    border:none;
    border-radius:22px;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    transition:0.3s;
}

.training-btn:hover{
    transform:translateY(-4px);
}

.sms{
    background:linear-gradient(135deg,#1450b8,#1d6eff);
}

.hf{
    background:linear-gradient(135deg,#8b5cf6,#b794ff);
}

.culture{
    background:linear-gradient(135deg,#22b573,#4ade80);
}

.home{
    background:linear-gradient(135deg,#071f47,#1450b8);
}

.back{
    background:linear-gradient(135deg,#d40000,#ff2b2b);
}

.footer{
    margin-top:35px;
    text-align:center;
    color:#51617b;
    font-size:14px;
    letter-spacing:3px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">🎓</div>

    <h1>Safety Promotion Training</h1>

    <div class="subtitle">
        Aviation Safety Training and Awareness Modules
    </div>

    <button class="training-btn sms"
    onclick="location.href='What-Is-SMS.html'">
    📘 What Is SMS?
    </button>

    <button class="training-btn hf"
    onclick="location.href='Human-Factors.html'">
    🧠 Human Factors
    </button>

    <button class="training-btn culture"
    onclick="location.href='Safety-Culture.html'">
    👥 Safety Culture
    </button>

    <button class="training-btn home"
    onclick="location.href='index.html'">
    🏠 Home
    </button>

    <button class="training-btn back"
    onclick="location.href='Safety-Promotion.html'">
    🔙 Back to Safety Promotion
    </button>

    <div class="footer">
        AVIATION SAFETY MANAGEMENT PLATFORM
    </div>

</div>

</html>
