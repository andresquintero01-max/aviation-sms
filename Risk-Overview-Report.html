<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Risk Overview Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#020617,#071f47,#1450b8);
  padding:30px;
  color:#111;
}

.container{
  max-width:1450px;
  margin:auto;
  background:white;
  border-radius:28px;
  padding:32px;
  box-shadow:0 25px 70px rgba(0,0,0,.35);
}

.header{
  background:linear-gradient(135deg,#071f47,#1450b8);
  color:white;
  padding:38px;
  border-radius:26px;
  text-align:center;
  margin-bottom:28px;
}

.header h1{font-size:44px;margin-bottom:10px;}
.header p{font-size:17px;color:#dbeafe;}

.section{
  margin-top:26px;
  border:1px solid #d8e1ef;
  border-radius:22px;
  overflow:hidden;
  background:white;
  box-shadow:0 10px 25px rgba(15,23,42,.08);
}

.section-title{
  background:linear-gradient(135deg,#071f47,#1450b8);
  color:white;
  padding:16px 22px;
  font-size:22px;
  font-weight:800;
}

.section-body{padding:24px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
}

.field label{
  display:block;
  color:#071f47;
  font-weight:800;
  margin-bottom:7px;
}

input,select,textarea{
  width:100%;
  padding:12px;
  border:1px solid #b8c7da;
  border-radius:12px;
  font-size:15px;
  background:white;
}

textarea{
  min-height:90px;
  resize:vertical;
}

.hazard-card{
  margin-top:24px;
  border:2px solid #d8e1ef;
  border-radius:24px;
  overflow:hidden;
  background:#f8fbff;
}

.hazard-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  padding:18px 22px;
  background:linear-gradient(135deg,#0b2a66,#1450b8);
  color:white;
}

.hazard-head h2{font-size:24px;}

.hazard-body{padding:24px;}

.sub-title{
  margin:24px 0 14px;
  color:#071f47;
  font-size:19px;
  font-weight:900;
  border-left:6px solid #ff9800;
  padding-left:12px;
}

.risk-box{
  margin-top:16px;
  padding:18px;
  border-radius:18px;
  text-align:center;
  font-weight:900;
  font-size:22px;
  border:2px solid #d8e1ef;
}

.low{background:#d8f3dc;color:#14532d;border-color:#2f9144;}
.medium{background:#fff3cd;color:#664d03;border-color:#ffd966;}
.high{background:#ffe0b2;color:#9a3412;border-color:#ff9800;}
.extreme{background:#f8d7da;color:#842029;border-color:#ff1a0a;}

.cpa-list{display:grid;gap:15px;}

.cpa-row{
  display:grid;
  grid-template-columns:80px 2fr 1fr 1fr 1fr 70px;
  gap:12px;
  align-items:start;
  background:white;
  border:1px solid #d8e1ef;
  border-radius:18px;
  padding:15px;
}

.cpa-number{
  background:#071f47;
  color:white;
  font-weight:900;
  border-radius:14px;
  padding:14px;
  text-align:center;
}

.btn-area{
  text-align:center;
  margin-top:30px;
}

.btn{
  border:none;
  padding:14px 24px;
  border-radius:14px;
  color:white;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  margin:6px;
  box-shadow:0 8px 18px rgba(0,0,0,.18);
}

.btn:hover{opacity:.92;}

.save-btn{background:linear-gradient(135deg,#004080,#1450b8);}
.add-btn{background:linear-gradient(135deg,#0f766e,#22c55e);}
.reset-btn{background:linear-gradient(135deg,#4b5563,#111827);}
.back-btn{background:linear-gradient(135deg,#b91c1c,#ef4444);}
.home-btn{background:linear-gradient(135deg,#071f47,#0b2a66);}
.delete-btn{background:linear-gradient(135deg,#991b1b,#dc2626);padding:10px 14px;}
.small-btn{background:linear-gradient(135deg,#ff9800,#f97316);padding:11px 18px;}

.saved-box{
  margin-top:25px;
  background:#e8f5e9;
  color:#14532d;
  border:1px solid #2f9144;
  padding:16px;
  border-radius:14px;
  display:none;
  font-weight:bold;
  text-align:center;
}

@media(max-width:1000px){
  .cpa-row{grid-template-columns:1fr;}
  .hazard-head{flex-direction:column;align-items:flex-start;}
  .header h1{font-size:32px;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>Risk Overview Report</h1>
  <p>Professional risk panorama with multiple hazards, barriers, corrective actions and monitoring.</p>
</div>

<div class="section">
  <div class="section-title">1. General Information</div>
  <div class="section-body">
    <div class="grid">
      <div class="field">
        <label>Risk Overview Title *</label>
        <input id="title" placeholder="Example: Airport Ramp Risk Overview">
      </div>
      <div class="field">
        <label>Airport / Station</label>
        <input id="airport" placeholder="Example: KOPF / MIA">
      </div>
      <div class="field">
        <label>Area / Department</label>
        <input id="area" placeholder="Example: Ramp / Maintenance / GSE">
      </div>
      <div class="field">
        <label>Process</label>
        <input id="process" placeholder="Example: Aircraft Towing">
      </div>
      <div class="field">
        <label>Evaluator</label>
        <input id="evaluator" placeholder="Evaluator name">
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="date">
      </div>
      <div class="field">
        <label>Review Date</label>
        <input type="date" id="reviewDate">
      </div>
      <div class="field">
        <label>Report Status</label>
        <select id="status">
          <option>Open</option>
          <option>In Progress</option>
          <option>Pending Action</option>
          <option>Closed</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title">2. Hazard Identification Items</div>
  <div class="section-body">
    <div id="hazardsContainer"></div>

    <div class="btn-area">
      <button class="btn add-btn" onclick="window.addHazard()">+ Add Hazard Identification</button>
    </div>
  </div>
</div>

<div class="btn-area">
  <button class="btn save-btn" onclick="window.saveRiskOverview()">Save Risk Overview Report</button>
  <button class="btn reset-btn" onclick="window.resetForm()">Reset Form</button>
  <button class="btn back-btn" onclick="window.location.href='Risk-Overview.html'">Back</button>
  <button class="btn home-btn" onclick="window.location.href='index.html'">🏠 Home</button>
</div>

<div id="savedBox" class="saved-box">
  Risk Overview Report saved successfully.
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

window.database = database;
window.dbRef = ref;
window.dbPush = push;
window.dbSet = set;
</script>

<script>
let hazardCount = 0;

function getRiskLevel(value){
  if(value <= 5) return "LOW RISK";
  if(value <= 11) return "MEDIUM RISK";
  if(value <= 19) return "HIGH RISK";
  return "EXTREME RISK";
}

function setRiskBox(box, level){
  box.className = "risk-box";

  if(level === "LOW RISK") box.classList.add("low");
  else if(level === "MEDIUM RISK") box.classList.add("medium");
  else if(level === "HIGH RISK") box.classList.add("high");
  else box.classList.add("extreme");

  box.innerText = level;
}

window.calculateRisk = function(card,type){
  const probability = Number(card.querySelector("." + type + "Probability").value);
  const severity = Number(card.querySelector("." + type + "Severity").value);
  const value = probability * severity;
  const level = getRiskLevel(value);

  card.querySelector("." + type + "RiskValue").value = value;
  card.querySelector("." + type + "RiskLevel").value = level;

  setRiskBox(card.querySelector("." + type + "RiskBox"),level);

  return {probability,severity,value,level};
};

window.addHazard = function(){
  hazardCount++;

  const container = document.getElementById("hazardsContainer");
  const card = document.createElement("div");
  card.className = "hazard-card";

  card.innerHTML = `
    <div class="hazard-head">
      <h2>Hazard Identification ${hazardCount}</h2>
      <button class="btn delete-btn" onclick="window.removeHazard(this)">Delete</button>
    </div>

    <div class="hazard-body">

      <div class="grid">
        <div class="field">
          <label>Hazard Title *</label>
          <input class="hazardTitle" placeholder="Example: Aircraft / Vehicle Collision">
        </div>

        <div class="field">
          <label>Hazard Category</label>
          <select class="hazardCategory">
            <option>Operational</option>
            <option>Ground Handling</option>
            <option>Maintenance</option>
            <option>Human Factors</option>
            <option>Infrastructure</option>
            <option>Environmental</option>
            <option>Security</option>
            <option>Wildlife</option>
            <option>Emergency Response</option>
            <option>IT / Cybersecurity</option>
            <option>Financial</option>
            <option>Reputational</option>
            <option>Other</option>
          </select>
        </div>

        <div class="field">
          <label>Risk Owner</label>
          <input class="riskOwner" placeholder="Responsible person or department">
        </div>
      </div>

      <div class="sub-title">Hazard Description</div>
      <div class="field">
        <textarea class="hazardDescription" placeholder="Describe the hazard, unsafe condition, threat or exposure."></textarea>
      </div>

      <div class="sub-title">Causes / Contributing Factors</div>
      <div class="field">
        <textarea class="causes" placeholder="Describe causes, contributing factors, human factors or process gaps."></textarea>
      </div>

      <div class="sub-title">Potential Consequences</div>
      <div class="field">
        <textarea class="consequences" placeholder="Describe possible consequences if the risk is not controlled."></textarea>
      </div>

      <div class="sub-title">Initial Risk Assessment</div>
      <div class="grid">
        <div class="field">
          <label>Probability</label>
          <select class="initialProbability" onchange="window.calculateRisk(this.closest('.hazard-card'),'initial')">
            <option value="1">1 - Rare</option>
            <option value="2">2 - Unlikely</option>
            <option value="3">3 - Possible</option>
            <option value="4">4 - Likely</option>
            <option value="5">5 - Almost Certain</option>
          </select>
        </div>

        <div class="field">
          <label>Severity</label>
          <select class="initialSeverity" onchange="window.calculateRisk(this.closest('.hazard-card'),'initial')">
            <option value="1">1 - Insignificant</option>
            <option value="2">2 - Minor</option>
            <option value="3">3 - Moderate</option>
            <option value="4">4 - Major</option>
            <option value="5">5 - Catastrophic</option>
          </select>
        </div>

        <div class="field">
          <label>Initial Risk Value</label>
          <input class="initialRiskValue" disabled>
        </div>

        <div class="field">
          <label>Initial Risk Level</label>
          <input class="initialRiskLevel" disabled>
        </div>
      </div>

      <div class="initialRiskBox risk-box low">LOW RISK</div>

      <div class="sub-title">Existing Barriers / Controls</div>
      <div class="field">
        <textarea class="existingControls" placeholder="Procedures, training, inspections, supervision, physical barriers, PPE, checklist, etc."></textarea>
      </div>

      <div class="sub-title">Corrective / Preventive Actions</div>
      <div class="cpa-list"></div>

      <button class="btn small-btn" onclick="window.addCPA(this)">+ Add CPA</button>

      <div class="sub-title">Residual Risk Assessment</div>
      <div class="grid">
        <div class="field">
          <label>Residual Probability</label>
          <select class="residualProbability" onchange="window.calculateRisk(this.closest('.hazard-card'),'residual')">
            <option value="1">1 - Rare</option>
            <option value="2">2 - Unlikely</option>
            <option value="3">3 - Possible</option>
            <option value="4">4 - Likely</option>
            <option value="5">5 - Almost Certain</option>
          </select>
        </div>

        <div class="field">
          <label>Residual Severity</label>
          <select class="residualSeverity" onchange="window.calculateRisk(this.closest('.hazard-card'),'residual')">
            <option value="1">1 - Insignificant</option>
            <option value="2">2 - Minor</option>
            <option value="3">3 - Moderate</option>
            <option value="4">4 - Major</option>
            <option value="5">5 - Catastrophic</option>
          </select>
        </div>

        <div class="field">
          <label>Residual Risk Value</label>
          <input class="residualRiskValue" disabled>
        </div>

        <div class="field">
          <label>Residual Risk Level</label>
          <input class="residualRiskLevel" disabled>
        </div>

        <div class="field">
          <label>Risk Acceptable?</label>
          <select class="acceptable">
            <option>Yes</option>
            <option>No</option>
            <option>Pending Review</option>
          </select>
        </div>
      </div>

      <div class="residualRiskBox risk-box low">LOW RISK</div>

      <div class="sub-title">Review and Monitoring</div>
      <div class="grid">
        <div class="field">
          <label>KPI / SPI Associated</label>
          <input class="kpiSpi" placeholder="Aircraft Damage, FOD, GSE Accident, Injury, etc.">
        </div>

        <div class="field">
          <label>Monitoring Method</label>
          <input class="monitoringMethod" placeholder="Audit, inspection, SPI, observation, trend review">
        </div>

        <div class="field">
          <label>Review Frequency</label>
          <select class="reviewFrequency">
            <option>Weekly</option>
            <option>Monthly</option>
            <option>Quarterly</option>
            <option>Semiannual</option>
            <option>Annual</option>
            <option>As Needed</option>
          </select>
        </div>
      </div>

      <br>

      <div class="field">
        <label>Additional Notes</label>
        <textarea class="notes"></textarea>
      </div>

    </div>
  `;

  container.appendChild(card);

  window.addCPA(card.querySelector(".small-btn"));
  window.calculateRisk(card,"initial");
  window.calculateRisk(card,"residual");
};

window.removeHazard = function(btn){
  if(confirm("Do you want to delete this hazard item?")){
    btn.closest(".hazard-card").remove();
  }
};

window.addCPA = function(btn){
  const card = btn.closest(".hazard-card");
  const list = card.querySelector(".cpa-list");
  const number = list.children.length + 1;

  const row = document.createElement("div");
  row.className = "cpa-row";

  row.innerHTML = `
    <div class="cpa-number">CPA ${number}</div>

    <div class="field">
      <label>Action</label>
      <textarea class="cpaAction" placeholder="Describe corrective or preventive action."></textarea>
    </div>

    <div class="field">
      <label>Responsible</label>
      <input class="cpaResponsible">
    </div>

    <div class="field">
      <label>Due Date</label>
      <input type="date" class="cpaDueDate">
    </div>

    <div class="field">
      <label>Status</label>
      <select class="cpaStatus">
        <option>Open</option>
        <option>In Progress</option>
        <option>Completed</option>
        <option>Verified</option>
      </select>
    </div>

    <button class="btn delete-btn" onclick="this.closest('.cpa-row').remove()">X</button>
  `;

  list.appendChild(row);
};

function collectCPAs(card){
  const rows = card.querySelectorAll(".cpa-row");
  const actions = [];

  rows.forEach(row => {
    actions.push({
      action:row.querySelector(".cpaAction").value.trim(),
      responsible:row.querySelector(".cpaResponsible").value.trim(),
      dueDate:row.querySelector(".cpaDueDate").value,
      status:row.querySelector(".cpaStatus").value
    });
  });

  return actions;
}

function collectHazards(){
  const cards = document.querySelectorAll(".hazard-card");
  const hazards = [];

  cards.forEach((card,index) => {
    const initialRisk = window.calculateRisk(card,"initial");
    const residualRisk = window.calculateRisk(card,"residual");

    hazards.push({
      itemNumber:index + 1,
      hazardTitle:card.querySelector(".hazardTitle").value.trim(),
      hazardCategory:card.querySelector(".hazardCategory").value,
      riskOwner:card.querySelector(".riskOwner").value.trim(),
      hazardDescription:card.querySelector(".hazardDescription").value.trim(),
      causes:card.querySelector(".causes").value.trim(),
      consequences:card.querySelector(".consequences").value.trim(),
      initialRisk:initialRisk,
      existingControls:card.querySelector(".existingControls").value.trim(),
      correctiveActions:collectCPAs(card),
      residualRisk:residualRisk,
      acceptable:card.querySelector(".acceptable").value,
      kpiSpi:card.querySelector(".kpiSpi").value.trim(),
      monitoringMethod:card.querySelector(".monitoringMethod").value.trim(),
      reviewFrequency:card.querySelector(".reviewFrequency").value,
      notes:card.querySelector(".notes").value.trim()
    });
  });

  return hazards;
}

window.saveRiskOverview = function(){
  const title = document.getElementById("title").value.trim();

  if(title === ""){
    alert("Risk Overview Title is required.");
    return;
  }

  const hazards = collectHazards();

  if(hazards.length === 0){
    alert("Please add at least one hazard identification.");
    return;
  }

  for(let i = 0; i < hazards.length; i++){
    if(hazards[i].hazardTitle === ""){
      alert("Hazard Title is required in Hazard Identification " + (i + 1));
      return;
    }
  }

  const data = {
    title:title,
    airport:document.getElementById("airport").value.trim(),
    area:document.getElementById("area").value.trim(),
    process:document.getElementById("process").value.trim(),
    evaluator:document.getElementById("evaluator").value.trim(),
    date:document.getElementById("date").value,
    reviewDate:document.getElementById("reviewDate").value,
    status:document.getElementById("status").value,
    hazards:hazards,
    totalHazards:hazards.length,
    createdAt:new Date().toLocaleString(),
    createdAtISO:new Date().toISOString()
  };

  const newRef = window.dbPush(window.dbRef(window.database,"riskOverviewReports"));

  window.dbSet(newRef,data)
  .then(() => {
    document.getElementById("savedBox").style.display = "block";
    alert("Risk Overview Report saved successfully.");
  })
  .catch(error => {
    alert("Error saving Risk Overview Report: " + error.message);
  });
};

window.resetForm = function(){
  if(confirm("Do you want to clear the Risk Overview form?")){
    document.querySelectorAll("input, textarea").forEach(el => {
      if(!el.disabled) el.value = "";
    });

    document.querySelectorAll("select").forEach(el => el.selectedIndex = 0);

    document.getElementById("hazardsContainer").innerHTML = "";
    document.getElementById("savedBox").style.display = "none";

    hazardCount = 0;
    document.getElementById("date").valueAsDate = new Date();
    window.addHazard();
  }
};

document.getElementById("date").valueAsDate = new Date();
window.addHazard();
</script>

</body>
</html>
