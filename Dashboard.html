<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMS Executive Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let charts = {};
let smsReports = [];
let fratReports = [];

function setText(id,value){
  document.getElementById(id).innerText = value;
}

function destroyChart(id){
  if(charts[id]) charts[id].destroy();
}

function createBar(id, labels, values, title){

  destroyChart(id);

  charts[id] = new Chart(document.getElementById(id), {
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:title,
        data:values,
        backgroundColor:"#0b2a66",
        borderRadius:10
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        title:{display:true,text:title}
      },
      scales:{
        y:{
          beginAtZero:true,
          ticks:{precision:0}
        }
      }
    }
  });

}

function createPie(id, labels, values, title){

  destroyChart(id);

  charts[id] = new Chart(document.getElementById(id), {
    type:"doughnut",
    data:{
      labels:labels,
      datasets:[{
        data:values,
        backgroundColor:[
          "#2ecc71",
          "#f1c40f",
          "#e74c3c",
          "#95a5a6"
        ]
      }]
    },
    options:{
      responsive:true,
      plugins:{
        title:{display:true,text:title}
      }
    }
  });

}

function isReportClosed(r){

  const status = (
    r.residualRiskStatus ||
    r.residualStatus ||
    r.residualRiskClosed ||
    r.status ||
    r.reportStatus ||
    ""
  ).toString().toLowerCase();

  return status.includes("closed") || status === "true" || status === "yes";

}

function getDate(r){
  return r.date || r.reportDate || r.eventDate || r.createdAt || "";
}

function renderDashboard(){

  let total = smsReports.length;
  let open = 0;
  let closed = 0;

  let acceptable = 0;
  let tolerable = 0;
  let notAcceptable = 0;
  let notAssessed = 0;

  let residualAcceptable = 0;
  let residualTolerable = 0;
  let residualNotAcceptable = 0;
  let residualNotAssessed = 0;

  let months = {};
  let categories = {};

  let fratHigh = 0;
  let fratNoGo = 0;

  smsReports.forEach(r => {

    if(isReportClosed(r)) closed++;
    else open++;

    const riskText = (
      r.riskLevel ||
      r.riskAssessment ||
      r.initialRiskLevel ||
      r.riskCategory ||
      ""
    ).toString().toLowerCase();

    const riskValue = Number(
      r.riskValue ||
      r.riskScore ||
      r.risk ||
      r.initialRiskValue ||
      r.initialRiskScore ||
      r.initialRisk ||
      0
    );

    if(riskText.includes("not") || riskValue >= 15){
      notAcceptable++;
    }
    else if(riskText.includes("tolerable") || (riskValue >= 5 && riskValue <= 14)){
      tolerable++;
    }
    else if(riskText.includes("acceptable") || (riskValue >= 1 && riskValue <= 4)){
      acceptable++;
    }
    else{
      notAssessed++;
    }

    const residualText = (
      r.residualRiskLevel ||
      r.residualRisk ||
      r.residualRiskAssessment ||
      r.residualRiskCategory ||
      ""
    ).toString().toLowerCase();

    const residualValue = Number(
      r.residualRiskValue ||
      r.residualRiskScore ||
      r.residualRisk ||
      r.finalRiskValue ||
      r.finalRiskScore ||
      0
    );

    if(residualText.includes("not") || residualValue >= 15){
      residualNotAcceptable++;
    }
    else if(residualText.includes("tolerable") || (residualValue >= 5 && residualValue <= 14)){
      residualTolerable++;
    }
    else if(residualText.includes("acceptable") || (residualValue >= 1 && residualValue <= 4)){
      residualAcceptable++;
    }
    else{
      residualNotAssessed++;
    }

    const dateValue = getDate(r);

    if(dateValue){
      const month = dateValue.toString().substring(0,7);
      months[month] = (months[month] || 0) + 1;
    }

    const category = r.category || r.eventType || r.reportType || "Other";
    categories[category] = (categories[category] || 0) + 1;

  });

  fratReports.forEach(f => {

    const value = Number(
      f.score ||
      f.total ||
      f.fratScore ||
      f.fratValue ||
      0
    );

    if(value >= 16) fratNoGo++;
    else if(value >= 10) fratHigh++;

  });

  const safetyScore =
    total === 0
    ? 100
    : Math.max(0, Math.round(100 - ((notAcceptable * 10) + (open * 2))));

  setText("totalReports", total);
  setText("openReports", open);
  setText("closedReports", closed);
  setText("notAcceptable", notAcceptable);
  setText("safetyScore", safetyScore + "%");

  setText("fratTotal", fratReports.length);
  setText("fratHigh", fratHigh);
  setText("fratNoGo", fratNoGo);

  createBar(
    "statusChart",
    ["Open","Closed"],
    [open,closed],
    "Open vs Closed Reports"
  );

  createPie(
    "riskChart",
    ["Acceptable","Tolerable","Not Acceptable","Not Assessed"],
    [acceptable,tolerable,notAcceptable,notAssessed],
    "Risk Distribution"
  );

  createPie(
    "residualRiskChart",
    ["Acceptable","Tolerable","Not Acceptable","Not Assessed"],
    [residualAcceptable,residualTolerable,residualNotAcceptable,residualNotAssessed],
    "Residual Risk Distribution"
  );

  createBar(
    "monthChart",
    Object.keys(months),
    Object.values(months),
    "Reports by Month"
  );

  createBar(
    "categoryChart",
    Object.keys(categories),
    Object.values(categories),
    "Reports by Category"
  );

  createBar(
    "fratChart",
    ["Total FRAT","High Risk","No Go"],
    [fratReports.length,fratHigh,fratNoGo],
    "FRAT Monitoring"
  );

}

function loadSMSReports(){

  const reportsRef = ref(db, "smsReports");

  onValue(reportsRef, snapshot => {
    const data = snapshot.val() || {};
    smsReports = Object.values(data);
    renderDashboard();
  });

}

function loadFRATReports(){

  const paths = [
    "fratReports",
    "FRATReports",
    "frat",
    "FRAT",
    "fratData"
  ];

  let all = [];

  paths.forEach(path => {

    const fratRef = ref(db, path);

    onValue(fratRef, snapshot => {

      const data = snapshot.val();

      if(data){

        Object.values(data).forEach(v => {
          if(v && typeof v === "object"){
            all.push(v);
          }
        });

      }

      fratReports = all;
      renderDashboard();

    });

  });

}

window.goBack = function(){
  location.href = "index.html";
}

window.onload = function(){
  loadSMSReports();
  loadFRATReports();
}

</script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
  padding:30px;
}

.container{
  max-width:1400px;
  margin:auto;
  background:white;
  border-radius:30px;
  padding:35px;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

h1{
  text-align:center;
  color:#071f47;
  font-size:56px;
  margin-bottom:8px;
}

.subtitle{
  text-align:center;
  color:#555;
  font-size:18px;
  margin-bottom:30px;
}

.section-title{
  color:#071f47;
  font-size:28px;
  margin:35px 0 18px;
  border-left:8px solid #071f47;
  padding-left:12px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:linear-gradient(135deg,#071f47,#0b2a66);
  color:white;
  border-radius:22px;
  padding:28px;
  text-align:center;
  box-shadow:0 10px 22px rgba(0,0,0,0.25);
}

.card.red{
  background:linear-gradient(135deg,#c0392b,#e74c3c);
}

.card.green{
  background:linear-gradient(135deg,#138d75,#2ecc71);
}

.card.yellow{
  background:linear-gradient(135deg,#b7950b,#f1c40f);
  color:#071f47;
}

.card h2{
  font-size:42px;
  margin-bottom:8px;
}

.card p{
  font-size:16px;
}

.charts{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(430px,1fr));
  gap:28px;
  margin-top:25px;
}

.chart-box{
  background:#f4f6f8;
  border-radius:22px;
  padding:25px;
  box-shadow:0 8px 18px rgba(0,0,0,0.12);
}

canvas{
  width:100% !important;
  max-height:360px;
}

.back-btn{
  margin-top:35px;
  width:100%;
  padding:18px;
  border:none;
  border-radius:16px;
  background:#c0392b;
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.back-btn:hover{
  background:#922b21;
}

@media(max-width:700px){

  h1{
    font-size:38px;
  }

  .charts{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="container">

  <h1>SMS Executive Dashboard</h1>

  <div class="subtitle">
    Safety Management System Performance Overview
  </div>

  <div class="section-title">
    Executive Summary
  </div>

  <div class="cards">

    <div class="card">
      <h2 id="totalReports">0</h2>
      <p>Total SMS Reports</p>
    </div>

    <div class="card yellow">
      <h2 id="openReports">0</h2>
      <p>Open Reports</p>
    </div>

    <div class="card green">
      <h2 id="closedReports">0</h2>
      <p>Closed Reports</p>
    </div>

    <div class="card red">
      <h2 id="notAcceptable">0</h2>
      <p>Not Acceptable Risk</p>
    </div>

    <div class="card">
      <h2 id="safetyScore">100%</h2>
      <p>Executive Safety Score</p>
    </div>

  </div>

  <div class="section-title">
    FRAT Monitoring
  </div>

  <div class="cards">

    <div class="card">
      <h2 id="fratTotal">0</h2>
      <p>Total FRAT</p>
    </div>

    <div class="card yellow">
      <h2 id="fratHigh">0</h2>
      <p>High Risk FRAT</p>
    </div>

    <div class="card red">
      <h2 id="fratNoGo">0</h2>
      <p>No Go FRAT</p>
    </div>

  </div>

  <div class="section-title">
    Charts
  </div>

  <div class="charts">

    <div class="chart-box">
      <canvas id="statusChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="riskChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="residualRiskChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="monthChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="categoryChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="fratChart"></canvas>
    </div>

  </div>

  <button class="back-btn" onclick="goBack()">
    Back to Home
  </button>

</div>

</body>
</html>
