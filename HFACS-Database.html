<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HFACS Database</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI', Arial, sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,152,0,0.30), transparent 30%),
    radial-gradient(circle at bottom right, rgba(28,99,219,0.45), transparent 38%),
    linear-gradient(rgba(5,20,55,0.86), rgba(5,20,55,0.94)),
    url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  padding:35px;
}

.container{
  max-width:1350px;
  margin:auto;
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(14px);
  padding:50px;
  border-radius:40px;
  box-shadow:0 30px 80px rgba(0,0,0,0.45);
  position:relative;
  overflow:hidden;
}

.content{position:relative;z-index:2;}

.logo{
  width:112px;
  height:112px;
  margin:0 auto 20px;
  border-radius:32px;
  background:linear-gradient(135deg,#071f47,#1450b8,#ff9800);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  box-shadow:0 18px 40px rgba(0,0,0,0.30);
}

.badge{
  display:block;
  width:max-content;
  margin:0 auto 16px auto;
  background:#eaf2ff;
  color:#071f47;
  padding:10px 24px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
  letter-spacing:1.8px;
}

h1{
  text-align:center;
  color:#071f47;
  font-size:58px;
  margin-bottom:10px;
  font-weight:900;
}

.description{
  text-align:center;
  color:#56657d;
  font-size:19px;
  margin-bottom:28px;
  font-weight:500;
}

.title-line{
  width:230px;
  height:6px;
  margin:0 auto 32px;
  border-radius:10px;
  background:linear-gradient(90deg,transparent,#1450b8,#ff9800,transparent);
}

.top-actions,
.bottom-buttons{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:14px;
  margin-bottom:25px;
  background:#f8fbff;
  padding:20px;
  border-radius:26px;
  border:1px solid #e5e7eb;
  box-shadow:0 14px 32px rgba(0,0,0,0.10);
}

.btn{
  border:none;
  color:white;
  padding:15px 26px;
  border-radius:16px;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  transition:0.25s;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  box-shadow:0 10px 22px rgba(0,0,0,0.22);
}

.btn:hover{transform:translateY(-3px);}

.filter-btn{background:linear-gradient(135deg,#7c3aed,#a855f7);}
.excel-btn{background:linear-gradient(135deg,#047857,#22c55e);}
.hfacs-btn{background:linear-gradient(135deg,#d83b00,#ff9800);}
.home-btn{background:linear-gradient(135deg,#071f47,#1450b8);}

.filter-panel{
  background:#f8fbff;
  border:1px solid #dbe3ef;
  padding:22px;
  border-radius:22px;
  margin-bottom:28px;
  display:grid;
  grid-template-columns:1.2fr 0.8fr 1fr;
  gap:14px;
}

.filter-panel input,
.filter-panel select{
  width:100%;
  padding:15px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  font-size:15px;
  background:white;
  outline:none;
}

.counter{
  text-align:center;
  color:#071f47;
  font-weight:900;
  margin-bottom:20px;
  font-size:17px;
}

.report-card{
  background:linear-gradient(135deg,#ffffff,#f8fbff);
  border-radius:28px;
  padding:26px;
  margin-bottom:24px;
  box-shadow:0 18px 45px rgba(0,0,0,0.14);
  border-left:10px solid #1450b8;
  transition:0.25s;
  position:relative;
  overflow:hidden;
}

.report-card:hover{
  transform:translateY(-5px);
  box-shadow:0 26px 60px rgba(0,0,0,0.20);
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.event-title{
  font-size:26px;
  font-weight:900;
  color:#071f47;
  margin-bottom:6px;
}

.meta{
  color:#56657d;
  font-size:15px;
  line-height:1.7;
}

.status{
  display:inline-block;
  padding:8px 18px;
  border-radius:999px;
  color:white;
  font-size:13px;
  font-weight:900;
  box-shadow:0 8px 18px rgba(0,0,0,0.18);
}

.status.open{background:linear-gradient(135deg,#047857,#22c55e);}
.status.closed{background:linear-gradient(135deg,#475569,#64748b);}

.details-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin-top:18px;
}

.detail-box{
  background:#f4f7fb;
  padding:15px;
  border-radius:18px;
  border:1px solid #dce3ef;
}

.detail-label{
  font-size:12px;
  color:#64748b;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:6px;
}

.detail-value{
  font-size:15px;
  color:#071f47;
  font-weight:800;
  word-break:break-word;
}

.hfacs-id-input{
  width:100%;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  font-size:15px;
  font-weight:800;
  color:#071f47;
}

.small-note{
  font-size:12px;
  color:#64748b;
  margin-top:6px;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:22px;
  align-items:center;
}

.open-btn{background:linear-gradient(135deg,#071f47,#1450b8);}
.save-btn{background:linear-gradient(135deg,#047857,#22c55e);}
.status-btn{background:linear-gradient(135deg,#6b21a8,#9333ea);}

.delete-btn{
  background:linear-gradient(135deg,#dc2626,#ef4444);
  width:50px;
  height:50px;
  border-radius:50%;
  padding:0;
  font-size:20px;
}

.separator-buttons{
  margin:30px 0;
  padding:18px;
  background:rgba(255,255,255,0.18);
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.30);
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  backdrop-filter:blur(8px);
}

.no-data{
  text-align:center;
  color:#56657d;
  font-size:20px;
  margin-top:35px;
  background:#f8fbff;
  padding:42px;
  border-radius:24px;
  border:1px solid #e5e7eb;
  font-weight:700;
}

.footer{
  margin-top:35px;
  text-align:center;
  color:#51617b;
  font-size:14px;
  letter-spacing:3px;
  font-weight:900;
}

@media(max-width:900px){
  body{padding:20px;}
  .container{padding:30px 22px;}
  h1{font-size:42px;}
  .filter-panel{grid-template-columns:1fr;}
  .btn{width:100%;}
}
</style>
</head>

<body>

<div class="container">
<div class="content">

  <div class="logo">🧠</div>

  <div class="badge">HUMAN FACTORS ANALYSIS</div>

  <h1>HFACS Database</h1>

  <div class="description">
    Stored Human Factors Analysis and Classification System Reports
  </div>

  <div class="title-line"></div>

  <div class="top-actions">
    <button class="btn filter-btn" onclick="toggleFilters()">🔎 Filters</button>
    <button class="btn excel-btn" onclick="downloadExcel()">📥 Download Excel</button>
    <button class="btn hfacs-btn" onclick="window.location.href='HFACS.html'">🧠 HFACS</button>
    <button class="btn home-btn" onclick="window.location.href='index.html'">🏠 Home</button>
  </div>

  <div id="filterPanel" class="filter-panel">
    <input id="searchInput" placeholder="Search ID, title, investigator, aircraft..." oninput="applyFilter()">

    <input type="date" id="dateFilter" onchange="applyFilter()">

    <select id="statusFilter" onchange="applyFilter()">
      <option value="">All Status</option>
      <option value="Open">Open</option>
      <option value="Closed">Closed</option>
    </select>
  </div>

  <div id="counter" class="counter"></div>

  <div id="hfacsList"></div>

  <div id="noData" class="no-data" style="display:none;">
    No HFACS reports found.
  </div>

  <div class="bottom-buttons">
    <button class="btn hfacs-btn" onclick="window.location.href='HFACS.html'">🧠 HFACS</button>
    <button class="btn home-btn" onclick="window.location.href='index.html'">🏠 Home</button>
  </div>

  <div class="footer">
    AVIATION SAFETY MANAGEMENT PLATFORM
  </div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  remove,
  update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const hfacsList = document.getElementById("hfacsList");
const noData = document.getElementById("noData");
const counter = document.getElementById("counter");

let allReports = [];
let filteredReports = [];

function clean(value){
  return String(value || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function statusClass(status){
  return String(status || "Open").toLowerCase().replaceAll(" ","-");
}

function normalizeDate(value){
  if(!value) return "";
  const d = new Date(value);
  if(isNaN(d)) return "";
  return d.toISOString().split("T")[0];
}

function renderReports(reports){

  hfacsList.innerHTML = "";

  if(reports.length === 0){
    noData.style.display = "block";
    counter.innerHTML = "0 reports found";
    return;
  }

  noData.style.display = "none";
  counter.innerHTML = reports.length + " report(s) found";

  reports.forEach((report, index) => {

    const firebaseId = report.firebaseId;

    const hfacsVisibleId =
      report.hfacsId ||
      report.customId ||
      firebaseId;

    const title =
      report.reportTitle ||
      "HFACS Report";

    const aircraft =
      report.aircraft ||
      "N/A";

    const location =
      report.location ||
      "N/A";

    const investigator =
      report.investigator ||
      "N/A";

    const date =
      report.createdAt ||
      "N/A";

    const status =
      report.status || "Open";

    const summary = report.summary || {};

    const card = document.createElement("div");
    card.className = "report-card";

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="event-title">
            ${clean(hfacsVisibleId)} | ${clean(title)}
          </div>

          <div class="meta">
            <strong>Date:</strong> ${clean(date)}<br>
            <strong>Aircraft / Equipment:</strong> ${clean(aircraft)}<br>
            <strong>Location:</strong> ${clean(location)} | 
            <strong>Investigator:</strong> ${clean(investigator)}
          </div>
        </div>

        <span class="status ${statusClass(status)}">
          ${clean(status)}
        </span>
      </div>

      <div class="details-grid">

        <div class="detail-box">
          <div class="detail-label">Editable HFACS ID</div>
          <input 
            class="hfacs-id-input" 
            id="hfacsId_${clean(firebaseId)}" 
            value="${clean(hfacsVisibleId)}"
          >
          <div class="small-note">You can write your own HFACS ID here.</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Unsafe Acts</div>
          <div class="detail-value">${clean(summary.unsafe || 0)}</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Preconditions</div>
          <div class="detail-value">${clean(summary.preconditions || 0)}</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Unsafe Supervision</div>
          <div class="detail-value">${clean(summary.supervision || 0)}</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Organizational Influences</div>
          <div class="detail-value">${clean(summary.organization || 0)}</div>
        </div>

      </div>

      <div class="actions">

        <button class="btn open-btn" onclick="openReport('${clean(firebaseId)}')">
          Open Report
        </button>

        <button class="btn save-btn" onclick="saveHFACSId('${clean(firebaseId)}')">
          Save HFACS ID
        </button>

        <button class="btn status-btn" onclick="toggleStatus('${clean(firebaseId)}', '${clean(status)}')">
          ${status === "Open" ? "Close Report" : "Open Report"}
        </button>

        <button class="btn delete-btn" onclick="deleteReport('${clean(firebaseId)}')">
          🗑
        </button>

      </div>
    `;

    hfacsList.appendChild(card);

    if((index + 1) % 3 === 0){
      const separator = document.createElement("div");
      separator.className = "separator-buttons";

      separator.innerHTML = `
        <button class="btn hfacs-btn" onclick="window.location.href='HFACS.html'">
          🧠 HFACS
        </button>

        <button class="btn home-btn" onclick="window.location.href='index.html'">
          🏠 Home
        </button>
      `;

      hfacsList.appendChild(separator);
    }

  });
}

window.applyFilter = function(){

  const searchText = document.getElementById("searchInput").value.toLowerCase().trim();
  const dateFilter = document.getElementById("dateFilter").value;
  const statusFilter = document.getElementById("statusFilter").value;

  filteredReports = allReports.filter(report => {

    const searchArea = `
      ${report.firebaseId || ""}
      ${report.hfacsId || ""}
      ${report.reportTitle || ""}
      ${report.aircraft || ""}
      ${report.location || ""}
      ${report.investigator || ""}
      ${report.eventDescription || ""}
      ${report.correctiveActions || ""}
      ${report.createdAt || ""}
      ${report.updatedAt || ""}
      ${report.status || ""}
    `.toLowerCase();

    const matchesSearch =
      searchText === "" || searchArea.includes(searchText);

    const reportDate =
      normalizeDate(report.createdAt || "");

    const matchesDate =
      dateFilter === "" || reportDate === dateFilter;

    const matchesStatus =
      statusFilter === "" || (report.status || "Open") === statusFilter;

    return matchesSearch && matchesDate && matchesStatus;

  });

  filteredReports.sort((a,b) => {
    return String(b.firebaseId).localeCompare(String(a.firebaseId));
  });

  renderReports(filteredReports);
};

window.toggleFilters = function(){
  const panel = document.getElementById("filterPanel");
  panel.style.display = panel.style.display === "none" ? "grid" : "none";
};

const reportsRef = ref(database, "hfacsReports");

onValue(reportsRef, (snapshot) => {

  allReports = [];

  if(!snapshot.exists()){
    renderReports([]);
    return;
  }

  snapshot.forEach((childSnapshot) => {
    allReports.push({
      firebaseId: childSnapshot.key,
      ...childSnapshot.val()
    });
  });

  allReports.sort((a,b) => {
    return String(b.firebaseId).localeCompare(String(a.firebaseId));
  });

  applyFilter();

});

window.openReport = function(reportId){
  window.location.href = "HFACS-Details.html?id=" + reportId;
};

window.saveHFACSId = function(reportId){

  const input = document.getElementById("hfacsId_" + reportId);
  const newHFACSId = input.value.trim();

  if(newHFACSId === ""){
    alert("HFACS ID cannot be empty.");
    return;
  }

  update(ref(database, "hfacsReports/" + reportId), {
    hfacsId: newHFACSId,
    updatedAt: new Date().toLocaleString()
  })
  .then(() => {
    alert("HFACS ID updated successfully.");
  })
  .catch((error) => {
    alert("Error updating HFACS ID: " + error.message);
  });

};

window.toggleStatus = function(reportId, currentStatus){

  const newStatus = currentStatus === "Open" ? "Closed" : "Open";

  update(ref(database, "hfacsReports/" + reportId), {
    status: newStatus,
    updatedAt: new Date().toLocaleString()
  })
  .then(() => {
    alert("Report status changed to " + newStatus + ".");
  })
  .catch((error) => {
    alert("Error updating status: " + error.message);
  });

};

window.deleteReport = function(reportId){

  const confirmDelete = confirm(
    "Are you sure you want to permanently delete this HFACS report?"
  );

  if(!confirmDelete) return;

  remove(ref(database, "hfacsReports/" + reportId))
  .then(() => {
    alert("HFACS Report deleted successfully.");
  })
  .catch((error) => {
    alert("Error deleting report: " + error.message);
  });

};

window.downloadExcel = function(){

  let csv = "HFACS ID,Report Title,Aircraft/Equipment,Location,Investigator,Unsafe Acts,Preconditions,Unsafe Supervision,Organizational Influences,Status,Created At,Updated At\n";

  filteredReports.forEach(report => {

    const summary = report.summary || {};

    const row = [
      report.hfacsId || report.firebaseId || "",
      report.reportTitle || "",
      report.aircraft || "",
      report.location || "",
      report.investigator || "",
      summary.unsafe || 0,
      summary.preconditions || 0,
      summary.supervision || 0,
      summary.organization || 0,
      report.status || "Open",
      report.createdAt || "",
      report.updatedAt || ""
    ];

    csv += row.map(value => `"${String(value).replaceAll('"','""')}"`).join(",") + "\n";

  });

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "HFACS_Database.csv";
  link.click();

  URL.revokeObjectURL(url);

};

</script>

</body>
</html>
