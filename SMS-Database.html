<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMS Database</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:35px;
  font-family:'Segoe UI', Arial, sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(255,152,0,0.30), transparent 30%),
    radial-gradient(circle at bottom right, rgba(28,99,219,0.45), transparent 38%),
    linear-gradient(rgba(5,20,55,0.86), rgba(5,20,55,0.94)),
    url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

.page{
  max-width:1500px;
  margin:auto;
  background:rgba(255,255,255,0.13);
  border:1px solid rgba(255,255,255,0.25);
  backdrop-filter:blur(14px);
  border-radius:38px;
  padding:35px;
  box-shadow:0 30px 80px rgba(0,0,0,0.42);
}

.header{
  text-align:center;
  margin-bottom:28px;
}

.logo{
  width:95px;
  height:95px;
  margin:0 auto 18px;
  border-radius:28px;
  background:linear-gradient(135deg,#ff9800,#1450b8);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  box-shadow:0 18px 35px rgba(0,0,0,0.35);
}

.header-badge{
  display:inline-block;
  background:rgba(255,255,255,0.20);
  color:white;
  padding:10px 24px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  letter-spacing:2px;
  margin-bottom:15px;
  border:1px solid rgba(255,255,255,0.30);
}

h1{
  color:white;
  font-size:64px;
  margin:0;
  font-weight:900;
  letter-spacing:1px;
  text-shadow:0 8px 20px rgba(0,0,0,0.45);
}

.subtitle{
  color:#dbeafe;
  font-size:20px;
  margin-top:12px;
  font-weight:500;
}

.toolbar{
  background:rgba(255,255,255,0.96);
  padding:24px;
  border-radius:28px;
  box-shadow:0 18px 45px rgba(0,0,0,0.28);
  margin-bottom:28px;
}

.toolbar-buttons{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  justify-content:center;
}

.tool-btn{
  border:none;
  padding:15px 24px;
  border-radius:16px;
  font-weight:900;
  color:white;
  cursor:pointer;
  font-size:15px;
  box-shadow:0 10px 22px rgba(0,0,0,0.25);
  transition:0.25s;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.tool-btn:hover{
  transform:translateY(-4px);
}

.filter-btn{
  background:linear-gradient(135deg,#5b21b6,#a855f7);
}

.excel-btn{
  background:linear-gradient(135deg,#047857,#22c55e);
}

.hazard-btn{
  background:linear-gradient(135deg,#d83b00,#ff9800);
}

.home-btn{
  background:linear-gradient(135deg,#071f47,#1450b8);
}

.filter-panel{
  display:none;
  margin-top:22px;
  background:#f8fafc;
  padding:22px;
  border-radius:22px;
  border:1px solid #dbe3ef;
}

.filter-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
}

.filter-panel input,
.filter-panel select{
  width:100%;
  padding:15px;
  border-radius:14px;
  border:1px solid #cbd5e1;
  font-size:14px;
  outline:none;
}

.container{
  margin:auto;
}

.record{
  background:rgba(255,255,255,0.96);
  margin-bottom:26px;
  padding:28px;
  border-radius:28px;
  box-shadow:0 20px 50px rgba(0,0,0,0.28);
  transition:0.25s;
  border-left:12px solid #ff9800;
  position:relative;
  overflow:hidden;
}

.record:hover{
  transform:translateY(-5px);
  box-shadow:0 28px 65px rgba(0,0,0,0.34);
}

.record::before{
  content:"";
  position:absolute;
  width:340px;
  height:340px;
  background:radial-gradient(circle,rgba(20,80,184,0.11),transparent 70%);
  top:-170px;
  right:-130px;
}

.top-row,
.info,
.edit-area{
  position:relative;
  z-index:2;
}

.top-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  margin-bottom:16px;
  flex-wrap:wrap;
}

.report-id{
  font-size:23px;
  font-weight:900;
  color:#071f47;
}

.report-id a{
  color:#5b21b6;
  text-decoration:none;
}

.actions-row{
  display:flex;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
}

.status-box{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
}

.status-group{
  text-align:center;
}

.status{
  padding:9px 15px;
  border-radius:999px;
  color:white;
  font-size:12px;
  font-weight:900;
  display:inline-block;
  box-shadow:0 5px 14px rgba(0,0,0,0.22);
}

.open{
  background:linear-gradient(135deg,#dc2626,#ef4444);
}

.close{
  background:linear-gradient(135deg,#16a34a,#22c55e);
}

.risk-green{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:white;
}

.risk-yellow{
  background:linear-gradient(135deg,#facc15,#f59e0b);
  color:#111827;
}

.risk-red{
  background:linear-gradient(135deg,#dc2626,#ef4444);
  color:white;
}

.risk-empty{
  background:linear-gradient(135deg,#e5e7eb,#cbd5e1);
  color:#071f47;
}

.risk-value{
  margin-top:10px;
  padding:16px 18px;
  border-radius:18px;
  font-size:15px;
  font-weight:900;
  min-width:220px;
  text-align:center;
  box-shadow:0 9px 20px rgba(0,0,0,0.18);
}

.edit-btn{
  background:linear-gradient(135deg,#071f47,#1450b8);
  color:white;
  border:none;
  border-radius:15px;
  padding:13px 21px;
  cursor:pointer;
  font-weight:900;
  font-size:14px;
  box-shadow:0 9px 20px rgba(0,0,0,0.22);
}

.save-btn{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:white;
  border:none;
  border-radius:15px;
  padding:14px 24px;
  cursor:pointer;
  font-weight:900;
  font-size:15px;
}

.delete-btn{
  background:linear-gradient(135deg,#dc2626,#ef4444);
  color:white;
  border:none;
  border-radius:50%;
  width:46px;
  height:46px;
  cursor:pointer;
  font-size:18px;
  font-weight:900;
  box-shadow:0 9px 20px rgba(0,0,0,0.22);
}

.info{
  margin-top:14px;
  line-height:1.8;
  color:#222;
  font-size:15px;
  background:#f8fafc;
  padding:20px;
  border-radius:20px;
  border:1px solid #e5e7eb;
}

.info-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px 24px;
}

.full-info{
  grid-column:1 / 3;
}

.label{
  font-weight:900;
  color:#071f47;
}

.edit-area{
  margin-top:18px;
  display:none;
  background:#f8fafc;
  padding:22px;
  border-radius:22px;
  border:1px solid #dbe3ef;
}

.edit-area input,
.edit-area textarea,
.edit-area select{
  width:100%;
  padding:14px;
  margin-top:8px;
  margin-bottom:14px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  font-family:'Segoe UI', Arial, sans-serif;
  font-size:14px;
}

.edit-area textarea{
  min-height:90px;
  resize:vertical;
}

.nav-between,
.bottom-home{
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.25);
  padding:18px;
  border-radius:24px;
  margin:12px 0 28px 0;
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  backdrop-filter:blur(8px);
}

.bottom-home{
  margin-top:40px;
}

.empty{
  text-align:center;
  background:white;
  padding:50px;
  border-radius:26px;
  box-shadow:0 22px 55px rgba(0,0,0,0.26);
  font-size:22px;
  color:#555;
}

@media(max-width:900px){
  body{
    padding:18px;
  }

  .page{
    padding:22px;
    border-radius:28px;
  }

  h1{
    font-size:42px;
  }

  .top-row,
  .status-box{
    flex-direction:column;
  }

  .risk-value{
    width:100%;
  }

  .filter-grid,
  .info-grid{
    grid-template-columns:1fr;
  }

  .full-info{
    grid-column:1;
  }

  .tool-btn{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="page">

<div class="header">
  <div class="logo">🗂️</div>
  <div class="header-badge">SAFETY MANAGEMENT SYSTEM</div>
  <h1>SMS Database</h1>
  <div class="subtitle">Real-Time Hazard Reports, Risk Status and Safety Records</div>
</div>

<div class="toolbar">

  <div class="toolbar-buttons">

    <button class="tool-btn filter-btn" onclick="toggleFilters()">
      🔎 Filters
    </button>

    <button class="tool-btn excel-btn" onclick="downloadExcel()">
      📥 Download Excel
    </button>

    <a class="tool-btn hazard-btn" href="Hazard-Identification.html">
      ⚠️ Hazard Identification
    </a>

    <a class="tool-btn home-btn" href="index.html">
      🏠 Home
    </a>

  </div>

  <div class="filter-panel" id="filterPanel">

    <div class="filter-grid">

      <input type="text" id="searchInput" placeholder="Search title, name, aircraft, airport..." oninput="applyFilters()">

      <input type="date" id="dateFilter" onchange="applyFilters()">

      <select id="typeFilter" onchange="applyFilters()">
        <option value="">All Report Types</option>
        <option value="MOR">MOR</option>
        <option value="VOR">VOR</option>
      </select>

      <select id="statusFilter" onchange="applyFilters()">
        <option value="">All Status</option>
        <option value="OPEN">Open</option>
        <option value="CLOSED">Closed</option>
      </select>

    </div>

  </div>

</div>

<div class="container" id="data"></div>

<div class="bottom-home">
  <a class="tool-btn hazard-btn" href="Hazard-Identification.html">
    ⚠️ Hazard Identification
  </a>

  <a class="tool-btn home-btn" href="index.html">
    🏠 Home
  </a>
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getDatabase,
ref,
get,
child,
remove,
update
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
authDomain: "aviation-sms.firebaseapp.com",
databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
projectId: "aviation-sms",
storageBucket: "aviation-sms.firebasestorage.app",
messagingSenderId: "147000937860",
appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const container = document.getElementById("data");

let allReports = [];

window.toggleFilters = function(){
  const panel = document.getElementById("filterPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

window.deleteReport = function(key){

const confirmation =
confirm("Are you sure you want to delete this SMS report?");

if(confirmation){

remove(ref(db,"smsReports/"+key)).then(()=>{

document.getElementById("record-"+key).remove();

allReports = allReports.filter(report => report.key !== key);

applyFilters();

});

}

};

window.showEdit = function(key){

const editBox = document.getElementById("edit-"+key);

editBox.style.display =
editBox.style.display === "block" ? "none" : "block";

};

window.saveEdit = function(key){

const title =
document.getElementById("edit-title-"+key).value;

if(!title.trim()){
alert("Title is required.");
return;
}

update(ref(db,"smsReports/"+key),{

title:title,
reporterName:document.getElementById("edit-reporterName-"+key).value,
date:document.getElementById("edit-date-"+key).value,
flightNumber:document.getElementById("edit-flightNumber-"+key).value,
aircraftRegistration:document.getElementById("edit-aircraftRegistration-"+key).value,
airport:document.getElementById("edit-airport-"+key).value,
destination:document.getElementById("edit-destination-"+key).value,
reportType:document.getElementById("edit-reportType-"+key).value,
whatHappened:document.getElementById("edit-whatHappened-"+key).value,
recommendation:document.getElementById("edit-recommendation-"+key).value

}).then(()=>{

alert("Report updated successfully.");
location.reload();

});

};

function getRiskClass(value){

if(value === undefined || value === null || value === ""){
return "risk-empty";
}

value = String(value).toUpperCase();

if(value === "NOT ASSESSED" || value === "N/A"){
return "risk-empty";
}

const low = ["C1","D2","E3","D1","E2","E1"];
const medium = ["A1","B2","C3","D4","E5","B1","C2","D3","E4"];
const high = ["A2","B3","C4","D5"];
const extreme = ["A5","A4","A3","B5","B4","C5"];

if(low.includes(value)){
return "risk-green";
}

if(medium.includes(value)){
return "risk-yellow";
}

if(high.includes(value) || extreme.includes(value)){
return "risk-red";
}

return "risk-empty";

}

function getRiskText(value){

if(value === undefined || value === null || value === ""){
return "NOT ASSESSED";
}

value = String(value).toUpperCase();

if(value === "NOT ASSESSED" || value === "N/A"){
return "NOT ASSESSED";
}

const low = ["C1","D2","E3","D1","E2","E1"];
const medium = ["A1","B2","C3","D4","E5","B1","C2","D3","E4"];
const high = ["A2","B3","C4","D5"];
const extreme = ["A5","A4","A3","B5","B4","C5"];

if(low.includes(value)){
return "ACCEPTABLE 🟢";
}

if(medium.includes(value)){
return "TOLERABLE 🟡";
}

if(high.includes(value) || extreme.includes(value)){
return "NOT ACCEPTABLE 🔴";
}

return "NOT ASSESSED";

}

function renderReports(reports){

container.innerHTML = "";

if(reports.length === 0){

container.innerHTML = `
<div class="empty">
No SMS reports found
</div>
`;

return;

}

reports.forEach((report,index)=>{

const key = report.key;
const item = report.item;

const div = document.createElement("div");

div.className = "record";
div.id = "record-"+key;

const riskAssessmentStatus =
item.riskClosed === true
? '<div class="status close">RISK ASSESSMENT CLOSED</div>'
: '<div class="status open">RISK ASSESSMENT OPEN</div>';

const residualRiskAssessmentStatus =
item.residualRiskClosed === true
? '<div class="status close">RESIDUAL RISK CLOSED</div>'
: '<div class="status open">RESIDUAL RISK OPEN</div>';

const riskClass =
item.riskClosed === true ? getRiskClass(item.risk) : "risk-empty";

const residualClass =
item.residualRiskClosed === true ? getRiskClass(item.residualRisk) : "risk-empty";

const riskText =
item.riskClosed === true ? getRiskText(item.risk) : "NOT ASSESSED";

const residualText =
item.residualRiskClosed === true ? getRiskText(item.residualRisk) : "NOT ASSESSED";

const riskValue =
item.riskClosed === true ? item.risk : "N/A";

const residualValue =
item.residualRiskClosed === true ? item.residualRisk : "N/A";

div.innerHTML = `

<div class="top-row">

<div class="report-id">

Title:
<a href="Risk-Detail.html?key=${key}">
${item.title || item.reportId || "N/A"}
</a>

<br>

<span style="font-size:14px;color:#64748b;">
ID: ${item.reportId || "N/A"}
</span>

</div>

<div class="actions-row">

<div class="status-box">

<div class="status-group">

${riskAssessmentStatus}

<div class="risk-value ${riskClass}">
Risk:
${riskValue}
<br><br>
${riskText}
</div>

</div>

<div class="status-group">

${residualRiskAssessmentStatus}

<div class="risk-value ${residualClass}">
Residual:
${residualValue}
<br><br>
${residualText}
</div>

</div>

</div>

<button class="edit-btn" onclick="showEdit('${key}')">
Edit
</button>

<button class="delete-btn" onclick="deleteReport('${key}')">
🗑️
</button>

</div>

</div>

<div class="info">

<div class="info-grid">

<div>
<span class="label">Name:</span>
${item.reporterName || "N/A"}
</div>

<div>
<span class="label">Date:</span>
${item.date || "N/A"}
</div>

<div>
<span class="label">Flight Number:</span>
${item.flightNumber || "N/A"}
</div>

<div>
<span class="label">Aircraft Registration:</span>
${item.aircraftRegistration || "N/A"}
</div>

<div>
<span class="label">Airport:</span>
${item.airport || "N/A"}
</div>

<div>
<span class="label">Destination:</span>
${item.destination || "N/A"}
</div>

<div>
<span class="label">Type Report:</span>
${item.reportType || "N/A"}
</div>

<div class="full-info">
<span class="label">What Happened:</span>
${item.whatHappened || "N/A"}
</div>

<div class="full-info">
<span class="label">Recommendation:</span>
${item.recommendation || "N/A"}
</div>

</div>

</div>

<div class="edit-area" id="edit-${key}">

<label><b>Title:</b></label>
<input id="edit-title-${key}" value="${item.title || ""}">

<label><b>Name:</b></label>
<input id="edit-reporterName-${key}" value="${item.reporterName || ""}">

<label><b>Date:</b></label>
<input type="date" id="edit-date-${key}" value="${item.date || ""}">

<label><b>Flight Number:</b></label>
<input id="edit-flightNumber-${key}" value="${item.flightNumber || ""}">

<label><b>Aircraft Registration:</b></label>
<input id="edit-aircraftRegistration-${key}" value="${item.aircraftRegistration || ""}">

<label><b>Airport:</b></label>
<input id="edit-airport-${key}" value="${item.airport || ""}">

<label><b>Destination:</b></label>
<input id="edit-destination-${key}" value="${item.destination || ""}">

<label><b>Type Report:</b></label>
<select id="edit-reportType-${key}">
<option value="">Select Type</option>
<option value="MOR" ${item.reportType === "MOR" ? "selected" : ""}>MOR</option>
<option value="VOR" ${item.reportType === "VOR" ? "selected" : ""}>VOR</option>
</select>

<label><b>What Happened:</b></label>
<textarea id="edit-whatHappened-${key}">${item.whatHappened || ""}</textarea>

<label><b>Recommendation:</b></label>
<textarea id="edit-recommendation-${key}">${item.recommendation || ""}</textarea>

<button class="save-btn" onclick="saveEdit('${key}')">
Save Changes
</button>

</div>

`;

container.appendChild(div);

if((index + 1) % 3 === 0 && index !== reports.length - 1){

const nav = document.createElement("div");

nav.className = "nav-between";

nav.innerHTML = `

<a class="tool-btn hazard-btn" href="Hazard-Identification.html">
⚠️ Hazard Identification
</a>

<a class="tool-btn home-btn" href="index.html">
🏠 Home
</a>

`;

container.appendChild(nav);

}

});

}

window.applyFilters = function(){

const searchText =
document.getElementById("searchInput").value.toLowerCase();

const dateValue =
document.getElementById("dateFilter").value;

const typeFilter =
document.getElementById("typeFilter").value;

const statusFilter =
document.getElementById("statusFilter").value;

const filtered = allReports.filter(report=>{

const item = report.item;

const generalText = `
${item.reportId || ""}
${item.title || ""}
${item.reporterName || ""}
${item.date || ""}
${item.flightNumber || ""}
${item.aircraftRegistration || ""}
${item.airport || ""}
${item.destination || ""}
${item.reportType || ""}
${item.whatHappened || ""}
${item.recommendation || ""}
${item.risk || ""}
${item.residualRisk || ""}
`.toLowerCase();

const matchSearch =
generalText.includes(searchText);

const matchDate =
dateValue === "" || item.date === dateValue;

const matchType =
typeFilter === "" || item.reportType === typeFilter;

const isOpen =
item.riskClosed !== true || item.residualRiskClosed !== true;

const isClosed =
item.riskClosed === true && item.residualRiskClosed === true;

const matchStatus =
statusFilter === "" ||
(statusFilter === "OPEN" && isOpen) ||
(statusFilter === "CLOSED" && isClosed);

return matchSearch && matchDate && matchType && matchStatus;

});

renderReports(filtered);

};

window.downloadExcel = function(){

if(allReports.length === 0){
alert("No reports available to export.");
return;
}

let table = `
<table border="1">
<tr>
<th>Report ID</th>
<th>Title</th>
<th>Name</th>
<th>Date</th>
<th>Flight Number</th>
<th>Aircraft Registration</th>
<th>Airport</th>
<th>Destination</th>
<th>Type Report</th>
<th>What Happened</th>
<th>Recommendation</th>
<th>Risk</th>
<th>Risk Level</th>
<th>Residual Risk</th>
<th>Residual Level</th>
</tr>
`;

allReports.forEach(report=>{

const item = report.item;

const riskLevel =
item.riskClosed === true ? getRiskText(item.risk) : "NOT ASSESSED";

const residualLevel =
item.residualRiskClosed === true ? getRiskText(item.residualRisk) : "NOT ASSESSED";

table += `
<tr>
<td>${item.reportId || "N/A"}</td>
<td>${item.title || "N/A"}</td>
<td>${item.reporterName || "N/A"}</td>
<td>${item.date || "N/A"}</td>
<td>${item.flightNumber || "N/A"}</td>
<td>${item.aircraftRegistration || "N/A"}</td>
<td>${item.airport || "N/A"}</td>
<td>${item.destination || "N/A"}</td>
<td>${item.reportType || "N/A"}</td>
<td>${item.whatHappened || "N/A"}</td>
<td>${item.recommendation || "N/A"}</td>
<td>${item.risk || "N/A"}</td>
<td>${riskLevel}</td>
<td>${item.residualRisk || "N/A"}</td>
<td>${residualLevel}</td>
</tr>
`;

});

table += `</table>`;

const blob = new Blob([table], {
type: "application/vnd.ms-excel"
});

const url = URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = url;

a.download = "SMS_Database_Export.xls";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

URL.revokeObjectURL(url);

};

get(child(ref(db), "smsReports")).then((snapshot)=>{

if(snapshot.exists()){

const data = snapshot.val();

allReports =
Object.entries(data).reverse().map(([key,item])=>({
key:key,
item:item
}));

renderReports(allReports);

}else{

container.innerHTML = `
<div class="empty">
No SMS reports found
</div>
`;

}

});

</script>

</body>
</html>
