<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safety Bulletins & Alerts</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Arial, sans-serif;
    min-height:100vh;
    background:
    radial-gradient(circle at top left, rgba(255,152,0,0.30), transparent 30%),
    radial-gradient(circle at bottom right, rgba(28,99,219,0.45), transparent 38%),
    linear-gradient(rgba(5,20,55,0.86), rgba(5,20,55,0.94)),
    url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1400&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    padding:35px;
}

.container{
    max-width:1220px;
    margin:auto;
    background:rgba(255,255,255,0.96);
    backdrop-filter:blur(14px);
    border-radius:40px;
    padding:55px;
    box-shadow:0 30px 80px rgba(0,0,0,0.45);
    position:relative;
    overflow:hidden;
}

.container::before{
    content:"";
    position:absolute;
    width:470px;
    height:470px;
    background:radial-gradient(circle,rgba(20,80,184,0.18),transparent 70%);
    top:-190px;
    right:-150px;
}

.container::after{
    content:"";
    position:absolute;
    width:340px;
    height:340px;
    background:radial-gradient(circle,rgba(255,152,0,0.18),transparent 70%);
    bottom:-150px;
    left:-120px;
}

.content{
    position:relative;
    z-index:2;
}

.logo{
    width:112px;
    height:112px;
    margin:0 auto 22px;
    border-radius:32px;
    background:linear-gradient(135deg,#071f47,#1450b8,#ff9800);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    box-shadow:0 18px 40px rgba(0,0,0,0.30);
}

.badge{
    display:block;
    width:max-content;
    margin:0 auto 16px auto;
    background:#eaf2ff;
    color:#071f47;
    padding:10px 24px;
    border-radius:999px;
    font-size:14px;
    font-weight:900;
    letter-spacing:1.8px;
}

h1{
    text-align:center;
    color:#071f47;
    font-size:58px;
    margin-bottom:12px;
    font-weight:900;
}

.subtitle{
    text-align:center;
    color:#56657d;
    font-size:19px;
    margin-bottom:22px;
    line-height:1.6;
    font-weight:500;
}

.title-line{
    width:230px;
    height:6px;
    margin:0 auto 38px;
    border-radius:10px;
    background:linear-gradient(90deg,transparent,#1450b8,#ff9800,transparent);
}

.top-buttons{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    background:#f8fbff;
    padding:20px;
    border-radius:26px;
    border:1px solid #e5e7eb;
    box-shadow:0 14px 32px rgba(0,0,0,0.10);
    margin-bottom:30px;
}

.btn{
    border:none;
    color:white;
    padding:15px 26px;
    border-radius:16px;
    font-size:15px;
    font-weight:900;
    cursor:pointer;
    transition:0.25s;
    box-shadow:0 10px 22px rgba(0,0,0,0.22);
}

.btn:hover{
    transform:translateY(-3px);
}

.culture-btn{
    background:linear-gradient(135deg,#5b21b6,#8b5cf6);
}

.print-btn{
    background:linear-gradient(135deg,#047857,#22c55e);
}

.add-btn{
    background:linear-gradient(135deg,#d83b00,#ff9800);
}

.home-btn{
    background:linear-gradient(135deg,#071f47,#1450b8);
}

.save-btn{
    background:linear-gradient(135deg,#071f47,#1450b8);
    color:white;
}

.delete-btn{
    background:linear-gradient(135deg,#dc2626,#ef4444);
    color:white;
}

.open-btn{
    background:linear-gradient(135deg,#0077b6,#00b4d8);
    color:white;
}

.form-box{
    background:linear-gradient(135deg,#ffffff,#f8fbff);
    padding:28px;
    border-radius:28px;
    margin-bottom:32px;
    border-left:10px solid #1450b8;
    box-shadow:0 16px 35px rgba(0,0,0,0.12);
}

label{
    display:block;
    font-weight:900;
    color:#071f47;
    margin-top:15px;
    margin-bottom:8px;
}

input,
select,
textarea{
    width:100%;
    padding:15px;
    border:1px solid #cbd5e1;
    border-radius:14px;
    font-size:16px;
    font-family:'Segoe UI', Arial, sans-serif;
    outline:none;
    background:#f8fbff;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#1450b8;
    box-shadow:0 0 0 4px rgba(20,80,184,0.12);
    background:white;
}

textarea{
    min-height:125px;
    resize:vertical;
}

button{
    padding:14px 20px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    font-size:16px;
    font-weight:900;
    margin-top:15px;
    transition:0.25s;
}

button:hover{
    transform:translateY(-3px);
}

.card{
    background:linear-gradient(135deg,#ffffff,#f8fbff);
    border-radius:28px;
    padding:26px;
    margin-bottom:22px;
    box-shadow:0 18px 45px rgba(0,0,0,0.14);
    border-left:10px solid #1450b8;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    width:320px;
    height:320px;
    background:radial-gradient(circle,rgba(20,80,184,0.10),transparent 70%);
    top:-160px;
    right:-120px;
}

.card h2,
.meta,
.description,
.actions,
.status{
    position:relative;
    z-index:2;
}

.card h2{
    color:#071f47;
    margin-bottom:10px;
    font-size:28px;
    font-weight:900;
}

.meta{
    color:#56657d;
    font-size:15px;
    margin-bottom:10px;
    line-height:1.6;
}

.description{
    color:#333;
    line-height:1.7;
    margin-top:12px;
    background:#f8fafc;
    padding:16px;
    border-radius:18px;
    border:1px solid #e5e7eb;
}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

.status{
    display:inline-block;
    padding:8px 15px;
    border-radius:999px;
    font-weight:900;
    color:white;
    margin-top:8px;
    box-shadow:0 8px 18px rgba(0,0,0,0.18);
}

.Alert{
    background:linear-gradient(135deg,#dc2626,#ef4444);
}

.Bulletin{
    background:linear-gradient(135deg,#071f47,#1450b8);
}

.Communication{
    background:linear-gradient(135deg,#047857,#22c55e);
}

.empty{
    text-align:center;
    color:#56657d;
    font-size:19px;
    padding:35px;
    background:#f8fbff;
    border-radius:24px;
    border:1px solid #e5e7eb;
    font-weight:700;
}

.bottom-buttons{
    margin-top:35px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.bottom-buttons button{
    min-height:64px;
    margin-top:0;
    color:white;
    font-size:20px;
}

.footer{
    margin-top:35px;
    text-align:center;
    color:#51617b;
    font-size:14px;
    letter-spacing:3px;
    font-weight:900;
}

@media print{
    .form-box,
    .top-buttons,
    .actions,
    .bottom-buttons,
    .footer{
        display:none;
    }

    body{
        background:white;
        padding:0;
    }

    .container{
        box-shadow:none;
        border-radius:0;
    }
}

@media(max-width:800px){
    body{
        padding:20px;
    }

    .container{
        padding:35px 22px;
    }

    h1{
        font-size:40px;
    }

    .subtitle{
        font-size:17px;
    }

    .top-buttons,
    .bottom-buttons{
        grid-template-columns:1fr;
        flex-direction:column;
    }

    .btn,
    .bottom-buttons button{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="container">
<div class="content">

    <div class="logo">📢</div>

    <div class="badge">SAFETY COMMUNICATION</div>

    <h1>Safety Bulletins & Alerts</h1>

    <div class="subtitle">
        Upload, manage and communicate safety bulletins, alerts, lessons learned and safety promotion material.
    </div>

    <div class="title-line"></div>

    <div class="top-buttons">
        <button class="btn culture-btn" onclick="goBack()">👥 Safety Promotion Culture</button>
        <button class="btn print-btn" onclick="window.print()">🖨️ Print Page</button>
        <button class="btn add-btn" onclick="newBulletin()">➕ Add New Bulletin</button>
        <button class="btn home-btn" onclick="goHome()">🏠 Home</button>
    </div>

    <div class="form-box" id="formBox">

        <label>Type</label>
        <select id="type">
            <option value="Bulletin">Safety Bulletin</option>
            <option value="Alert">Safety Alert</option>
            <option value="Communication">Safety Communication</option>
        </select>

        <label>Title</label>
        <input type="text" id="title" placeholder="Example: Tool Control Safety Alert">

        <label>Reference / Report Number</label>
        <input type="text" id="reference" placeholder="Example: SB-2026-001">

        <label>Issue Date</label>
        <input type="date" id="date">

        <label>Department / Area</label>
        <input type="text" id="area" placeholder="Example: Maintenance, QA, Tool Room, Ramp">

        <label>Description</label>
        <textarea id="description" placeholder="Write the safety message, lesson learned, hazard, corrective action or communication here..."></textarea>

        <label>Google Drive Link</label>
        <input type="url" id="driveLink" placeholder="Paste Google Drive link here">

        <button class="save-btn" onclick="saveBulletin()">Save Bulletin / Alert</button>

    </div>

    <div id="bulletinsList"></div>

    <div class="bottom-buttons">
        <button class="home-btn" onclick="goHome()">🏠 Home</button>
        <button class="culture-btn" onclick="goBack()">👥 Safety Promotion Culture</button>
    </div>

    <div class="footer">
        AVIATION SAFETY MANAGEMENT PLATFORM
    </div>

</div>
</div>

<script>

let bulletins =
JSON.parse(localStorage.getItem("safetyBulletinsAlerts")) || [];

function saveBulletin(){

    const type =
    document.getElementById("type").value;

    const title =
    document.getElementById("title").value;

    const reference =
    document.getElementById("reference").value;

    const date =
    document.getElementById("date").value;

    const area =
    document.getElementById("area").value;

    const description =
    document.getElementById("description").value;

    const driveLink =
    document.getElementById("driveLink").value;

    if(title.trim() === ""){
        alert("Please enter a title.");
        return;
    }

    const bulletin = {
        id: Date.now(),
        type:type,
        title:title,
        reference:reference,
        date:date,
        area:area,
        description:description,
        driveLink:driveLink
    };

    bulletins.push(bulletin);

    localStorage.setItem(
        "safetyBulletinsAlerts",
        JSON.stringify(bulletins)
    );

    clearForm();
    displayBulletins();

    alert("Safety Bulletin / Alert saved successfully.");
}

function displayBulletins(){

    const list =
    document.getElementById("bulletinsList");

    list.innerHTML = "";

    if(bulletins.length === 0){

        list.innerHTML =
        `<div class="empty">No Safety Bulletins or Alerts saved yet.</div>`;

        return;
    }

    bulletins
    .slice()
    .reverse()
    .forEach(function(item){

        const card =
        document.createElement("div");

        card.className =
        "card";

        card.innerHTML = `
            <h2>${item.title}</h2>

            <div class="meta">
                <strong>Reference:</strong> ${item.reference || "N/A"} |
                <strong>Date:</strong> ${item.date || "N/A"} |
                <strong>Area:</strong> ${item.area || "N/A"}
            </div>

            <span class="status ${item.type}">
                ${item.type}
            </span>

            <div class="description">
                ${item.description || "No description entered."}
            </div>

            <div class="meta" style="margin-top:12px;">
                <strong>Google Drive Link:</strong>
                ${item.driveLink ? "Available" : "No link added"}
            </div>

            <div class="actions">
                ${
                    item.driveLink
                    ? `<button class="open-btn" onclick="openDriveLink(${item.id})">Open Drive Link</button>`
                    : ""
                }

                <button class="delete-btn" onclick="deleteBulletin(${item.id})">
                    Delete
                </button>
            </div>
        `;

        list.appendChild(card);

    });
}

function openDriveLink(id){

    const item =
    bulletins.find(b => b.id === id);

    if(!item || !item.driveLink){
        alert("No Google Drive link available.");
        return;
    }

    window.open(item.driveLink, "_blank");
}

function deleteBulletin(id){

    if(confirm("Are you sure you want to delete this bulletin / alert?")){

        bulletins =
        bulletins.filter(b => b.id !== id);

        localStorage.setItem(
            "safetyBulletinsAlerts",
            JSON.stringify(bulletins)
        );

        displayBulletins();
    }
}

function newBulletin(){

    clearForm();

    document.getElementById("formBox").scrollIntoView({
        behavior:"smooth"
    });
}

function clearForm(){

    document.getElementById("type").value = "Bulletin";
    document.getElementById("title").value = "";
    document.getElementById("reference").value = "";
    document.getElementById("date").value = "";
    document.getElementById("area").value = "";
    document.getElementById("description").value = "";
    document.getElementById("driveLink").value = "";
}

function goBack(){
    window.location.href = "Safety-Promotion-Culture.html";
}

function goHome(){
    window.location.href = "index.html";
}

displayBulletins();

</script>

</body>
</html>
