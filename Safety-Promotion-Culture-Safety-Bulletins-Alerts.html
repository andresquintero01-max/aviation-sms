<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safety Bulletins & Alerts</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
    padding:35px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:white;
    border-radius:30px;
    padding:45px;
    box-shadow:0 20px 55px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    color:#071f47;
    font-size:52px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#555;
    font-size:18px;
    margin-bottom:35px;
}

.form-box{
    background:#f4f6f8;
    padding:25px;
    border-radius:22px;
    margin-bottom:30px;
    border-left:8px solid #071f47;
}

label{
    display:block;
    font-weight:bold;
    color:#071f47;
    margin-top:15px;
    margin-bottom:6px;
}

input, select, textarea{
    width:100%;
    padding:13px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

textarea{
    min-height:120px;
    resize:vertical;
}

button{
    padding:13px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    margin-top:15px;
}

.save-btn{
    background:#071f47;
    color:white;
}

.print-btn{
    background:#198754;
    color:white;
}

.back-btn{
    background:#b91c1c;
    color:white;
}

.home-btn{
    background:#333;
    color:white;
}

.add-btn{
    background:#ff9800;
    color:white;
}

.delete-btn{
    background:#dc2626;
    color:white;
}

.open-btn{
    background:#1450b8;
    color:white;
}

.card{
    background:#ffffff;
    border-radius:20px;
    padding:22px;
    margin-bottom:20px;
    box-shadow:0 8px 22px rgba(0,0,0,0.12);
    border-left:8px solid #1450b8;
}

.card h2{
    color:#071f47;
    margin-bottom:8px;
}

.meta{
    color:#555;
    font-size:15px;
    margin-bottom:10px;
}

.description{
    color:#333;
    line-height:1.6;
    margin-top:10px;
}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

.top-buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.left-buttons,
.right-buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.status{
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    font-weight:bold;
    color:white;
    margin-top:8px;
}

.Alert{
    background:#dc2626;
}

.Bulletin{
    background:#1450b8;
}

.Communication{
    background:#198754;
}

.empty{
    text-align:center;
    color:#777;
    font-size:18px;
    padding:25px;
}

@media print{
    .form-box,
    .top-buttons,
    .actions{
        display:none;
    }

    body{
        background:white;
        padding:0;
    }

    .container{
        box-shadow:none;
        border-radius:0;
    }
}

@media(max-width:800px){
    .container{
        padding:25px;
    }

    h1{
        font-size:36px;
    }

    .top-buttons{
        flex-direction:column;
        align-items:stretch;
    }

    .left-buttons,
    .right-buttons{
        justify-content:center;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Safety Bulletins & Alerts</h1>

    <div class="subtitle">
        Upload, manage and communicate safety bulletins, alerts, lessons learned and safety promotion material.
    </div>

    <div class="top-buttons">

        <div class="left-buttons">
            <button class="back-btn" onclick="goBack()">Back to Safety Promotion Culture</button>
            <button class="print-btn" onclick="window.print()">Print Page</button>
        </div>

        <div class="right-buttons">
            <button class="add-btn" onclick="newBulletin()">➕ Add New Bulletin</button>
            <button class="home-btn" onclick="goHome()">Home</button>
        </div>

    </div>

    <div class="form-box" id="formBox">

        <label>Type</label>
        <select id="type">
            <option value="Bulletin">Safety Bulletin</option>
            <option value="Alert">Safety Alert</option>
            <option value="Communication">Safety Communication</option>
        </select>

        <label>Title</label>
        <input type="text" id="title" placeholder="Example: Tool Control Safety Alert">

        <label>Reference / Report Number</label>
        <input type="text" id="reference" placeholder="Example: SB-2026-001">

        <label>Issue Date</label>
        <input type="date" id="date">

        <label>Department / Area</label>
        <input type="text" id="area" placeholder="Example: Maintenance, QA, Tool Room, Ramp">

        <label>Description</label>
        <textarea id="description" placeholder="Write the safety message, lesson learned, hazard, corrective action or communication here..."></textarea>

        <label>Google Drive Link</label>
        <input type="url" id="driveLink" placeholder="Paste Google Drive link here">

        <button class="save-btn" onclick="saveBulletin()">Save Bulletin / Alert</button>

    </div>

    <div id="bulletinsList"></div>

</div>

<script>

let bulletins =
JSON.parse(localStorage.getItem("safetyBulletinsAlerts")) || [];

function saveBulletin(){

    const type =
    document.getElementById("type").value;

    const title =
    document.getElementById("title").value;

    const reference =
    document.getElementById("reference").value;

    const date =
    document.getElementById("date").value;

    const area =
    document.getElementById("area").value;

    const description =
    document.getElementById("description").value;

    const driveLink =
    document.getElementById("driveLink").value;

    if(title.trim() === ""){
        alert("Please enter a title.");
        return;
    }

    const bulletin = {
        id: Date.now(),
        type:type,
        title:title,
        reference:reference,
        date:date,
        area:area,
        description:description,
        driveLink:driveLink
    };

    bulletins.push(bulletin);

    localStorage.setItem(
        "safetyBulletinsAlerts",
        JSON.stringify(bulletins)
    );

    clearForm();
    displayBulletins();

    alert("Safety Bulletin / Alert saved successfully.");
}

function displayBulletins(){

    const list =
    document.getElementById("bulletinsList");

    list.innerHTML = "";

    if(bulletins.length === 0){

        list.innerHTML =
        `<div class="empty">No Safety Bulletins or Alerts saved yet.</div>`;

        return;
    }

    bulletins
    .slice()
    .reverse()
    .forEach(function(item){

        const card =
        document.createElement("div");

        card.className =
        "card";

        card.innerHTML = `
            <h2>${item.title}</h2>

            <div class="meta">
                <strong>Reference:</strong> ${item.reference || "N/A"} |
                <strong>Date:</strong> ${item.date || "N/A"} |
                <strong>Area:</strong> ${item.area || "N/A"}
            </div>

            <span class="status ${item.type}">
                ${item.type}
            </span>

            <div class="description">
                ${item.description || "No description entered."}
            </div>

            <div class="meta" style="margin-top:12px;">
                <strong>Google Drive Link:</strong>
                ${item.driveLink ? "Available" : "No link added"}
            </div>

            <div class="actions">
                ${
                    item.driveLink
                    ? `<button class="open-btn" onclick="openDriveLink(${item.id})">Open Drive Link</button>`
                    : ""
                }

                <button class="delete-btn" onclick="deleteBulletin(${item.id})">
                    Delete
                </button>
            </div>
        `;

        list.appendChild(card);

    });
}

function openDriveLink(id){

    const item =
    bulletins.find(b => b.id === id);

    if(!item || !item.driveLink){
        alert("No Google Drive link available.");
        return;
    }

    window.open(item.driveLink, "_blank");
}

function deleteBulletin(id){

    if(confirm("Are you sure you want to delete this bulletin / alert?")){

        bulletins =
        bulletins.filter(b => b.id !== id);

        localStorage.setItem(
            "safetyBulletinsAlerts",
            JSON.stringify(bulletins)
        );

        displayBulletins();
    }
}

function newBulletin(){

    clearForm();

    document.getElementById("formBox").scrollIntoView({
        behavior:"smooth"
    });
}

function clearForm(){

    document.getElementById("type").value = "Bulletin";
    document.getElementById("title").value = "";
    document.getElementById("reference").value = "";
    document.getElementById("date").value = "";
    document.getElementById("area").value = "";
    document.getElementById("description").value = "";
    document.getElementById("driveLink").value = "";
}

function goBack(){
    window.location.href = "Safety-Promotion-Culture.html";
}

function goHome(){
    window.location.href = "index.html";
}

displayBulletins();

</script>

</body>
</html>
