<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Risk Management Tools</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
}

/* MAIN CONTAINER */
.container{
  width:100%;
  max-width:700px;
  background:white;
  padding:50px;
  border-radius:28px;
  box-shadow:0 18px 45px rgba(0,0,0,0.3);
  text-align:center;
}

/* MAIN TITLE */
h1{
  font-size:50px;
  color:#071f47;
  margin-bottom:15px;
}

/* DESCRIPTION */
.description{
  font-size:18px;
  color:#666;
  margin-bottom:40px;
}

/* SECTION */
.section{
  margin-bottom:28px;
}

/* SUBTITLE */
.subtitle{
  font-size:24px;
  color:#333;
  font-weight:bold;
  margin-bottom:14px;
}

/* BUTTON LINKS */
a.btn{
  text-decoration:none;
}

/* MAIN BUTTONS */
.main-btn{
  width:100%;
  max-width:450px;
  background:linear-gradient(135deg,#071f47,#0b2a66);
  color:white;
  border:none;
  padding:22px;
  border-radius:18px;
  cursor:pointer;
  font-size:20px;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 10px 22px rgba(0,0,0,0.2);
}

.main-btn:hover{
  transform:translateY(-5px) scale(1.02);
  background:linear-gradient(135deg,#0b2a66,#1c63db);
  box-shadow:0 15px 28px rgba(0,0,0,0.3);
}

/* SMALL TEXT */
.small-text{
  display:block;
  font-size:14px;
  margin-top:6px;
  font-weight:normal;
  opacity:0.9;
}

/* BACK BUTTON */
.back-btn{
  display:inline-block;
  margin-top:25px;
  background:linear-gradient(135deg,#c40000,#ff2b2b);
  color:white;
  text-decoration:none;
  padding:15px 35px;
  border-radius:16px;
  font-size:18px;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

.back-btn:hover{
  transform:translateY(-3px) scale(1.03);
  background:linear-gradient(135deg,#ff2b2b,#ff5b5b);
  box-shadow:0 12px 22px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="container">

  <!-- MAIN TITLE -->
  <h1>Risk Management Tools</h1>

  <!-- DESCRIPTION -->
  <div class="description">
    Aviation operational risk assessment and safety management tools
  </div>

  <!-- FRAT -->
  <div class="section">

    <div class="subtitle">
      Flight Risk Assessment Tool (FRAT)
    </div>

    <a class="btn" href="FRAT.html">
      <button class="main-btn">
        Open FRAT
        <span class="small-text">
          Evaluate operational flight risk factors
        </span>
      </button>
    </a>

  </div>

  <!-- LOSA -->
  <div class="section">

    <div class="subtitle">
      Line Operations Safety Assessment (LOSA)
    </div>

    <a class="btn" href="LOSA.html">
      <button class="main-btn">
        Open LOSA
        <span class="small-text">
          Monitor and assess operational safety performance
        </span>
      </button>
    </a>

  </div>

  <!-- BACK BUTTON -->
  <a class="back-btn" href="Hazard-Identification.html">
    Back to Hazard Identification
  </a>

</div>

</body>
</html>
