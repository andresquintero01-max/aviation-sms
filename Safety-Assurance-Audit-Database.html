<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audit Database</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  min-height:100vh;
  background:
  radial-gradient(circle at top left, rgba(255,152,0,0.30), transparent 30%),
  radial-gradient(circle at bottom right, rgba(28,99,219,0.45), transparent 38%),
  linear-gradient(rgba(5,20,55,0.86),rgba(5,20,55,0.94)),
  url('https://images.unsplash.com/photo-1517976487492-5750f3195933?q=80&w=1400&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  padding:35px;
}

.container{
  max-width:1300px;
  margin:auto;
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(14px);
  padding:50px;
  border-radius:40px;
  box-shadow:0 30px 80px rgba(0,0,0,0.45);
  position:relative;
  overflow:hidden;
}

.content{position:relative;z-index:2;}

.logo{
  width:112px;
  height:112px;
  margin:0 auto 20px;
  border-radius:32px;
  background:linear-gradient(135deg,#071f47,#1450b8,#ff9800);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  box-shadow:0 18px 40px rgba(0,0,0,0.30);
}

.badge{
  display:block;
  width:max-content;
  margin:0 auto 16px;
  background:#eaf2ff;
  color:#071f47;
  padding:10px 24px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
  letter-spacing:1.8px;
}

h1{
  text-align:center;
  color:#071f47;
  font-size:58px;
  margin-bottom:10px;
  font-weight:900;
}

.description{
  text-align:center;
  color:#56657d;
  font-size:19px;
  margin-bottom:28px;
  font-weight:500;
}

.title-line{
  width:230px;
  height:6px;
  margin:0 auto 32px;
  border-radius:10px;
  background:linear-gradient(90deg,transparent,#1450b8,#ff9800,transparent);
}

.filter-box{
  background:#f8fbff;
  border:1px solid #e5e7eb;
  padding:22px;
  border-radius:26px;
  margin-bottom:26px;
  box-shadow:0 14px 32px rgba(0,0,0,0.10);
}

.filter-title{
  font-weight:900;
  color:#071f47;
  margin-bottom:12px;
  font-size:18px;
}

.search-input{
  width:100%;
  padding:16px;
  border:1px solid #cbd5e1;
  border-radius:16px;
  font-size:16px;
  outline:none;
}

.filter-buttons{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:14px;
}

.top-buttons,
.bottom-buttons{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:30px;
  background:#f8fbff;
  padding:18px;
  border-radius:24px;
  border:1px solid #e5e7eb;
}

.bottom-buttons{
  margin-top:40px;
  margin-bottom:0;
}

.btn{
  border:none;
  color:white;
  padding:15px 28px;
  border-radius:16px;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  transition:0.25s;
  box-shadow:0 10px 22px rgba(0,0,0,0.22);
}

.btn:hover{transform:translateY(-3px);}

.audit-btn{background:linear-gradient(135deg,#d83b00,#ff9800);}
.home-btn{background:linear-gradient(135deg,#071f47,#1450b8);}
.open-btn{background:linear-gradient(135deg,#071f47,#1450b8);}
.save-btn{background:linear-gradient(135deg,#047857,#22c55e);}
.status-btn{background:linear-gradient(135deg,#6b21a8,#9333ea);}
.internal-btn{background:linear-gradient(135deg,#071f47,#1450b8);}
.external-btn{background:linear-gradient(135deg,#047857,#22b573);}
.all-btn{background:linear-gradient(135deg,#334155,#64748b);}

.delete-btn{
  background:linear-gradient(135deg,#dc2626,#ef4444);
  width:50px;
  height:50px;
  border-radius:50%;
  padding:0;
  font-size:20px;
}

.counter{
  text-align:center;
  color:#071f47;
  font-weight:900;
  margin-bottom:20px;
  font-size:17px;
}

.report-card{
  background:linear-gradient(135deg,#ffffff,#f8fbff);
  border-radius:28px;
  padding:26px;
  margin-bottom:24px;
  box-shadow:0 18px 45px rgba(0,0,0,0.14);
  border-left:10px solid #1450b8;
  transition:0.25s;
}

.report-card.external{border-left-color:#22b573;}
.report-card.internal{border-left-color:#1450b8;}

.report-card:hover{
  transform:translateY(-5px);
  box-shadow:0 26px 60px rgba(0,0,0,0.20);
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.event-title{
  font-size:26px;
  font-weight:900;
  color:#071f47;
  margin-bottom:6px;
}

.meta{
  color:#56657d;
  font-size:15px;
  line-height:1.7;
}

.status,
.category{
  display:inline-block;
  padding:8px 18px;
  border-radius:999px;
  color:white;
  font-size:13px;
  font-weight:900;
  margin:3px;
}

.status.open{background:linear-gradient(135deg,#047857,#22c55e);}
.status.closed{background:linear-gradient(135deg,#475569,#64748b);}
.status.in-progress{background:linear-gradient(135deg,#071f47,#1450b8);}
.status.pending-corrective-action{background:linear-gradient(135deg,#d83b00,#ff9800);}

.category.internal-audit{background:linear-gradient(135deg,#071f47,#1450b8);}
.category.external-audit{background:linear-gradient(135deg,#047857,#22b573);}

.details-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin-top:18px;
}

.detail-box{
  background:#f4f7fb;
  padding:15px;
  border-radius:18px;
  border:1px solid #dce3ef;
}

.detail-label{
  font-size:12px;
  color:#64748b;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:6px;
}

.detail-value{
  font-size:15px;
  color:#071f47;
  font-weight:800;
  word-break:break-word;
}

.audit-id-input{
  width:100%;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  font-size:15px;
  font-weight:800;
  color:#071f47;
}

.small-note{
  font-size:12px;
  color:#64748b;
  margin-top:6px;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:22px;
  align-items:center;
}

.separator-buttons{
  margin:30px 0;
  padding:18px;
  background:rgba(255,255,255,0.18);
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.30);
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  backdrop-filter:blur(8px);
}

.no-data{
  text-align:center;
  color:#56657d;
  font-size:20px;
  margin-top:35px;
  background:#f8fbff;
  padding:42px;
  border-radius:24px;
  border:1px solid #e5e7eb;
  font-weight:700;
}

.footer{
  margin-top:35px;
  text-align:center;
  color:#51617b;
  font-size:14px;
  letter-spacing:3px;
  font-weight:900;
}

@media(max-width:700px){
  body{padding:20px;}
  .container{padding:30px 22px;}
  h1{font-size:40px;}
  .event-title{font-size:21px;}
  .btn{width:100%;}
}
</style>
</head>

<body>

<div class="container">
<div class="content">

  <div class="logo">📊</div>

  <div class="badge">SAFETY ASSURANCE DATABASE</div>

  <h1>Audit Database</h1>

  <div class="description">
    Stored Internal and External Audit Reports
  </div>

  <div class="title-line"></div>

  <div class="filter-box">
    <div class="filter-title">Search Audit Reports</div>
    <input 
      id="searchInput" 
      class="search-input" 
      placeholder="Search by audit ID, title, auditor, vendor, department, date, status..."
      oninput="applyFilter()"
    >

    <div class="filter-buttons">
      <button class="btn all-btn" onclick="setCategoryFilter('All')">All Audits</button>
      <button class="btn internal-btn" onclick="setCategoryFilter('Internal Audit')">Internal Audits</button>
      <button class="btn external-btn" onclick="setCategoryFilter('External Audit')">External Audits</button>
    </div>
  </div>

  <div class="top-buttons">
    <button class="btn audit-btn" onclick="window.location.href='Audits.html'">
      🛡️ Audits
    </button>

    <button class="btn home-btn" onclick="window.location.href='index.html'">
      🏠 Home
    </button>
  </div>

  <div id="counter" class="counter"></div>

  <div id="auditList"></div>

  <div id="noData" class="no-data" style="display:none;">
    No audit reports found.
  </div>

  <div class="bottom-buttons">
    <button class="btn audit-btn" onclick="window.location.href='Audits.html'">
      🛡️ Audits
    </button>

    <button class="btn home-btn" onclick="window.location.href='index.html'">
      🏠 Home
    </button>
  </div>

  <div class="footer">
    AVIATION SAFETY MANAGEMENT PLATFORM
  </div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue,
  remove,
  update
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2syFrb8S3cxt1Sor1wXrgJcdSZAg1Pq4",
  authDomain: "aviation-sms.firebaseapp.com",
  databaseURL: "https://aviation-sms-default-rtdb.firebaseio.com",
  projectId: "aviation-sms",
  storageBucket: "aviation-sms.firebasestorage.app",
  messagingSenderId: "147000937860",
  appId: "1:147000937860:web:90049a1f5269ef107ca1d1"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const auditList = document.getElementById("auditList");
const noData = document.getElementById("noData");
const counter = document.getElementById("counter");

let allReports = [];
let categoryFilter = "All";

function clean(value){
  return String(value || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function statusClass(status){
  return String(status || "Open")
    .toLowerCase()
    .replaceAll(" ","-");
}

function categoryClass(category){
  return String(category || "Internal Audit")
    .toLowerCase()
    .replaceAll(" ","-");
}

function renderReports(reports){

  auditList.innerHTML = "";

  if(reports.length === 0){
    noData.style.display = "block";
    counter.innerHTML = "0 audit report(s) found";
    return;
  }

  noData.style.display = "none";
  counter.innerHTML = reports.length + " audit report(s) found";

  reports.forEach((report, index) => {

    const firebaseId = report.firebaseId;

    const category = report.auditCategory || "Internal Audit";

    const title = report.title || "Untitled Audit Report";

    const auditNumber = report.auditId || report.auditNumber || firebaseId;

    const auditorName = report.auditorName || "N/A";

    const auditedEntity =
      category === "External Audit"
      ? (report.vendorName || report.serviceProvider || "N/A")
      : (report.auditedArea || report.department || "N/A");

    const date = report.date || report.auditDate || report.createdAt || "N/A";

    const location = report.location || "N/A";

    const status = report.status || "Open";

    const riskPriority = report.riskPriority || "N/A";

    const card = document.createElement("div");
    card.className = "report-card " + (category === "External Audit" ? "external" : "internal");

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="event-title">${clean(title)}</div>

          <div class="meta">
            <strong>Date:</strong> ${clean(date)}<br>
            <strong>Auditor:</strong> ${clean(auditorName)}<br>
            <strong>${category === "External Audit" ? "Vendor / Service Provider" : "Audited Area"}:</strong> ${clean(auditedEntity)}<br>
            <strong>Location:</strong> ${clean(location)}
          </div>
        </div>

        <div>
          <span class="category ${categoryClass(category)}">
            ${clean(category)}
          </span>

         <button
          class="status ${statusClass(status)}"
          onclick="toggleStatus('${clean(firebaseId)}','${clean(status)}')">

          ${clean(status)}

          </button>
        </div>
      </div>

      <div class="details-grid">

        <div class="detail-box">
          <div class="detail-label">Editable Audit ID</div>
          <input 
            class="audit-id-input" 
            id="auditId_${clean(firebaseId)}" 
            value="${clean(auditNumber)}"
          >
          <div class="small-note">
            You can write your own audit ID here.
          </div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Audit Category</div>
          <div class="detail-value">${clean(category)}</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Audit Type</div>
          <div class="detail-value">${clean(report.auditType || "N/A")}</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Finding Classification</div>
          <div class="detail-value">${clean(report.findingClassification || "N/A")}</div>
        </div>

        <div class="detail-box">
          <div class="detail-label">Risk / Priority</div>
          <div class="detail-value">${clean(riskPriority)}</div>
        </div>

      </div>

      <div class="actions">

      <button class="btn open-btn" onclick="openReport('${clean(firebaseId)}', '${clean(category)}')">
      Open Report
      </button>

      <button class="btn save-btn" onclick="saveAuditId('${clean(firebaseId)}')">
      Save Audit ID
      </button>

      <button class="btn save-btn" onclick="showEdit('${clean(firebaseId)}')">
      Edit
      </button>

      <button class="btn delete-btn" onclick="deleteReport('${clean(firebaseId)}')">
    🗑
  </button>

</div>
<div id="edit-${clean(firebaseId)}" style="display:none; margin-top:20px;">

<label><b>Title:</b></label>
<input
id="edit-title-${clean(firebaseId)}"
style="width:100%;padding:10px;margin:8px 0;"
value="${clean(title)}">

<label><b>Date:</b></label>
<input
id="edit-date-${clean(firebaseId)}"
style="width:100%;padding:10px;margin:8px 0;"
value="${clean(date)}">

<label><b>Auditor:</b></label>
<input
id="edit-auditor-${clean(firebaseId)}"
style="width:100%;padding:10px;margin:8px 0;"
value="${clean(auditorName)}">

<label><b>${category === "External Audit" ? "Vendor / Service Provider" : "Audited Area"}:</b></label>
<input
id="edit-area-${clean(firebaseId)}"
style="width:100%;padding:10px;margin:8px 0;"
value="${clean(auditedEntity)}">

<label><b>Location:</b></label>
<input
id="edit-location-${clean(firebaseId)}"
style="width:100%;padding:10px;margin:8px 0;"
value="${clean(location)}">

<button
class="btn save-btn"
onclick="saveEdit('${clean(firebaseId)}')">
Save Changes
</button>

</div>
    `;

    auditList.appendChild(card);

    if((index + 1) % 3 === 0){
      const separator = document.createElement("div");
      separator.className = "separator-buttons";

      separator.innerHTML = `
        <button class="btn audit-btn" onclick="window.location.href='Audits.html'">
          🛡️ Audits
        </button>

        <button class="btn home-btn" onclick="window.location.href='index.html'">
          🏠 Home
        </button>
      `;

      auditList.appendChild(separator);
    }

  });
}

window.setCategoryFilter = function(category){
  categoryFilter = category;
  applyFilter();
};

window.applyFilter = function(){

  const searchText = document.getElementById("searchInput").value.toLowerCase().trim();

  let filtered = allReports;

  if(categoryFilter !== "All"){
    filtered = filtered.filter(report => {
      return (report.auditCategory || "Internal Audit") === categoryFilter;
    });
  }

  if(searchText !== ""){
    filtered = filtered.filter(report => {

      const searchArea = `
        ${report.firebaseId || ""}
        ${report.auditId || ""}
        ${report.auditNumber || ""}
        ${report.auditCategory || ""}
        ${report.title || ""}
        ${report.auditorName || ""}
        ${report.auditedArea || ""}
        ${report.vendorName || ""}
        ${report.vendorContact || ""}
        ${report.serviceProvided || ""}
        ${report.location || ""}
        ${report.date || ""}
        ${report.createdAt || ""}
        ${report.status || ""}
        ${report.auditType || ""}
        ${report.findingClassification || ""}
        ${report.mainFindingArea || ""}
        ${report.riskPriority || ""}
        ${report.referenceStandard || ""}
        ${report.procedureReference || ""}
        ${report.contractReference || ""}
      `.toLowerCase();

      return searchArea.includes(searchText);
    });
  }

  renderReports(filtered);
};

const reportsRef = ref(database, "auditReports");

onValue(reportsRef, (snapshot) => {

  allReports = [];

  if(!snapshot.exists()){
    renderReports([]);
    return;
  }

  snapshot.forEach((childSnapshot) => {
    allReports.push({
      firebaseId: childSnapshot.key,
      ...childSnapshot.val()
    });
  });

  allReports.sort((a,b) => {
    return String(b.firebaseId).localeCompare(String(a.firebaseId));
  });

  applyFilter();

});

window.openReport = function(reportId, category){

  if(category === "External Audit"){
    window.location.href = "Safety-Assurance-External-Audit-Detail.html?id=" + reportId;
  }else{
    window.location.href = "Safety-Assurance-Internal-Audit-Detail.html?id=" + reportId;
  }

};

window.saveAuditId = function(reportId){

  const input = document.getElementById("auditId_" + reportId);
  const newAuditId = input.value.trim();

  if(newAuditId === ""){
    alert("Audit ID cannot be empty.");
    return;
  }

  update(ref(database, "auditReports/" + reportId), {
    auditId: newAuditId,
    updatedAt: new Date().toLocaleString()
  })
  .then(() => {
    alert("Audit ID updated successfully.");
  })
  .catch((error) => {
    alert("Error updating Audit ID: " + error.message);
  });

};

window.toggleStatus = function(reportId, currentStatus){

  const newStatus = currentStatus === "Open" ? "Closed" : "Open";

  update(ref(database, "auditReports/" + reportId), {
    status: newStatus,
    updatedAt: new Date().toLocaleString()
  })
  .then(() => {
    alert("Audit status changed to " + newStatus + ".");
  })
  .catch((error) => {
    alert("Error updating status: " + error.message);
  });

};

window.showEdit = function(reportId){

  const editBox = document.getElementById("edit-" + reportId);

  editBox.style.display =
  editBox.style.display === "block"
  ? "none"
  : "block";

};

  window.saveEdit = function(reportId){

  const newTitle =
  document.getElementById("edit-title-" + reportId).value;

  const newDate =
  document.getElementById("edit-date-" + reportId).value;

  const newAuditor =
  document.getElementById("edit-auditor-" + reportId).value;

  const newArea =
  document.getElementById("edit-area-" + reportId).value;

  const newLocation =
  document.getElementById("edit-location-" + reportId).value;

  update(ref(database,"auditReports/" + reportId),{

    title:newTitle,
    date:newDate,
    auditorName:newAuditor,
    auditedArea:newArea,
    vendorName:newArea,
    location:newLocation,
    updatedAt:new Date().toLocaleString()

  }).then(()=>{

    alert("Audit updated successfully.");
    location.reload();

  });

};
  
window.deleteReport = function(reportId){

  const confirmDelete = confirm(
    "Are you sure you want to permanently delete this audit report?"
  );

  if(!confirmDelete) return;

  remove(ref(database, "auditReports/" + reportId))
  .then(() => {
    alert("Audit Report deleted successfully.");
  })
  .catch((error) => {
    alert("Error deleting report: " + error.message);
  });

};

</script>

</body>
</html>
