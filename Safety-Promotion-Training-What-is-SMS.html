<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What Is SMS?</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#071f47,#0b2a66,#1450b8);
  padding:35px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  border-radius:30px;
  padding:45px;
  box-shadow:0 20px 55px rgba(0,0,0,0.35);
}

h1{
  text-align:center;
  color:#071f47;
  font-size:54px;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#56657d;
  font-size:19px;
  margin-bottom:35px;
}

.video-box,
.quiz-box,
.result-box,
.records-box{
  background:#f4f6f8;
  border-radius:22px;
  padding:25px;
  margin-bottom:25px;
  border-left:8px solid #1450b8;
}

label{
  display:block;
  margin-top:15px;
  margin-bottom:6px;
  font-weight:bold;
  color:#071f47;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:16px;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
}

.save-btn{ background:#071f47; color:white; }
.add-btn{ background:#ff9800; color:white; }
.submit-btn{ background:#198754; color:white; }
.back-btn{ background:#b91c1c; color:white; }
.home-btn{ background:#333; color:white; }
.play-btn{ background:#1450b8; color:white; }
.print-btn{ background:#198754; color:white; }

.delete-btn{
  background:#dc2626;
  color:white;
  padding:10px 16px;
  border-radius:10px;
}

.delete-btn:hover{
  background:#b91c1c;
}

iframe{
  width:100%;
  height:420px;
  border:none;
  border-radius:18px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.20);
}

.question{
  background:white;
  padding:18px;
  border-radius:16px;
  margin-top:20px;
  box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.question h3{
  color:#071f47;
  margin-bottom:12px;
}

.option{
  display:block;
  margin:10px 0;
  color:#333;
  font-size:16px;
}

.hidden{
  display:none;
}

.success{
  color:#198754;
  font-weight:bold;
  font-size:20px;
}

.error{
  color:#b91c1c;
  font-weight:bold;
  font-size:20px;
}

.top-buttons{
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:25px;
}

.record-card{
  background:white;
  padding:16px;
  border-radius:14px;
  margin-top:12px;
  box-shadow:0 5px 14px rgba(0,0,0,0.08);
  color:#071f47;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
}

.record-info{
  line-height:1.6;
}

@media print{
  .video-box,
  .quiz-box,
  .top-buttons,
  .add-btn,
  .result-box,
  .delete-btn{
    display:none;
  }

  body{
    background:white;
  }

  .container{
    box-shadow:none;
  }
}

@media(max-width:800px){
  .container{
    padding:25px;
  }

  h1{
    font-size:38px;
  }

  iframe{
    height:260px;
  }

  .record-card{
    flex-direction:column;
    align-items:flex-start;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>Safety Promotion Training</h1>

  <div class="subtitle">
    What Is SMS? - Training Video and Knowledge Check
  </div>

  <div class="top-buttons">

    <button class="back-btn" onclick="location.href='Safety-Promotion-Training.html'">
      ← Back
    </button>

    <button class="home-btn" onclick="location.href='index.html'">
      🏠 Home
    </button>

    <button class="print-btn" onclick="window.print()">
      🖨 Print Records
    </button>

  </div>

  <div class="video-box">

    <label>Training Video Link</label>
    <input type="text" id="videoLink" placeholder="Paste YouTube or Google Drive video link here">

    <button class="save-btn" onclick="saveVideo()">Save Video Link</button>
    <button class="play-btn" onclick="loadVideo()">▶ Play Video</button>

    <div id="videoFrame"></div>

  </div>

  <button class="add-btn" onclick="newEmployee()">
    ➕ New Employee
  </button>

  <div class="quiz-box hidden" id="quizBox">

    <label>Employee Name</label>
    <input type="text" id="employeeName" placeholder="Enter employee name">

    <label>Company ID</label>
    <input type="text" id="employeeId" placeholder="Enter company ID">

    <div class="question">
      <h3>1. What is SMS?</h3>

      <label class="option">
        <input type="radio" name="q1" value="a">
        A. A system
      </label>

      <label class="option">
        <input type="radio" name="q1" value="b">
        B. A Safety Management System
      </label>

      <label class="option">
        <input type="radio" name="q1" value="c">
        C. A text message
      </label>
    </div>

    <div class="question">
      <h3>2. What is Risk?</h3>

      <label class="option">
        <input type="radio" name="q2" value="a">
        A. A hazard
      </label>

      <label class="option">
        <input type="radio" name="q2" value="b">
        B. Damage
      </label>

      <label class="option">
        <input type="radio" name="q2" value="c">
        C. The probability and severity of an event
      </label>
    </div>

    <button class="submit-btn" onclick="submitQuiz()">
      Submit Training
    </button>

  </div>

  <div class="result-box hidden" id="resultBox"></div>

  <div class="records-box">
    <h2>Training Completion Records</h2>
    <div id="recordsList"></div>
  </div>

</div>

<script>

let videoPlayed = false;
const DELETE_PASSWORD = "Tom";

const savedVideo =
localStorage.getItem("whatIsSMSVideo");

if(savedVideo){
  document.getElementById("videoLink").value = savedVideo;
}

function convertToEmbed(url){

  if(url.includes("youtube.com/watch?v=")){
    return url.replace("watch?v=","embed/");
  }

  if(url.includes("youtu.be/")){
    const videoId = url.split("youtu.be/")[1].split("?")[0];
    return "https://www.youtube.com/embed/" + videoId;
  }

  if(url.includes("drive.google.com")){
    return url.replace("/view","/preview");
  }

  return url;
}

function saveVideo(){

  const link =
  document.getElementById("videoLink").value.trim();

  if(link === ""){
    alert("Please paste a video link first.");
    return;
  }

  localStorage.setItem("whatIsSMSVideo", link);

  alert("Video link saved successfully.");
}

function loadVideo(){

  const link =
  document.getElementById("videoLink").value.trim();

  if(link === ""){
    alert("Please paste or save a video link first.");
    return;
  }

  const embedLink =
  convertToEmbed(link);

  document.getElementById("videoFrame").innerHTML =
`<iframe
src="${embedLink}"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>`;

  videoPlayed = true;
}

function newEmployee(){

  if(!videoPlayed){
    alert("Please play the training video before starting the quiz.");
    return;
  }

  document.getElementById("quizBox").classList.remove("hidden");
  document.getElementById("resultBox").classList.add("hidden");

  document.getElementById("employeeName").value = "";
  document.getElementById("employeeId").value = "";

  document.querySelectorAll("input[name='q1']").forEach(r => r.checked = false);
  document.querySelectorAll("input[name='q2']").forEach(r => r.checked = false);

  document.getElementById("quizBox").scrollIntoView({
    behavior:"smooth"
  });
}

function submitQuiz(){

  const name =
  document.getElementById("employeeName").value.trim();

  const id =
  document.getElementById("employeeId").value.trim();

  const q1 =
  document.querySelector("input[name='q1']:checked");

  const q2 =
  document.querySelector("input[name='q2']:checked");

  const resultBox =
  document.getElementById("resultBox");

  if(name === "" || id === ""){
    alert("Please enter employee name and company ID.");
    return;
  }

  if(!q1 || !q2){
    alert("Please answer both questions.");
    return;
  }

  if(q1.value === "b" && q2.value === "c"){

    const record = {
      employeeName:name,
      employeeId:id,
      course:"What Is SMS?",
      result:"Passed",
      date:new Date().toLocaleString()
    };

    let records =
    JSON.parse(localStorage.getItem("whatIsSMSTrainingRecords")) || [];

    records.push(record);

    localStorage.setItem(
      "whatIsSMSTrainingRecords",
      JSON.stringify(records)
    );

    resultBox.className = "result-box success";
    resultBox.innerHTML =
    `✅ Training Completed Successfully<br><br>
    Employee: ${name}<br>
    Company ID: ${id}<br>
    Course: What Is SMS?<br>
    Date: ${record.date}`;

    document.getElementById("quizBox").classList.add("hidden");

    displayRecords();

  }else{

    videoPlayed = false;

    resultBox.className = "result-box error";
    resultBox.innerHTML =
    `❌ Incorrect answers.<br><br>
    The employee must play the training video again before trying the quiz again.`;

    document.getElementById("quizBox").classList.add("hidden");
  }

  resultBox.classList.remove("hidden");
}

function displayRecords(){

  const records =
  JSON.parse(localStorage.getItem("whatIsSMSTrainingRecords")) || [];

  const recordsList =
  document.getElementById("recordsList");

  recordsList.innerHTML = "";

  if(records.length === 0){
    recordsList.innerHTML = "<p>No completed training records yet.</p>";
    return;
  }

  records.forEach(function(record, index){

    const div =
    document.createElement("div");

    div.className =
    "record-card";

    div.innerHTML =
    `<div class="record-info">
      <strong>${index + 1}. ${record.employeeName}</strong><br>
      Company ID: ${record.employeeId}<br>
      Course: ${record.course}<br>
      Result: ${record.result}<br>
      Date: ${record.date}
    </div>

    <button class="delete-btn" onclick="deleteRecord(${index})">
      🗑 Delete
    </button>`;

    recordsList.appendChild(div);

  });
}

function deleteRecord(index){

  const password =
  prompt("Enter password to delete this record:");

  if(password === null){
    return;
  }

  if(password !== DELETE_PASSWORD){
    alert("Incorrect password. Record was not deleted.");
    return;
  }

  if(!confirm("Are you sure you want to delete this employee training record?")){
    return;
  }

  let records =
  JSON.parse(localStorage.getItem("whatIsSMSTrainingRecords")) || [];

  records.splice(index, 1);

  localStorage.setItem(
    "whatIsSMSTrainingRecords",
    JSON.stringify(records)
  );

  displayRecords();

  alert("Record deleted successfully.");
}

displayRecords();

</script>

</body>
</html>
